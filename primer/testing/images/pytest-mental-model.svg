<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .cardNum { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="820" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="112" r="120" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="134" cy="774" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">PYTEST MENTAL MODEL</text>
  <text x="72" y="116" class="title">pytest를 읽을 때 먼저 볼 3가지</text>
  <text x="72" y="148" class="subtitle">수집 규칙, fixture 그래프, 실패 리포트를 함께 보면 테스트가 어떻게 실행되는지 빠르게 잡힌다.</text>

  <rect x="72" y="188" width="360" height="126" rx="24" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="102" y="222" class="cardNum">1. COLLECTION</text>
  <text x="102" y="256" class="cardTitle">무엇이 수집되는가?</text>
  <text x="102" y="284" class="cardText">파일명, 함수명, `-k`, `-m` 필터가</text>
  <text x="102" y="306" class="cardText">실행할 테스트 집합을 결정한다.</text>

  <rect x="460" y="188" width="360" height="126" rx="24" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="490" y="222" class="cardNum">2. FIXTURE GRAPH</text>
  <text x="490" y="256" class="cardTitle">무엇이 먼저 준비되는가?</text>
  <text x="490" y="284" class="cardText">fixture 인자와 scope가 setup/teardown</text>
  <text x="490" y="306" class="cardText">순서와 재사용 범위를 만든다.</text>

  <rect x="848" y="188" width="360" height="126" rx="24" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="878" y="222" class="cardNum">3. REPORT</text>
  <text x="878" y="256" class="cardTitle">실패 맥락을 남기는가?</text>
  <text x="878" y="284" class="cardText">assert 비교, caplog, patch 상태까지</text>
  <text x="878" y="306" class="cardText">봐야 디버깅이 짧아진다.</text>

  <rect x="56" y="352" width="1168" height="392" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">RUNNER WALKTHROUGH</text>

  <line x1="164" y1="548" x2="1098" y2="548" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="96" y="476" width="154" height="144" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="126" y="526" class="nodeTitle">CLI 선택</text>
  <text x="130" y="554" class="nodeText">경로, `-k`, `-m`,</text>
  <text x="138" y="576" class="nodeText">`--lf` 같은 필터</text>

  <rect x="294" y="454" width="188" height="188" rx="24" fill="#EAF4FF" stroke="#BDD7EF"/>
  <text x="336" y="506" class="nodeTitle">Collection</text>
  <text x="324" y="536" class="nodeText">`test_*.py`, `Test*`,</text>
  <text x="330" y="558" class="nodeText">`test_*` 규칙으로</text>
  <text x="338" y="580" class="nodeText">테스트를 찾는다</text>

  <rect x="528" y="454" width="196" height="188" rx="24" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="558" y="506" class="nodeTitle">Fixture Graph</text>
  <text x="554" y="536" class="nodeText">필요한 fixture만 준비하고</text>
  <text x="548" y="558" class="nodeText">scope별로 재사용 여부를</text>
  <text x="570" y="580" class="nodeText">판단한다</text>
  <rect x="566" y="598" width="120" height="30" rx="15" fill="#F3FBF7" stroke="#C4E1D2"/>
  <text x="598" y="618" class="chip">setup / teardown</text>

  <rect x="770" y="454" width="184" height="188" rx="24" fill="#FFF6E8" stroke="#EAD29D"/>
  <text x="812" y="506" class="nodeTitle">Test Call</text>
  <text x="798" y="536" class="nodeText">함수 실행 후 assert,</text>
  <text x="810" y="558" class="nodeText">raises, warns 확인</text>

  <rect x="1000" y="454" width="176" height="188" rx="24" fill="#F6EEF9" stroke="#DCCDE9"/>
  <text x="1040" y="506" class="nodeTitle">Failure</text>
  <text x="1028" y="536" class="nodeText">assert diff, traceback,</text>
  <text x="1034" y="558" class="nodeText">captured log 출력</text>

  <rect x="702" y="668" width="360" height="60" rx="18" fill="#FFF0EE" stroke="#F0B9B1"/>
  <text x="730" y="706" class="chip">핵심: fixture가 만든 상태를 모르면 실패 메시지도 절반만 읽힌다.</text>
</svg>
