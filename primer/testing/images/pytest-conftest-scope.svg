<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18324A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .nodeTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="860" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="114" r="118" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="132" cy="780" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">CONFIG AND FIXTURE LOOKUP</text>
  <text x="72" y="116" class="title">fixture 탐색은 가장 가까운 `conftest.py`부터 시작한다</text>
  <text x="72" y="148" class="subtitle">`pyproject.toml`이 전역 수집 규칙을 정하고, 각 디렉터리의 `conftest.py`가 하위 테스트에 fixture를 내려준다.</text>

  <rect x="92" y="208" width="260" height="142" rx="26" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="142" y="262" class="nodeTitle">pyproject.toml</text>
  <text x="136" y="292" class="nodeText">testpaths, markers, addopts,</text>
  <text x="154" y="316" class="nodeText">asyncio_mode 같은 전역 규칙</text>

  <text x="84" y="408" class="section">LOOKUP ORDER</text>

  <rect x="110" y="448" width="1020" height="314" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>

  <rect x="158" y="500" width="232" height="210" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="204" y="544" class="nodeTitle">tests/unit/</text>
  <text x="186" y="576" class="nodeText">`conftest.py`</text>
  <text x="186" y="600" class="nodeText">unit 전용 fixture</text>
  <rect x="186" y="624" width="148" height="32" rx="16" fill="#EEF7FF" stroke="#BDD7EF"/>
  <text x="214" y="646" class="badge">가장 먼저 찾음</text>

  <rect x="468" y="500" width="232" height="210" rx="24" fill="#EAF4FF" stroke="#BDD7EF"/>
  <text x="518" y="544" class="nodeTitle">tests/</text>
  <text x="500" y="576" class="nodeText">`conftest.py`</text>
  <text x="492" y="600" class="nodeText">공통 fixture와 session scope</text>

  <rect x="778" y="500" width="292" height="210" rx="24" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="822" y="544" class="nodeTitle">builtin / plugin</text>
  <text x="814" y="576" class="nodeText">`tmp_path`, `caplog`,</text>
  <text x="812" y="600" class="nodeText">pytest-asyncio, pytest-cov</text>

  <rect x="506" y="394" width="260" height="86" rx="22" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="554" y="430" class="nodeTitle">tests/unit/test_models.py</text>
  <text x="576" y="456" class="nodeText">현재 읽는 테스트 파일</text>

  <rect x="410" y="786" width="418" height="46" rx="20" fill="#FFF0EE" stroke="#F0B9B1"/>
  <text x="444" y="815" class="badge">가까운 conftest가 우선하고, 없을 때만 바깥으로 올라간다.</text>

  <line x1="636" y1="480" x2="274" y2="500" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="636" y1="480" x2="584" y2="500" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="636" y1="480" x2="924" y2="500" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="222" y1="350" x2="222" y2="448" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
