<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .cardNum { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="820" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="112" r="120" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="134" cy="774" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">VITEST MENTAL MODEL</text>
  <text x="72" y="116" class="title">Vitest를 읽을 때 먼저 볼 3가지</text>
  <text x="72" y="148" class="subtitle">Vite 변환, 테스트 환경, mock 경계를 같이 보면 왜 Vitest가 빠르고 어디서 꼬이는지 한눈에 잡힌다.</text>

  <rect x="72" y="188" width="360" height="126" rx="24" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="102" y="222" class="cardNum">1. TRANSFORM</text>
  <text x="102" y="256" class="cardTitle">무엇이 먼저 변환되는가?</text>
  <text x="102" y="284" class="cardText">Vite가 import와 alias를 해석한 뒤</text>
  <text x="102" y="306" class="cardText">테스트 코드가 실행된다.</text>

  <rect x="460" y="188" width="360" height="126" rx="24" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="490" y="222" class="cardNum">2. ENVIRONMENT</text>
  <text x="490" y="256" class="cardTitle">어느 런타임에서 도는가?</text>
  <text x="490" y="284" class="cardText">`node`, `jsdom`, setupFiles 조합이</text>
  <text x="490" y="306" class="cardText">테스트 전제 자체를 바꾼다.</text>

  <rect x="848" y="188" width="360" height="126" rx="24" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="878" y="222" class="cardNum">3. MOCK LEVEL</text>
  <text x="878" y="256" class="cardTitle">어느 층에서 끊는가?</text>
  <text x="878" y="284" class="cardText">함수, 모듈, 전역 객체, 시간 중</text>
  <text x="878" y="306" class="cardText">정확한 층을 골라야 빠르고 안전하다.</text>

  <rect x="56" y="352" width="1168" height="392" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">RUNNER WALKTHROUGH</text>

  <line x1="156" y1="548" x2="1096" y2="548" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="462" width="164" height="172" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="132" y="512" class="nodeTitle">CLI</text>
  <text x="118" y="540" class="nodeText">`vitest`, `vitest run`,</text>
  <text x="128" y="562" class="nodeText">watch, `-t` 필터</text>

  <rect x="292" y="462" width="192" height="172" rx="24" fill="#EAF4FF" stroke="#BDD7EF"/>
  <text x="338" y="512" class="nodeTitle">Vite Transform</text>
  <text x="332" y="540" class="nodeText">TS/TSX, alias, ESM import</text>
  <text x="350" y="562" class="nodeText">그래프 해석</text>

  <rect x="524" y="462" width="196" height="172" rx="24" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="554" y="512" class="nodeTitle">Worker + Env</text>
  <text x="546" y="540" class="nodeText">`node` 또는 `jsdom`에서</text>
  <text x="564" y="562" class="nodeText">setupFiles 실행</text>
  <rect x="568" y="584" width="108" height="30" rx="15" fill="#F3FBF7" stroke="#C4E1D2"/>
  <text x="594" y="604" class="chip">parallel</text>

  <rect x="760" y="462" width="182" height="172" rx="24" fill="#FFF6E8" stroke="#EAD29D"/>
  <text x="814" y="512" class="nodeTitle">Test + Mock</text>
  <text x="792" y="540" class="nodeText">expect, vi.fn, vi.mock,</text>
  <text x="808" y="562" class="nodeText">fake timers 실행</text>

  <rect x="982" y="462" width="186" height="172" rx="24" fill="#F6EEF9" stroke="#DCCDE9"/>
  <text x="1036" y="512" class="nodeTitle">Result</text>
  <text x="1018" y="540" class="nodeText">watch rerun, coverage,</text>
  <text x="1028" y="562" class="nodeText">snapshot 갱신</text>

  <rect x="706" y="666" width="372" height="60" rx="18" fill="#FFF0EE" stroke="#F0B9B1"/>
  <text x="734" y="704" class="chip">핵심: 빠른 실행은 작은 mock 경계와 올바른 environment 선택에서 나온다.</text>
</svg>
