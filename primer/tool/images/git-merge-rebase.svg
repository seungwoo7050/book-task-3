<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5A7692"/>
    </marker>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #486580; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #576D84; }
    .panelTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #163049; }
    .panelText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5B7087; }
    .commit { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">BRANCH INTEGRATION</text>
  <text x="72" y="114" class="title">merge는 이력을 보존하고, rebase는 다시 쓴다</text>
  <text x="72" y="146" class="subtitle">둘 다 feature를 main에 합치지만, 그래프와 커밋 해시가 달라진다.</text>

  <rect x="72" y="206" width="536" height="536" rx="30" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="112" y="256" class="panelTitle">merge</text>
  <text x="112" y="284" class="panelText">기존 분기를 유지하고 merge commit을 추가한다.</text>

  <line x1="146" y1="404" x2="274" y2="404" stroke="#5A7692" stroke-width="4"/>
  <line x1="274" y1="404" x2="402" y2="404" stroke="#5A7692" stroke-width="4"/>
  <line x1="274" y1="404" x2="274" y2="522" stroke="#5A7692" stroke-width="4"/>
  <line x1="274" y1="522" x2="402" y2="522" stroke="#5A7692" stroke-width="4"/>
  <line x1="402" y1="404" x2="470" y2="464" stroke="#5A7692" stroke-width="4"/>
  <line x1="402" y1="522" x2="470" y2="464" stroke="#5A7692" stroke-width="4"/>

  <circle cx="146" cy="404" r="26" fill="#F7FAFD" stroke="#D1DEEA"/><text x="137" y="410" class="commit">A</text>
  <circle cx="274" cy="404" r="26" fill="#F7FAFD" stroke="#D1DEEA"/><text x="265" y="410" class="commit">B</text>
  <circle cx="402" cy="404" r="26" fill="#EAF4FF" stroke="#BCD6EE"/><text x="393" y="410" class="commit">C</text>
  <circle cx="402" cy="522" r="26" fill="#EEF8F3" stroke="#C2E0D0"/><text x="394" y="528" class="commit">E</text>
  <circle cx="274" cy="522" r="26" fill="#EEF8F3" stroke="#C2E0D0"/><text x="265" y="528" class="commit">D</text>
  <circle cx="470" cy="464" r="28" fill="#FFF6E8" stroke="#E9D29D"/><text x="458" y="470" class="commit">M</text>

  <rect x="114" y="612" width="450" height="88" rx="22" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="142" y="648" class="badge">장점: 분기 구조와 병합 시점이 그대로 남는다.</text>
  <text x="142" y="674" class="badge">언제: 공유 브랜치, 팀 협업, merge commit 추적이 중요할 때</text>

  <rect x="672" y="206" width="536" height="536" rx="30" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="712" y="256" class="panelTitle">rebase</text>
  <text x="712" y="284" class="panelText">feature 커밋을 새 기준 위에 다시 배치한다.</text>

  <line x1="746" y1="404" x2="874" y2="404" stroke="#5A7692" stroke-width="4"/>
  <line x1="874" y1="404" x2="1002" y2="404" stroke="#5A7692" stroke-width="4"/>
  <line x1="1002" y1="404" x2="1080" y2="404" stroke="#5A7692" stroke-width="4"/>
  <line x1="1080" y1="404" x2="1158" y2="404" stroke="#5A7692" stroke-width="4"/>

  <circle cx="746" cy="404" r="26" fill="#F7FAFD" stroke="#D1DEEA"/><text x="737" y="410" class="commit">A</text>
  <circle cx="874" cy="404" r="26" fill="#F7FAFD" stroke="#D1DEEA"/><text x="865" y="410" class="commit">B</text>
  <circle cx="1002" cy="404" r="26" fill="#EAF4FF" stroke="#BCD6EE"/><text x="993" y="410" class="commit">C</text>
  <circle cx="1080" cy="404" r="26" fill="#EEF8F3" stroke="#C2E0D0"/><text x="1064" y="410" class="commit">D'</text>
  <circle cx="1158" cy="404" r="26" fill="#EEF8F3" stroke="#C2E0D0"/><text x="1142" y="410" class="commit">E'</text>

  <line x1="874" y1="522" x2="952" y2="522" stroke="#B8C7D6" stroke-width="3" stroke-dasharray="10 8"/>
  <line x1="952" y1="522" x2="1030" y2="522" stroke="#B8C7D6" stroke-width="3" stroke-dasharray="10 8"/>
  <circle cx="874" cy="522" r="24" fill="#FFFFFF" stroke="#D1DEEA"/><text x="865" y="528" class="commit">B</text>
  <circle cx="952" cy="522" r="24" fill="#FFFFFF" stroke="#D1DEEA"/><text x="944" y="528" class="commit">D</text>
  <circle cx="1030" cy="522" r="24" fill="#FFFFFF" stroke="#D1DEEA"/><text x="1022" y="528" class="commit">E</text>
  <text x="872" y="566" class="badge">원본 feature 이력</text>

  <rect x="714" y="612" width="450" height="88" rx="22" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="742" y="648" class="badge">장점: 직선 이력, merge commit 없이 정리 가능</text>
  <text x="742" y="674" class="badge">주의: 커밋 해시가 바뀌므로 이미 push한 브랜치에는 위험</text>
</svg>
