<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #486580; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #576D84; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A7087; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">DEPENDENCY GRAPH</text>
  <text x="72" y="112" class="title">Make는 파일 간 그래프를 따라 오래된 것만 다시 만든다</text>
  <text x="72" y="142" class="subtitle">`make app`은 명령을 위에서 아래로 읽는 것이 아니라, `app`이 의존하는 파일들의 최신 여부를 먼저 확인한다.</text>

  <rect x="56" y="194" width="1168" height="554" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="234" class="section">REBUILD FLOW</text>

  <rect x="560" y="266" width="160" height="86" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="620" y="316" class="nodeTitle">app</text>
  <text x="592" y="340" class="nodeText">최종 바이너리</text>

  <rect x="322" y="432" width="176" height="94" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="378" y="482" class="nodeTitle">main.o</text>
  <text x="362" y="508" class="nodeText">main.c에서 생성</text>

  <rect x="782" y="432" width="176" height="94" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="838" y="482" class="nodeTitle">utils.o</text>
  <text x="816" y="508" class="nodeText">utils.c에서 생성</text>

  <rect x="240" y="616" width="176" height="76" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="298" y="660" class="nodeTitle">main.c</text>

  <rect x="700" y="616" width="176" height="76" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="758" y="660" class="nodeTitle">utils.c</text>

  <rect x="918" y="616" width="176" height="76" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="970" y="660" class="nodeTitle">utils.h</text>

  <line x1="640" y1="352" x2="410" y2="432" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="352" x2="870" y2="432" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="410" y1="526" x2="328" y2="616" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="870" y1="526" x2="788" y2="616" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="958" y1="616" x2="904" y2="526" stroke="#D5786F" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="94" y="280" width="286" height="92" rx="22" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="122" y="320" class="badge">규칙: target이 dependency보다 오래되면 recipe 실행</text>
  <text x="122" y="346" class="badge">예: `utils.h`가 바뀌면 `utils.o`와 `app`이 다시 빌드</text>

  <rect x="850" y="280" width="274" height="92" rx="22" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="878" y="320" class="badge">핵심: 화살표는 “먼저 확인할 파일”을 뜻한다</text>
  <text x="878" y="346" class="badge">Make는 필요할 때만 하위 dependency로 내려간다</text>
</svg>
