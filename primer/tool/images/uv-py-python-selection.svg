<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#597592"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47637E; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566B82; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .small { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #45627B; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">PYTHON SELECTION</text>
  <text x="72" y="114" class="title">uv는 여러 기준을 보고 Python 인터프리터를 고른다</text>
  <text x="72" y="146" class="subtitle">버전 고정이 흔들리는 이유는 설치 자체보다 선택 우선순위를 모를 때가 많다.</text>

  <rect x="420" y="206" width="440" height="108" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="520" y="252" class="nodeTitle">실행에 쓸 Python은 무엇인가?</text>
  <text x="500" y="280" class="nodeText">uv는 명시적 지정부터 프로젝트 핀, 요구 범위 순으로 확인한다.</text>

  <line x1="640" y1="314" x2="640" y2="366" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="366" width="260" height="144" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="166" y="420" class="nodeTitle">1. 명시적 지정</text>
  <text x="156" y="454" class="nodeText">`UV_PYTHON=3.12`</text>
  <text x="156" y="478" class="nodeText">`uv venv --python 3.12`</text>

  <rect x="510" y="366" width="260" height="144" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="564" y="420" class="nodeTitle">2. 프로젝트 핀</text>
  <text x="556" y="454" class="nodeText">`.python-version`</text>
  <text x="556" y="478" class="nodeText">`uv python pin 3.12`</text>

  <rect x="900" y="366" width="260" height="144" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="944" y="420" class="nodeTitle">3. 요구 범위</text>
  <text x="936" y="454" class="nodeText">`requires-python = ">=3.11"`</text>
  <text x="936" y="478" class="nodeText">범위에 맞는 설치본 탐색</text>

  <line x1="250" y1="510" x2="640" y2="582" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="510" x2="640" y2="582" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1030" y1="510" x2="640" y2="582" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="498" y="582" width="284" height="126" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="570" y="632" class="nodeTitle">설치 여부 확인</text>
  <text x="538" y="664" class="nodeText">없으면 `uv python install`로 설치한 뒤</text>
  <text x="548" y="688" class="nodeText">`.venv`가 해당 인터프리터를 사용</text>

  <rect x="458" y="734" width="364" height="40" rx="20" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="496" y="760" class="small">원칙: 핀과 요구 범위를 둘 다 두면 프로젝트 간 Python 버전이 덜 흔들린다.</text>
</svg>
