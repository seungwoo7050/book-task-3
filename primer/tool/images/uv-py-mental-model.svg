<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5C7793"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6682; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">UV MENTAL MODEL</text>
  <text x="72" y="112" class="title">uv는 Python 개발 루프를 한 도구로 묶는다</text>
  <text x="72" y="142" class="subtitle">패키지 추가, Python 설치, 환경 동기화, 실행을 각각 다른 도구로 흩어두지 않고 한 흐름으로 연결한다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. DEFINE</text>
  <text x="102" y="252" class="cardTitle">프로젝트와 의존성을 선언한다</text>
  <text x="102" y="280" class="cardText">`uv init`, `uv add`, `pyproject.toml`,</text>
  <text x="102" y="302" class="cardText">`uv.lock`이 프로젝트 계약을 만든다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. PREPARE</text>
  <text x="490" y="252" class="cardTitle">Python과 가상환경을 맞춘다</text>
  <text x="490" y="280" class="cardText">`uv python install`, `.python-version`,</text>
  <text x="490" y="302" class="cardText">`uv sync`가 실행 환경을 준비한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. EXECUTE</text>
  <text x="878" y="252" class="cardTitle">activate 없이 바로 실행한다</text>
  <text x="878" y="280" class="cardText">`uv run`은 프로젝트 환경에서 실행하고,</text>
  <text x="878" y="302" class="cardText">`uvx`는 일회성 도구를 바로 띄운다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">END-TO-END FLOW</text>

  <line x1="170" y1="566" x2="1110" y2="566" stroke="#5C7793" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="506" width="162" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="124" y="550" class="nodeTitle">uv init</text>
  <text x="120" y="576" class="nodeText">프로젝트 뼈대 생성</text>
  <text x="120" y="600" class="nodeText">pyproject 시작점</text>

  <rect x="306" y="486" width="176" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="360" y="532" class="nodeTitle">uv add</text>
  <text x="338" y="560" class="nodeText">의존성 선언 업데이트</text>
  <text x="338" y="584" class="nodeText">필요하면 lock도 갱신</text>
  <rect x="352" y="608" width="84" height="30" rx="15" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="374" y="628" class="chip">pyproject</text>

  <rect x="538" y="506" width="162" height="120" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="584" y="550" class="nodeTitle">uv lock</text>
  <text x="572" y="576" class="nodeText">해결 결과를</text>
  <text x="574" y="600" class="nodeText">`uv.lock`에 고정</text>

  <rect x="756" y="486" width="176" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="806" y="532" class="nodeTitle">uv sync</text>
  <text x="788" y="560" class="nodeText">lock 기준으로</text>
  <text x="788" y="584" class="nodeText">`.venv`를 실제 상태로 맞춤</text>
  <rect x="806" y="608" width="76" height="30" rx="15" fill="#FFF8EC" stroke="#E9D29D"/>
  <text x="826" y="628" class="chip">.venv</text>

  <rect x="988" y="506" width="166" height="120" rx="22" fill="#F8F4FF" stroke="#D4C4F2"/>
  <text x="1032" y="550" class="nodeTitle">uv run</text>
  <text x="1016" y="576" class="nodeText">pytest, ruff, app 실행</text>
  <text x="1028" y="600" class="nodeText">activate 불필요</text>

  <rect x="944" y="430" width="180" height="42" rx="21" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="968" y="457" class="chip">uvx: 일회성 도구 실행</text>
</svg>
