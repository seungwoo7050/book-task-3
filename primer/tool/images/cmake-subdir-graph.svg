<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5A7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47647F; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566C83; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .small { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44617A; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="70" class="eyebrow">SUBDIRECTORY GRAPH</text>
  <text x="72" y="114" class="title">루트는 조립하고 하위 CMakeLists는 target을 만든다</text>
  <text x="72" y="146" class="subtitle">다중 CMakeLists 구조를 폴더가 아니라 target graph로 보면 `add_subdirectory()`의 역할이 명확해진다.</text>

  <rect x="430" y="208" width="420" height="136" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="524" y="260" class="nodeTitle">루트 CMakeLists.txt</text>
  <text x="484" y="292" class="nodeText">project(), 전역 정책, option(),</text>
  <text x="486" y="316" class="nodeText">`add_subdirectory(src)`, `add_subdirectory(tests)`</text>

  <line x1="640" y1="344" x2="640" y2="398" stroke="#5A7692" stroke-width="4"/>
  <line x1="640" y1="398" x2="314" y2="398" stroke="#5A7692" stroke-width="4"/>
  <line x1="640" y1="398" x2="966" y2="398" stroke="#5A7692" stroke-width="4"/>
  <line x1="314" y1="398" x2="314" y2="454" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="966" y1="398" x2="966" y2="454" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="142" y="454" width="344" height="124" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="250" y="504" class="nodeTitle">src/CMakeLists.txt</text>
  <text x="200" y="536" class="nodeText">`add_library(core)`</text>
  <text x="200" y="560" class="nodeText">`add_executable(app)`</text>

  <rect x="794" y="454" width="344" height="124" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="886" y="504" class="nodeTitle">tests/CMakeLists.txt</text>
  <text x="858" y="536" class="nodeText">`enable_testing()`</text>
  <text x="834" y="560" class="nodeText">`add_executable(test_core)`</text>

  <rect x="170" y="642" width="220" height="108" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="250" y="686" class="nodeTitle">core</text>
  <text x="212" y="714" class="nodeText">공용 라이브러리 target</text>

  <rect x="430" y="642" width="220" height="108" rx="24" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="522" y="686" class="nodeTitle">app</text>
  <text x="486" y="714" class="nodeText">`app -> core` 링크</text>

  <rect x="890" y="642" width="220" height="108" rx="24" fill="#F8F4FF" stroke="#D4C4F2"/>
  <text x="958" y="686" class="nodeTitle">test_core</text>
  <text x="936" y="714" class="nodeText">`test_core -> core` 링크</text>

  <line x1="314" y1="578" x2="280" y2="642" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="314" y1="578" x2="540" y2="642" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="966" y1="578" x2="1000" y2="642" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="390" y1="696" x2="430" y2="696" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="390" y1="730" x2="890" y2="730" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="100" y="766" width="1080" height="32" rx="16" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="162" y="788" class="small">핵심: 루트는 타깃을 직접 많이 만들기보다 하위 디렉터리를 연결하고, 실제 산출물은 각 하위 CMakeLists에서 정의한다.</text>
</svg>
