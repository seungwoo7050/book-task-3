<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .panelTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SEMANTIC LANDMARKS</text>
  <text x="72" y="112" class="title">한 페이지를 landmark로 나누는 기준</text>
  <text x="72" y="142" class="subtitle">레이아웃용 div 대신 의미 있는 태그를 쓰면 브라우저 화면과 스크린 리더의 탐색 구조가 동시에 정리된다.</text>

  <rect x="72" y="182" width="180" height="44" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="100" y="210" class="chip">`main`은 페이지당 1개</text>
  <rect x="270" y="182" width="210" height="44" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="298" y="210" class="chip">`section`에는 제목이 필요</text>
  <rect x="498" y="182" width="228" height="44" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="526" y="210" class="chip">`article`은 독립 배포 가능</text>

  <rect x="56" y="252" width="744" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="292" class="section">PAGE VIEW</text>

  <rect x="96" y="320" width="664" height="76" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="126" y="365" class="nodeTitle">`header`</text>
  <rect x="458" y="336" width="264" height="44" rx="14" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="490" y="364" class="chip">`nav aria-label="메인"`</text>

  <rect x="96" y="416" width="664" height="252" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="126" y="460" class="nodeTitle">`main`</text>

  <rect x="126" y="484" width="420" height="164" rx="22" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="156" y="528" class="nodeTitle">`article`</text>
  <rect x="156" y="548" width="220" height="34" rx="12" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="184" y="571" class="chip">`h1` 글 제목</text>
  <rect x="156" y="592" width="350" height="28" rx="12" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="182" y="611" class="chip">본문은 article 안에서 독립적으로 소비된다</text>
  <rect x="156" y="628" width="350" height="44" rx="14" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="184" y="656" class="chip">`section aria-labelledby="comments-title"`</text>

  <rect x="576" y="484" width="154" height="164" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="608" y="528" class="nodeTitle">`aside`</text>
  <text x="606" y="556" class="nodeText">관련 글, 광고,</text>
  <text x="614" y="580" class="nodeText">보조 정보</text>

  <rect x="96" y="686" width="664" height="36" rx="18" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="126" y="710" class="chip">`footer`</text>

  <rect x="840" y="252" width="384" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="868" y="292" class="section">ASSISTIVE TECH VIEW</text>
  <text x="868" y="330" class="panelTitle">스크린 리더가 훑는 순서</text>

  <rect x="868" y="360" width="328" height="48" rx="16" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="898" y="390" class="chip">1. banner landmark: `header`</text>

  <rect x="868" y="424" width="328" height="48" rx="16" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="898" y="454" class="chip">2. navigation: 메인 메뉴</text>

  <rect x="868" y="488" width="328" height="48" rx="16" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="898" y="518" class="chip">3. main landmark: 페이지의 핵심 영역</text>

  <rect x="868" y="552" width="328" height="48" rx="16" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="898" y="582" class="chip">4. article: 독립적으로 읽을 수 있는 본문</text>

  <rect x="868" y="616" width="328" height="48" rx="16" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="898" y="646" class="chip">5. section: 제목으로 구분된 하위 묶음</text>

  <rect x="868" y="680" width="328" height="48" rx="16" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="898" y="710" class="chip">6. complementary / contentinfo</text>

  <text x="84" y="774" class="footnote">읽는 법: div를 쌓기 전에 이 조각이 landmark인지, 독립 본문인지, 같은 주제의 하위 묶음인지부터 먼저 결정한다.</text>
</svg>
