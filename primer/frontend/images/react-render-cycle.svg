<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">REACT MENTAL MODEL</text>
  <text x="72" y="112" class="title">React를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">상태 소유권, 순수 렌더, 외부 시스템 동기화 경계를 먼저 정하면 훅과 상태 관리 선택이 훨씬 쉬워진다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. OWNERSHIP</text>
  <text x="102" y="252" class="cardTitle">상태는 누가 소유하는가?</text>
  <text x="102" y="280" class="cardText">가장 가까운 공통 부모까지 올리고,</text>
  <text x="102" y="302" class="cardText">props는 아래로, 이벤트는 위로 흐르게 둔다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. RENDER</text>
  <text x="490" y="252" class="cardTitle">렌더는 무엇을 계산하는가?</text>
  <text x="490" y="280" class="cardText">props와 state만으로 다음 UI 트리를 계산하는</text>
  <text x="490" y="302" class="cardText">순수 단계로 유지해야 예측 가능해진다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. SYNC</text>
  <text x="878" y="252" class="cardTitle">effect는 언제 필요한가?</text>
  <text x="878" y="280" class="cardText">commit 뒤에 fetch, timer, subscription,</text>
  <text x="878" y="302" class="cardText">DOM API와 동기화할 때만 둔다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">UPDATE WALKTHROUGH</text>

  <line x1="154" y1="560" x2="1080" y2="560" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="488" width="156" height="144" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="118" y="534" class="nodeTitle">사용자 이벤트</text>
  <text x="118" y="562" class="nodeText">click, input, submit</text>
  <text x="118" y="584" class="nodeText">이벤트 핸들러 실행</text>

  <rect x="286" y="488" width="168" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="326" y="534" class="nodeTitle">state update</text>
  <text x="320" y="562" class="nodeText">`setState` 또는</text>
  <text x="324" y="584" class="nodeText">`dispatch` 예약</text>

  <rect x="496" y="488" width="190" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="534" y="534" class="nodeTitle">render phase</text>
  <text x="528" y="562" class="nodeText">다음 컴포넌트 트리와</text>
  <text x="532" y="584" class="nodeText">JSX 출력 계산</text>

  <rect x="728" y="488" width="170" height="144" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="764" y="534" class="nodeTitle">commit</text>
  <text x="760" y="562" class="nodeText">DOM 반영, ref 연결,</text>
  <text x="760" y="584" class="nodeText">화면 갱신</text>

  <rect x="940" y="488" width="178" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="980" y="534" class="nodeTitle">effect</text>
  <text x="966" y="562" class="nodeText">fetch, timer, DOM API,</text>
  <text x="972" y="584" class="nodeText">subscription 동기화</text>

  <rect x="354" y="652" width="552" height="58" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="384" y="688" class="chip">핵심은 렌더 단계 안에 외부 시스템 쓰기를 넣지 않고, 이벤트와 effect의 역할을 분리하는 것이다.</text>

  <text x="84" y="724" class="footnote">읽는 법: 어떤 이벤트가 어떤 state update를 만들고, 그 update가 어떤 렌더를 거쳐 commit과 effect로 이어지는지 먼저 따라간다.</text>
</svg>
