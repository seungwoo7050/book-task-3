<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SERVER STATE FLOW</text>
  <text x="72" y="112" class="title">React Query의 조회와 mutation 순환</text>
  <text x="72" y="142" class="subtitle">컴포넌트는 서버 상태를 직접 소유하지 않고, QueryClient 캐시를 구독한다. mutation은 그 캐시를 다시 최신화하는 경로다.</text>

  <rect x="56" y="208" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">CACHE LIFECYCLE</text>

  <rect x="92" y="374" width="244" height="168" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="124" y="420" class="nodeTitle">useQuery 컴포넌트</text>
  <text x="124" y="448" class="nodeText">`queryKey: ["users"]`로</text>
  <text x="124" y="472" class="nodeText">캐시를 구독하고 loading/error/data를 받는다</text>

  <rect x="420" y="320" width="432" height="218" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="456" y="366" class="nodeTitle">QueryClient cache</text>
  <text x="456" y="394" class="nodeText">queryKey별로 fresh/stale 상태와 데이터를 보관</text>
  <rect x="456" y="430" width="140" height="36" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="486" y="454" class="chip">["users"]</text>
  <rect x="610" y="430" width="116" height="36" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="638" y="454" class="chip">fresh</text>
  <rect x="456" y="482" width="252" height="36" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="482" y="506" class="chip">구독 중인 컴포넌트에 결과 배포</text>

  <rect x="916" y="262" width="224" height="140" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="948" y="308" class="nodeTitle">fetch 함수</text>
  <text x="948" y="336" class="nodeText">stale이거나 invalidation되면</text>
  <text x="948" y="360" class="nodeText">API를 다시 호출한다.</text>

  <rect x="916" y="474" width="224" height="166" rx="24" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="948" y="520" class="nodeTitle">mutation</text>
  <text x="948" y="548" class="nodeText">POST/PUT/DELETE로 서버를 바꾸고</text>
  <text x="948" y="572" class="nodeText">성공 시 `invalidateQueries` 호출</text>
  <rect x="948" y="594" width="162" height="30" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="972" y="614" class="chip">관련 query 다시 stale 처리</text>

  <line x1="336" y1="458" x2="420" y2="430" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="852" y1="392" x2="916" y2="332" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1028" y1="402" x2="1028" y2="474" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="916" y1="592" x2="852" y2="538" stroke="#D5786F" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="284" y="602" width="528" height="58" rx="18" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="314" y="638" class="chip">핵심은 로컬 `loading` state를 늘리는 대신, 캐시와 stale 정책을 기준으로 서버 상태를 다루는 것이다.</text>

  <text x="84" y="744" class="footnote">읽는 법: 컴포넌트는 캐시를 구독하고, fetch는 캐시를 채우고, mutation은 캐시를 무효화해서 다시 최신 상태를 가져오게 만든다.</text>
</svg>
