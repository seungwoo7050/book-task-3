<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">BROWSER BOUNDARY</text>
  <text x="72" y="112" class="title">브라우저에 노출되는 env와 asset 경계</text>
  <text x="72" y="142" class="subtitle">환경 변수와 정적 파일은 둘 다 "브라우저 번들에 들어가는가"라는 기준으로 보면 실수가 줄어든다.</text>

  <rect x="56" y="208" width="560" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">ENV EXPOSURE</text>

  <rect x="96" y="304" width="220" height="120" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="128" y="350" class="nodeTitle">`.env*` 파일</text>
  <text x="128" y="378" class="nodeText">개발/빌드 시점에 값 로드</text>

  <rect x="356" y="280" width="220" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="388" y="326" class="nodeTitle">`VITE_` 접두사</text>
  <text x="388" y="354" class="nodeText">`import.meta.env`로</text>
  <text x="388" y="378" class="nodeText">브라우저 코드에 주입</text>

  <rect x="356" y="466" width="220" height="144" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="388" y="512" class="nodeTitle">접두사 없음</text>
  <text x="388" y="540" class="nodeText">브라우저에 자동 노출되지 않음</text>
  <text x="388" y="564" class="nodeText">비밀 값은 여기에 둔다</text>

  <rect x="664" y="208" width="560" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="692" y="248" class="section">ASSET HANDLING</text>

  <rect x="704" y="304" width="220" height="144" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="736" y="350" class="nodeTitle">`public/`</text>
  <text x="736" y="378" class="nodeText">그대로 복사</text>
  <text x="736" y="402" class="nodeText">절대 경로(`/logo.png`)로 접근</text>

  <rect x="964" y="304" width="220" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="996" y="350" class="nodeTitle">`src` import</text>
  <text x="996" y="378" class="nodeText">번들링, 해싱, 최적화</text>
  <text x="996" y="402" class="nodeText">코드와 함께 그래프에 포함</text>

  <rect x="704" y="496" width="480" height="96" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="736" y="542" class="nodeText">규칙: 브라우저에서 import해야 하면 `src`에 두고, URL만 필요하면 `public/`,</text>
  <text x="736" y="566" class="nodeText">민감한 값은 `VITE_` 없이 번들 바깥에 둔다.</text>

  <text x="84" y="744" class="footnote">읽는 법: 값과 파일을 각각 "브라우저에 들어가야 하는가"로 먼저 판단하면 `VITE_` 누락, public import, 비밀 값 노출 같은 실수를 많이 줄일 수 있다.</text>
</svg>
