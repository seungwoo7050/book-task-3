<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">ANIMATION THREADING</text>
  <text x="72" y="112" class="title">Reanimated와 gesture가 움직이는 스레드 경로</text>
  <text x="72" y="142" class="subtitle">터치와 애니메이션 계산을 JS 스레드에 모두 올리면 끊김이 생기기 쉽다. Reanimated는 그 경로를 줄이는 데 강하다.</text>

  <rect x="56" y="208" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">THREAD COMPARISON</text>

  <rect x="96" y="302" width="506" height="340" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="126" y="346" class="nodeTitle">일반 JS 경로</text>
  <text x="126" y="374" class="nodeText">gesture 이벤트가 JS 스레드로 올라가고, 상태 변경과 렌더를 거친 뒤에야 화면이 갱신된다.</text>
  <rect x="126" y="430" width="150" height="70" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="164" y="472" class="chip">Gesture event</text>
  <rect x="314" y="430" width="150" height="70" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="360" y="472" class="chip">JS state</text>
  <rect x="126" y="536" width="338" height="70" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="160" y="578" class="chip">JS가 바쁘면 프레임 드랍이 커짐</text>

  <rect x="678" y="302" width="506" height="340" rx="24" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="708" y="346" class="nodeTitle">Gesture Handler + Reanimated</text>
  <text x="708" y="374" class="nodeText">gesture와 worklet이 UI 스레드 가까이에서 값과 transform을 갱신해 드래그와 스프링이 더 안정적이다.</text>
  <rect x="708" y="430" width="150" height="70" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="736" y="472" class="chip">Gesture Handler</text>
  <rect x="896" y="430" width="150" height="70" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="936" y="472" class="chip">UI worklet</text>
  <rect x="708" y="536" width="338" height="70" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="742" y="578" class="chip">JS가 바빠도 인터랙션이 비교적 안정적</text>

  <line x1="276" y1="465" x2="314" y2="465" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="858" y1="465" x2="896" y2="465" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="744" class="footnote">읽는 법: drag나 swipe 같은 제스처 중심 인터랙션이면 가능한 한 오른쪽 경로로 보내고, 애니메이션 엔진을 섞지 않는 편이 디버깅과 성능 모두 유리하다.</text>
</svg>
