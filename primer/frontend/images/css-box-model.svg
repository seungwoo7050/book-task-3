<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .metric { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">BOX MODEL</text>
  <text x="72" y="112" class="title">박스 크기를 계산하는 실제 순서</text>
  <text x="72" y="142" class="subtitle">같은 `width: 200px`라도 `box-sizing`이 무엇인지에 따라 최종 차지 폭이 완전히 달라진다.</text>

  <rect x="56" y="200" width="764" height="544" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="240" class="section">LAYERS</text>

  <rect x="106" y="286" width="664" height="372" rx="30" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="136" y="324" class="nodeTitle">margin</text>

  <rect x="170" y="350" width="536" height="244" rx="28" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="200" y="388" class="nodeTitle">border</text>

  <rect x="234" y="414" width="408" height="116" rx="24" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="264" y="452" class="nodeTitle">padding</text>

  <rect x="314" y="450" width="248" height="44" rx="18" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="356" y="478" class="metric">content width × height</text>

  <rect x="860" y="200" width="364" height="544" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="888" y="240" class="section">SIZE COMPARISON</text>

  <rect x="888" y="276" width="308" height="92" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="916" y="316" class="nodeTitle">예제 선언</text>
  <text x="916" y="344" class="nodeText">width 200px, padding 20px, border 1px</text>

  <rect x="888" y="392" width="308" height="132" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="918" y="436" class="nodeTitle">content-box</text>
  <text x="918" y="464" class="nodeText">선언한 200px는 content만 의미</text>
  <text x="918" y="488" class="nodeText">실제 차지 폭 = 200 + 40 + 2</text>
  <text x="918" y="512" class="metric">242px</text>

  <rect x="888" y="548" width="308" height="132" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="918" y="592" class="nodeTitle">border-box</text>
  <text x="918" y="620" class="nodeText">선언한 200px 안에 padding과 border 포함</text>
  <text x="918" y="644" class="nodeText">대부분의 앱 레이아웃에 더 직관적</text>
  <text x="918" y="668" class="metric">200px</text>

  <text x="84" y="774" class="footnote">읽는 법: content는 내용, padding은 안쪽 여백, border는 테두리, margin은 바깥 여백이다. 최종 폭을 단순하게 유지하려면 보통 `border-box`를 기본값으로 둔다.</text>
</svg>
