<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">NEXT.JS MENTAL MODEL</text>
  <text x="72" y="112" class="title">Next.js 요청을 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">route segment, 서버/클라이언트 경계, fetch 캐시 정책을 먼저 정하면 App Router 구조가 빠르게 읽힌다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. ROUTE</text>
  <text x="102" y="252" class="cardTitle">어떤 segment가 매칭되는가?</text>
  <text x="102" y="280" class="cardText">middleware 뒤에 layout, page, loading, error가</text>
  <text x="102" y="302" class="cardText">어느 경계에 붙는지 먼저 본다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. BOUNDARY</text>
  <text x="490" y="252" class="cardTitle">무엇을 서버에 남길 것인가?</text>
  <text x="490" y="280" class="cardText">DB 접근과 async fetch는 서버에 두고,</text>
  <text x="490" y="302" class="cardText">인터랙션이 필요한 부분만 클라이언트로 자른다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. CACHE</text>
  <text x="878" y="252" class="cardTitle">이 fetch는 얼마나 오래 유지되는가?</text>
  <text x="878" y="280" class="cardText">static, revalidate, no-store 중 무엇인지가</text>
  <text x="878" y="302" class="cardText">실제 렌더링 모드를 바꾼다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">REQUEST WALKTHROUGH</text>

  <line x1="150" y1="560" x2="1088" y2="560" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="486" width="150" height="148" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="116" y="532" class="nodeTitle">브라우저 요청</text>
  <text x="116" y="560" class="nodeText">URL, cookies, headers</text>
  <text x="116" y="582" class="nodeText">서버로 전달</text>

  <rect x="274" y="486" width="170" height="148" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="306" y="532" class="nodeTitle">middleware</text>
  <text x="306" y="560" class="nodeText">redirect, rewrite, auth</text>
  <text x="306" y="582" class="nodeText">matcher 기준 선처리</text>

  <rect x="480" y="486" width="182" height="148" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="516" y="532" class="nodeTitle">route match</text>
  <text x="516" y="560" class="nodeText">layout/page/loading/error</text>
  <text x="536" y="582" class="nodeText">segment 조립</text>

  <rect x="698" y="462" width="214" height="172" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="736" y="508" class="nodeTitle">서버 렌더링</text>
  <text x="736" y="536" class="nodeText">서버 컴포넌트 fetch</text>
  <text x="736" y="560" class="nodeText">cache / revalidate 결정</text>
  <rect x="736" y="584" width="140" height="30" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="758" y="604" class="chip">static / ISR / no-store</text>

  <rect x="948" y="486" width="176" height="148" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="980" y="532" class="nodeTitle">스트리밍 응답</text>
  <text x="980" y="560" class="nodeText">HTML + RSC payload</text>
  <text x="982" y="582" class="nodeText">클라이언트 섬 hydrate</text>

  <rect x="384" y="652" width="520" height="58" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="414" y="688" class="chip">핵심은 "어떤 파일이 어떤 요청에 참여하는지"와 "어디서 캐시가 끊기는지"를 먼저 보는 것이다.</text>

  <text x="84" y="724" class="footnote">읽는 법: 요청이 middleware와 segment 매칭을 거쳐 서버 렌더로 들어가고, 마지막에 클라이언트 섬만 hydrate된다는 흐름으로 전체 문서를 읽는다.</text>
</svg>
