<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1114" cy="108" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="144" cy="694" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C++ VIRTUAL DISPATCH</text>
  <text x="72" y="112" class="title">부모 타입으로 받아도 실제 구현이 호출된다</text>
  <text x="72" y="144" class="subtitle">가상 함수는 호출 시점에 실제 객체 타입을 보고 구현을 고른다. 이것이 다형성의 핵심이다.</text>

  <text x="84" y="214" class="section">CALL PATH</text>

  <rect x="72" y="248" width="252" height="184" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="108" y="304" class="nodeTitle">print_area(shape)</text>
  <text x="108" y="332" class="nodeText">매개변수 타입은 Shape reference</text>
  <text x="108" y="360" class="nodeText">호출 지점은 부모 인터페이스만 안다</text>

  <rect x="388" y="248" width="252" height="184" rx="28" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="424" y="304" class="nodeTitle">Shape</text>
  <text x="424" y="332" class="nodeText">virtual area()</text>
  <text x="424" y="360" class="nodeText">virtual destructor</text>
  <rect x="424" y="382" width="164" height="34" rx="17" fill="#EEF7FF" stroke="#BCD5EE"/>
  <text x="454" y="405" class="chip">interface contract</text>

  <rect x="742" y="206" width="220" height="184" rx="28" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="778" y="262" class="nodeTitle">Circle</text>
  <text x="778" y="290" class="nodeText">area() override</text>
  <text x="778" y="318" class="nodeText">radius 기반 계산</text>

  <rect x="742" y="430" width="220" height="184" rx="28" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="778" y="486" class="nodeTitle">Rectangle</text>
  <text x="778" y="514" class="nodeText">area() override</text>
  <text x="778" y="542" class="nodeText">width x height 계산</text>

  <rect x="1016" y="248" width="176" height="184" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="1052" y="304" class="nodeTitle">결과</text>
  <text x="1052" y="332" class="nodeText">실제 객체 구현이</text>
  <text x="1052" y="360" class="nodeText">런타임에 선택된다</text>

  <line x1="324" y1="340" x2="388" y2="340" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="340" x2="742" y2="298" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="340" x2="742" y2="522" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="962" y1="298" x2="1016" y2="320" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="962" y1="522" x2="1016" y2="360" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="220" y="632" width="752" height="92" rx="24" fill="#FFF3ED" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="256" y="674" class="nodeTitle">왜 virtual destructor가 필요한가</text>
  <text x="256" y="702" class="nodeText">부모 포인터로 자식을 삭제할 때, 소멸자도 실제 타입 기준으로 호출되어야 자식 자원이 정상 정리된다.</text>
</svg>
