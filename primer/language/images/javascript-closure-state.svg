<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1114" cy="108" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="144" cy="694" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">JAVASCRIPT CLOSURE</text>
  <text x="72" y="112" class="title">클로저는 함수와 렉시컬 환경을 함께 보관한다</text>
  <text x="72" y="144" class="subtitle">함수가 반환된 뒤에도 내부 함수가 바깥 변수에 접근할 수 있는 이유는, 스코프 정보가 같이 살아 있기 때문이다.</text>

  <text x="84" y="214" class="section">STATE LIFECYCLE</text>

  <rect x="82" y="248" width="284" height="362" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="118" y="304" class="nodeTitle">createCounter()</text>
  <text x="118" y="332" class="nodeText">호출될 때 count = 0 환경이 만들어진다</text>
  <rect x="118" y="390" width="190" height="88" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="152" y="430" class="nodeTitle">count</text>
  <text x="152" y="458" class="nodeText">외부 변수 한 칸</text>

  <rect x="498" y="248" width="292" height="362" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="534" y="304" class="nodeTitle">반환된 메서드</text>
  <text x="534" y="332" class="nodeText">increment 와 getCount 가 같은 환경을 공유</text>
  <rect x="534" y="392" width="220" height="72" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="566" y="434" class="nodeText">increment -> ++count</text>
  <rect x="534" y="490" width="220" height="72" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="560" y="532" class="nodeText">getCount -> count 읽기</text>

  <rect x="928" y="248" width="268" height="362" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="964" y="304" class="nodeTitle">이후 호출</text>
  <text x="964" y="332" class="nodeText">함수 실행은 끝났어도</text>
  <text x="964" y="360" class="nodeText">count 값은 계속 유지된다</text>
  <rect x="964" y="438" width="180" height="88" rx="20" fill="#F3EEFF" stroke="#D8CCF6"/>
  <text x="994" y="478" class="nodeTitle">count = 2</text>
  <text x="986" y="506" class="nodeText">두 번 increment 후 상태</text>

  <line x1="366" y1="434" x2="498" y2="434" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="434" x2="928" y2="478" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
