<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="1118" cy="106" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="150" cy="680" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C++ RAII</text>
  <text x="72" y="112" class="title">자원 획득과 해제를 스코프에 묶기</text>
  <text x="72" y="144" class="subtitle">정상 종료든 예외든, 스코프를 벗어나는 순간 정리 코드가 실행되도록 만드는 패턴이 RAII다.</text>

  <text x="84" y="214" class="section">SCOPE LIFECYCLE</text>

  <rect x="72" y="258" width="228" height="146" rx="26" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="108" y="314" class="nodeTitle">1. 생성자 진입</text>
  <text x="108" y="342" class="nodeText">파일, lock, 소켓을 얻는다</text>

  <rect x="356" y="258" width="228" height="146" rx="26" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="392" y="314" class="nodeTitle">2. 객체 보유</text>
  <text x="392" y="342" class="nodeText">자원이 객체 내부 필드에 저장된다</text>

  <rect x="640" y="258" width="228" height="146" rx="26" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="676" y="314" class="nodeTitle">3. 작업 수행</text>
  <text x="676" y="342" class="nodeText">함수 본문에서 자원을 사용한다</text>

  <rect x="924" y="258" width="228" height="146" rx="26" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="960" y="314" class="nodeTitle">4. 소멸자 실행</text>
  <text x="960" y="342" class="nodeText">스코프 종료와 함께 자동 정리</text>

  <line x1="300" y1="331" x2="356" y2="331" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="584" y1="331" x2="640" y2="331" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="868" y1="331" x2="924" y2="331" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="184" y="500" width="912" height="160" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="220" y="554" class="nodeTitle">중간에 return 하거나 예외가 나도 정리되는 이유</text>
  <text x="220" y="582" class="nodeText">스택 해제가 시작되면 현재 스코프의 객체 소멸자가 역순으로 호출된다. 그래서 fclose, unlock, delete를 직접 흩뿌리지 않아도 된다.</text>
  <text x="220" y="620" class="nodeText">std::lock_guard, std::unique_ptr, std::fstream 같은 표준 타입들이 모두 같은 원리를 따른다.</text>
</svg>
