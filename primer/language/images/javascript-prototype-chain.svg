<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1114" cy="108" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="144" cy="694" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">JAVASCRIPT PROTOTYPE</text>
  <text x="72" y="112" class="title">메서드는 인스턴스보다 보통 prototype에 있다</text>
  <text x="72" y="144" class="subtitle">class 문법은 보기 좋게 감싼 형태일 뿐이고, 실제 메서드 탐색은 prototype chain을 따라 올라가며 일어난다.</text>

  <text x="84" y="214" class="section">LOOKUP CHAIN</text>

  <rect x="112" y="286" width="190" height="116" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="148" y="334" class="nodeTitle">dog 인스턴스</text>
  <text x="148" y="362" class="nodeText">name 같은 개별 상태</text>

  <rect x="390" y="286" width="210" height="116" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="426" y="334" class="nodeTitle">Dog.prototype</text>
  <text x="426" y="362" class="nodeText">speak 메서드</text>

  <rect x="690" y="286" width="230" height="116" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="726" y="334" class="nodeTitle">Animal.prototype</text>
  <text x="726" y="362" class="nodeText">부모 메서드</text>

  <rect x="1010" y="286" width="182" height="116" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="1046" y="334" class="nodeTitle">Object.prototype</text>
  <text x="1046" y="362" class="nodeText">기본 메서드</text>

  <rect x="520" y="520" width="240" height="106" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="556" y="566" class="nodeTitle">instanceof 검사</text>
  <text x="556" y="594" class="nodeText">체인 위에 특정 prototype이 있는지 본다</text>

  <line x1="302" y1="344" x2="390" y2="344" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="344" x2="690" y2="344" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="920" y1="344" x2="1010" y2="344" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M510 402 C510 452 560 470 590 520" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
