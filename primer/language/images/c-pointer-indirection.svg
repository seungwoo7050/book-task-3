<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF8EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
    .slot { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1114" cy="110" r="100" fill="#DDF1E8" fill-opacity="0.7"/>
  <circle cx="148" cy="702" r="138" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C POINTER MODEL</text>
  <text x="72" y="112" class="title">주소를 한 번 더 따라가면 무엇이 바뀌는가</text>
  <text x="72" y="144" class="subtitle">포인터, 배열, 이중 포인터는 모두 "어느 주소를 저장하느냐"만 다르고 규칙은 같다.</text>

  <text x="84" y="210" class="section">VALUE AND POINTER</text>
  <rect x="72" y="238" width="336" height="448" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <rect x="106" y="294" width="120" height="92" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="142" y="334" class="nodeTitle">x</text>
  <text x="128" y="362" class="nodeText">값 42 저장</text>
  <rect x="246" y="294" width="126" height="92" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="276" y="334" class="nodeTitle">ptr</text>
  <text x="264" y="362" class="nodeText">x의 주소 보관</text>
  <line x1="246" y1="340" x2="226" y2="340" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="120" y="438" width="236" height="92" rx="20" fill="#F6FAFF" stroke="#D2E0EC"/>
  <text x="154" y="478" class="nodeText">`&amp;x` -> x가 놓인 주소를 꺼낸다</text>
  <text x="154" y="506" class="nodeText">`*ptr` -> 그 주소로 가서 값을 읽거나 쓴다</text>
  <rect x="138" y="566" width="202" height="44" rx="22" fill="#EEF7FF" stroke="#BCD5EE"/>
  <text x="174" y="594" class="chip">*ptr = 100 이면 x도 100</text>

  <text x="472" y="210" class="section">ARRAY DECAY</text>
  <rect x="456" y="238" width="364" height="448" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="492" y="292" class="nodeTitle">arr 와 p</text>
  <text x="492" y="320" class="nodeText">배열 이름은 첫 요소 주소처럼 읽힌다</text>
  <rect x="494" y="372" width="64" height="88" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="516" y="414" class="slot">10</text>
  <rect x="566" y="372" width="64" height="88" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="588" y="414" class="slot">20</text>
  <rect x="638" y="372" width="64" height="88" rx="18" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="660" y="414" class="slot">30</text>
  <rect x="710" y="372" width="64" height="88" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="732" y="414" class="slot">40</text>
  <text x="510" y="484" class="nodeText">`int *p = arr;` 는 `&amp;arr[0]`와 같다</text>
  <path d="M620 348 C620 330 670 330 670 360" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <rect x="520" y="544" width="234" height="88" rx="20" fill="#F6FAFF" stroke="#D2E0EC"/>
  <text x="548" y="582" class="nodeText">`*(p + 2)` 와 `p[2]`는</text>
  <text x="548" y="610" class="nodeText">세 번째 칸 `30`을 가리킨다</text>

  <text x="884" y="210" class="section">POINTER TO POINTER</text>
  <rect x="872" y="238" width="336" height="448" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="908" y="292" class="nodeTitle">allocate(&amp;arr, 10)</text>
  <text x="908" y="320" class="nodeText">함수가 arr 변수 자체를 새 힙 주소로 바꾼다</text>
  <rect x="910" y="376" width="118" height="92" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="944" y="416" class="nodeTitle">arr</text>
  <text x="932" y="444" class="nodeText">힙 시작 주소</text>
  <rect x="1048" y="376" width="122" height="92" rx="20" fill="#EEF7EF" stroke="#B9DEC9"/>
  <text x="1068" y="416" class="nodeTitle">*ptr</text>
  <text x="1064" y="444" class="nodeText">arr를 가리킴</text>
  <line x1="1048" y1="422" x2="1028" y2="422" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="908" y="536" width="236" height="96" rx="20" fill="#FFF3ED" stroke="#F0B7AF"/>
  <text x="938" y="576" class="nodeText">`int **ptr` 이면 한 번 역참조한</text>
  <text x="938" y="604" class="nodeText">위치에 새 주소를 써 넣을 수 있다</text>
  <path d="M968 468 C968 506 928 510 928 536" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M968 468 C968 500 1088 500 1088 536" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
