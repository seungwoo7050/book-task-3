<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">KOTLIN COROUTINES</text>
  <text x="72" y="112" class="title">필요한 결과 형태에 따라 코루틴 도구를 고르기</text>
  <text x="72" y="144" class="subtitle">코루틴은 하나의 API가 아니라 launch, async, withContext, Flow 같은 도구 묶음이다. 무엇을 반환할지 먼저 정하면 선택이 쉬워진다.</text>

  <text x="84" y="214" class="section">TOOLBOX</text>

  <rect x="82" y="252" width="240" height="144" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="118" y="308" class="nodeTitle">launch</text>
  <text x="118" y="336" class="nodeText">반환값 없는 작업 시작</text>

  <rect x="364" y="252" width="240" height="144" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="400" y="308" class="nodeTitle">async</text>
  <text x="400" y="336" class="nodeText">Deferred 로 단일 값 반환</text>

  <rect x="646" y="252" width="240" height="144" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="682" y="308" class="nodeTitle">withContext</text>
  <text x="682" y="336" class="nodeText">dispatcher 전환 후 결과 반환</text>

  <rect x="928" y="252" width="240" height="144" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="964" y="308" class="nodeTitle">Flow</text>
  <text x="964" y="336" class="nodeText">시간에 따라 여러 값 emit</text>

  <rect x="316" y="520" width="648" height="164" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="352" y="576" class="nodeTitle">dispatcher 기준</text>
  <text x="352" y="604" class="nodeText">Main은 UI, IO는 네트워크와 파일, Default는 CPU 작업에 배치한다.</text>
  <text x="352" y="632" class="nodeText">Flow는 collect 시점에서 실제 실행이 이어지므로, 생산과 소비 위치를 같이 봐야 한다.</text>
</svg>
