<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C++ CONTAINER CHOICE</text>
  <text x="72" y="112" class="title">접근 패턴으로 STL 컨테이너를 고르기</text>
  <text x="72" y="144" class="subtitle">C++에서는 자료구조를 직접 만들기보다, 필요한 연산을 먼저 정하고 그 연산에 맞는 컨테이너를 고른다.</text>

  <text x="84" y="214" class="section">DECISION TREE</text>

  <rect x="448" y="228" width="388" height="106" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="486" y="276" class="nodeTitle">주요 연산이 무엇인가?</text>
  <text x="486" y="304" class="nodeText">순차 저장, 키 조회, top 추출, 양끝 삽입 중 무엇이 중심인지 먼저 본다</text>

  <rect x="78" y="420" width="248" height="120" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="114" y="470" class="nodeTitle">vector</text>
  <text x="114" y="498" class="nodeText">임의 접근, append, 순차 순회</text>

  <rect x="366" y="420" width="248" height="120" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="402" y="470" class="nodeTitle">unordered_map</text>
  <text x="402" y="498" class="nodeText">정렬 불필요, 빠른 키 조회</text>

  <rect x="654" y="420" width="248" height="120" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="690" y="470" class="nodeTitle">map / set</text>
  <text x="690" y="498" class="nodeText">정렬 유지, 범위 탐색, O(log n)</text>

  <rect x="942" y="420" width="248" height="120" rx="24" fill="#F3EEFF" stroke="#D8CCF6" filter="url(#shadow)"/>
  <text x="978" y="470" class="nodeTitle">priority_queue</text>
  <text x="978" y="498" class="nodeText">항상 top 원소를 빠르게 꺼냄</text>

  <rect x="510" y="620" width="264" height="110" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="546" y="666" class="nodeTitle">deque</text>
  <text x="546" y="694" class="nodeText">앞뒤 삽입이 모두 많을 때 선택</text>

  <line x1="642" y1="334" x2="202" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="642" y1="334" x2="490" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="642" y1="334" x2="778" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="642" y1="334" x2="1066" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="642" y1="334" x2="642" y2="620" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="122" y="360" width="158" height="36" rx="18" fill="#EEF7FF" stroke="#BCD5EE"/>
  <text x="154" y="384" class="chip">index access</text>
  <rect x="418" y="360" width="144" height="36" rx="18" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="452" y="384" class="chip">hash lookup</text>
  <rect x="706" y="360" width="152" height="36" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="732" y="384" class="chip">ordered keys</text>
  <rect x="994" y="360" width="144" height="36" rx="18" fill="#F4F0FF" stroke="#D8CCF6"/>
  <text x="1024" y="384" class="chip">top only</text>
  <rect x="576" y="564" width="132" height="36" rx="18" fill="#FFFFFF" stroke="#CDDCE9"/>
  <text x="604" y="588" class="chip">push front/back</text>
</svg>
