<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">KOTLIN SCOPE FUNCTIONS</text>
  <text x="72" y="112" class="title">반환값과 참조 방식으로 scope function 고르기</text>
  <text x="72" y="144" class="subtitle">다섯 함수는 비슷해 보이지만, 객체를 그대로 돌려줄지 람다 결과를 돌려줄지 먼저 정하면 선택이 간단해진다.</text>

  <text x="84" y="214" class="section">CHOICE MAP</text>

  <rect x="458" y="226" width="364" height="98" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="496" y="272" class="nodeTitle">무엇을 반환하고 싶은가?</text>
  <text x="496" y="300" class="nodeText">객체 자체인지, 람다 계산 결과인지가 첫 분기다</text>

  <rect x="96" y="420" width="210" height="136" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="132" y="476" class="nodeTitle">apply</text>
  <text x="132" y="504" class="nodeText">this 로 설정 후 객체 반환</text>

  <rect x="356" y="420" width="210" height="136" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="392" y="476" class="nodeTitle">also</text>
  <text x="392" y="504" class="nodeText">it 로 부수 효과 후 객체 반환</text>

  <rect x="616" y="420" width="210" height="136" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="652" y="476" class="nodeTitle">run</text>
  <text x="652" y="504" class="nodeText">this 로 계산 후 결과 반환</text>

  <rect x="876" y="420" width="210" height="136" rx="24" fill="#F3EEFF" stroke="#D8CCF6" filter="url(#shadow)"/>
  <text x="912" y="476" class="nodeTitle">let</text>
  <text x="912" y="504" class="nodeText">it 로 변환, null 체크에 자주 사용</text>

  <rect x="520" y="646" width="210" height="108" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="556" y="692" class="nodeTitle">with</text>
  <text x="556" y="720" class="nodeText">객체를 인자로 받고 그룹 호출 후 결과 반환</text>

  <line x1="640" y1="324" x2="200" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="324" x2="462" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="324" x2="722" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="324" x2="982" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="722" y1="556" x2="625" y2="646" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
