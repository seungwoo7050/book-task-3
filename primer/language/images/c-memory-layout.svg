<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1200" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FDF7EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="106" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="134" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C MEMORY LAYOUT</text>
  <text x="72" y="112" class="title">프로세스 메모리 구역은 수명 규칙이 다르다</text>
  <text x="72" y="144" class="subtitle">값이 어느 구역에 놓이는지 먼저 정하면 스택 반환, 누수, use-after-free를 빠르게 구분할 수 있다.</text>

  <text x="84" y="210" class="section">MEMORY MAP</text>
  <rect x="72" y="236" width="416" height="520" rx="30" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="372" y="282" class="chip">높은 주소</text>
  <rect x="132" y="302" width="296" height="102" rx="22" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="172" y="348" class="nodeTitle">Stack</text>
  <text x="172" y="376" class="nodeText">지역 변수, 함수 프레임</text>

  <rect x="132" y="428" width="296" height="102" rx="22" fill="#F8FBFF" stroke="#D2E0EC"/>
  <text x="172" y="474" class="nodeTitle">Free Space</text>
  <text x="172" y="502" class="nodeText">힙과 스택이 서로를 향해 자란다</text>

  <rect x="132" y="554" width="296" height="102" rx="22" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="172" y="600" class="nodeTitle">Heap</text>
  <text x="172" y="628" class="nodeText">`malloc`, `calloc`, `realloc`, `free`</text>

  <rect x="132" y="680" width="296" height="56" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="172" y="716" class="nodeText">Data / BSS / Text -> 전역, 정적, 코드</text>

  <path d="M456 332 C486 332 504 332 524 332" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M456 584 C486 584 504 584 524 584" stroke="#5B7592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M280 412 L280 424" stroke="#5B7592" stroke-width="4"/>
  <path d="M280 548 L280 534" stroke="#5B7592" stroke-width="4"/>

  <text x="548" y="210" class="section">LIFETIME RULES</text>
  <rect x="532" y="238" width="676" height="518" rx="30" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>

  <rect x="572" y="284" width="276" height="142" rx="24" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="608" y="334" class="nodeTitle">자동 수명</text>
  <text x="608" y="362" class="nodeText">스택 변수는 블록을 벗어나면 바로 사라진다</text>
  <text x="608" y="390" class="nodeText">지역 변수 주소를 반환하면 dangling pointer가 된다</text>

  <rect x="892" y="284" width="276" height="142" rx="24" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="928" y="334" class="nodeTitle">수동 수명</text>
  <text x="928" y="362" class="nodeText">힙 메모리는 직접 해제하기 전까지 남아 있다</text>
  <text x="928" y="390" class="nodeText">소유권과 해제 지점을 코드로 남겨야 한다</text>

  <rect x="572" y="474" width="596" height="142" rx="24" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="608" y="524" class="nodeTitle">자주 보는 버그 흐름</text>
  <text x="608" y="552" class="nodeText">free를 빼먹으면 leak, free 뒤 접근하면 use-after-free, 같은 포인터를 두 번 free하면 double free</text>
  <text x="608" y="580" class="nodeText">`realloc` 실패 시 원본 포인터는 그대로 남으므로 임시 변수로 받는 습관이 안전하다</text>

  <rect x="572" y="650" width="214" height="48" rx="24" fill="#EEF7FF" stroke="#BCD5EE"/>
  <text x="612" y="680" class="chip">Stack = 자동 회수</text>
  <rect x="812" y="650" width="218" height="48" rx="24" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="854" y="680" class="chip">Heap = 수동 해제</text>
  <rect x="1054" y="650" width="114" height="48" rx="24" fill="#FFF3ED" stroke="#F0B7AF"/>
  <text x="1088" y="680" class="chip">ASan</text>
</svg>
