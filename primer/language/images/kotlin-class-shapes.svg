<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">KOTLIN CLASS SHAPES</text>
  <text x="72" y="112" class="title">모델 의도에 따라 클래스 종류를 고르기</text>
  <text x="72" y="144" class="subtitle">Kotlin은 여러 종류의 클래스 문법을 제공한다. 어떤 의미를 드러내고 싶은지에 따라 선택하면 코드가 훨씬 명확해진다.</text>

  <text x="84" y="214" class="section">TYPE CHOICE</text>

  <rect x="84" y="254" width="238" height="144" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="120" y="310" class="nodeTitle">class</text>
  <text x="120" y="338" class="nodeText">일반 객체, 상태와 동작을 함께 표현</text>

  <rect x="364" y="254" width="238" height="144" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="400" y="310" class="nodeTitle">data class</text>
  <text x="400" y="338" class="nodeText">값 비교, copy, 구조 분해가 필요할 때</text>

  <rect x="644" y="254" width="238" height="144" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="680" y="310" class="nodeTitle">sealed class</text>
  <text x="680" y="338" class="nodeText">닫힌 상태 집합, when exhaustiveness</text>

  <rect x="924" y="254" width="238" height="144" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="960" y="310" class="nodeTitle">object</text>
  <text x="960" y="338" class="nodeText">전역 단일 인스턴스, singleton</text>

  <rect x="312" y="510" width="656" height="156" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="348" y="566" class="nodeTitle">sealed class와 when이 잘 맞는 이유</text>
  <text x="348" y="594" class="nodeText">하위 타입 집합이 고정되어 있으므로, `when`에서 빠진 분기를 컴파일러가 바로 알려 줄 수 있다.</text>
</svg>
