<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">QUERY DECISION</text>
  <text x="72" y="112" class="title">조회 모양에 따라 Drizzle API를 고른다</text>
  <text x="72" y="142" class="subtitle">세 API는 경쟁 관계가 아니라 역할 분담 관계다. 필요한 결과 형태를 먼저 정하면 선택이 쉬워진다.</text>

  <rect x="56" y="192" width="1168" height="548" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">API CHOICE TREE</text>

  <rect x="446" y="268" width="388" height="126" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="520" y="314" class="nodeTitle">필요한 결과 모양은?</text>
  <text x="504" y="342" class="nodeText">정교한 SQL, 중첩 객체, DB 기능 직접 호출 중 무엇인가?</text>

  <line x1="640" y1="394" x2="640" y2="456" stroke="#5E7895" stroke-width="4"/>
  <line x1="270" y1="456" x2="1010" y2="456" stroke="#5E7895" stroke-width="4"/>
  <line x1="300" y1="456" x2="300" y2="506" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="456" x2="640" y2="506" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="980" y1="456" x2="980" y2="506" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="138" y="506" width="324" height="166" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="220" y="552" class="nodeTitle">db.select()</text>
  <text x="176" y="580" class="nodeText">JOIN, GROUP BY, 집계, alias,</text>
  <text x="176" y="604" class="nodeText">반환 컬럼 모양을 직접 제어할 때 적합</text>
  <rect x="188" y="628" width="224" height="30" rx="15" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="222" y="648" class="chip">SQL에 가까운 기본 표면</text>

  <rect x="478" y="506" width="324" height="166" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="566" y="552" class="nodeTitle">db.query</text>
  <text x="516" y="580" class="nodeText">relations를 따라 `with`로</text>
  <text x="516" y="604" class="nodeText">중첩 객체를 읽고 싶을 때 적합</text>
  <rect x="528" y="628" width="224" height="30" rx="15" fill="#FFF9EC" stroke="#E9D29D"/>
  <text x="560" y="648" class="chip">읽기 편한 relation 탐색 표면</text>

  <rect x="818" y="506" width="324" height="166" rx="24" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="922" y="552" class="nodeTitle">sql``</text>
  <text x="856" y="580" class="nodeText">CTE, window function, DB 고유 연산처럼</text>
  <text x="856" y="604" class="nodeText">빌더가 답답한 지점에서 내려갈 때 사용</text>
  <rect x="868" y="628" width="224" height="30" rx="15" fill="#FFF5F3" stroke="#F0B7AF"/>
  <text x="908" y="648" class="chip">escape hatch, 타입은 직접 관리</text>

  <text x="84" y="716" class="chip">핵심: 먼저 결과 shape를 정한 뒤 API를 고르면 builder와 db.query를 무리하게 섞지 않게 된다.</text>
</svg>
