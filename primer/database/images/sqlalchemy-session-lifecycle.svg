<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SESSION LIFECYCLE</text>
  <text x="72" y="112" class="title">Session은 요청 단위로 열고 닫는다</text>
  <text x="72" y="142" class="subtitle">Engine은 오래 살지만 Session은 짧게 산다. 이 경계를 지키면 connection leak와 트랜잭션 꼬임을 줄일 수 있다.</text>

  <rect x="56" y="190" width="1168" height="286" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="230" class="section">REQUEST-SCOPED FLOW</text>

  <line x1="162" y1="334" x2="1080" y2="334" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="96" y="268" width="164" height="132" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="136" y="314" class="nodeTitle">요청 시작</text>
  <text x="122" y="342" class="nodeText">FastAPI Depends</text>
  <text x="134" y="366" class="nodeText">또는 배치 작업</text>

  <rect x="304" y="268" width="176" height="132" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="344" y="314" class="nodeTitle">SessionLocal()</text>
  <text x="342" y="342" class="nodeText">새 Session 생성</text>
  <text x="334" y="366" class="nodeText">연결은 필요 시 획득</text>

  <rect x="524" y="268" width="176" height="132" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="586" y="314" class="nodeTitle">작업 수행</text>
  <text x="556" y="342" class="nodeText">select, add, flush</text>
  <text x="554" y="366" class="nodeText">relationship 접근</text>

  <rect x="744" y="246" width="176" height="96" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="792" y="284" class="nodeTitle">COMMIT</text>
  <text x="774" y="310" class="nodeText">성공 시 영속화</text>

  <rect x="744" y="356" width="176" height="96" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="778" y="394" class="nodeTitle">ROLLBACK</text>
  <text x="768" y="420" class="nodeText">예외 시 전체 취소</text>

  <rect x="964" y="268" width="164" height="132" rx="22" fill="#F4F7FB" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1014" y="314" class="nodeTitle">close()</text>
  <text x="994" y="342" class="nodeText">세션 종료</text>
  <text x="986" y="366" class="nodeText">연결은 풀로 복귀</text>

  <path d="M612 400 C660 432 700 442 744 404" stroke="#D5786F" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="624" y="438" class="chip">예외가 나면 rollback 분기</text>

  <rect x="56" y="516" width="1168" height="224" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="556" class="section">POOL RULES</text>
  <rect x="104" y="596" width="320" height="92" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="134" y="632" class="chip">Engine은 애플리케이션 전역에서 1회 생성</text>
  <text x="134" y="656" class="chip">Session을 싱글턴처럼 재사용하지 않음</text>

  <rect x="480" y="596" width="320" height="92" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="510" y="632" class="chip">각 요청마다 Session을 새로 열고</text>
  <text x="510" y="656" class="chip">끝날 때 반드시 close()</text>

  <rect x="856" y="596" width="320" height="92" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="886" y="632" class="chip">close()는 connection을 닫는 것이 아니라</text>
  <text x="886" y="656" class="chip">풀에 반환하는 정리 단계다</text>
</svg>
