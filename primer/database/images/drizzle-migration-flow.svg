<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">MIGRATION FLOW</text>
  <text x="72" y="112" class="title">schema 변경 후 어떤 흐름으로 반영할지 먼저 고른다</text>
  <text x="72" y="142" class="subtitle">Drizzle는 개발 속도용 `push`와 배포 이력용 `generate + migrate`를 분리해 둔다.</text>

  <rect x="56" y="190" width="1168" height="550" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="230" class="section">DECISION FLOW</text>

  <rect x="456" y="270" width="368" height="120" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="538" y="316" class="nodeTitle">schema.ts 변경</text>
  <text x="520" y="344" class="nodeText">테이블, 컬럼, 인덱스, FK 정의를 수정했다.</text>

  <line x1="640" y1="390" x2="640" y2="452" stroke="#5E7895" stroke-width="4"/>
  <line x1="312" y1="452" x2="968" y2="452" stroke="#5E7895" stroke-width="4"/>
  <line x1="344" y1="452" x2="344" y2="502" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="936" y1="452" x2="936" y2="502" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="150" y="502" width="388" height="176" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="262" y="548" class="nodeTitle">빠른 로컬 반복</text>
  <text x="190" y="576" class="nodeText">지금 필요한 것이 개인 개발 환경 동기화라면</text>
  <text x="190" y="600" class="nodeText">`pnpm drizzle-kit push`로 바로 반영한다.</text>
  <rect x="224" y="626" width="240" height="30" rx="15" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="262" y="646" class="chip">migration 파일은 남기지 않음</text>

  <rect x="742" y="502" width="388" height="176" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="860" y="548" class="nodeTitle">팀 / 배포 경로</text>
  <text x="780" y="576" class="nodeText">변경 이력을 리뷰하고 배포 순서를 통제해야 하면</text>
  <text x="780" y="600" class="nodeText">`generate` 후 SQL을 확인하고 `migrate`를 실행한다.</text>
  <rect x="816" y="626" width="240" height="30" rx="15" fill="#FFF9EC" stroke="#E9D29D"/>
  <text x="848" y="646" class="chip">SQL 파일이 배포 이력이 된다</text>

  <rect x="742" y="702" width="388" height="24" rx="12" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="820" y="719" class="chip">DB를 수동으로 고치지 말고 schema에서 다시 생성</text>
</svg>
