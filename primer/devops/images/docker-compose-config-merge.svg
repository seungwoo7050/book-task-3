<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .note { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">CONFIG MERGE</text>
  <text x="72" y="112" class="title">기본 파일, override, profile이 최종 Compose 구성을 만든다</text>
  <text x="72" y="142" class="subtitle">환경 차이를 한 파일에 억지로 욱여넣지 말고, 공통 구조와 선택적 기능을 서로 다른 축으로 분리한다.</text>

  <rect x="56" y="188" width="1168" height="496" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="228" class="section">MERGE MODEL</text>

  <rect x="98" y="286" width="220" height="126" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="144" y="332" class="nodeTitle">compose.yml</text>
  <text x="126" y="360" class="nodeText">공통 서비스, 네트워크, 볼륨</text>
  <text x="134" y="384" class="nodeText">프로젝트의 기본 토폴로지</text>

  <rect x="98" y="470" width="220" height="126" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="120" y="516" class="nodeTitle">compose.override.yml</text>
  <text x="126" y="544" class="nodeText">개발용 mount, watch command,</text>
  <text x="146" y="568" class="nodeText">로컬 편의 설정</text>

  <rect x="406" y="286" width="220" height="126" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="466" y="332" class="nodeTitle">profiles</text>
  <text x="450" y="360" class="nodeText">mailhog, adminer처럼</text>
  <text x="446" y="384" class="nodeText">선택적으로 켤 서비스</text>

  <rect x="406" y="470" width="220" height="126" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="484" y="516" class="nodeTitle">.env</text>
  <text x="456" y="544" class="nodeText">변수 치환에 쓰는 값</text>
  <text x="454" y="568" class="nodeText">필요하면 `env_file`로도 주입</text>

  <rect x="744" y="360" width="230" height="162" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="810" y="408" class="nodeTitle">병합 결과</text>
  <text x="782" y="438" class="nodeText">`docker compose config`로</text>
  <text x="784" y="462" class="nodeText">실제 최종 YAML을 확인한다</text>
  <rect x="816" y="484" width="86" height="28" rx="14" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="834" y="503" class="chip">inspect</text>

  <rect x="1048" y="286" width="128" height="126" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="1078" y="332" class="nodeTitle">기본 실행</text>
  <text x="1070" y="360" class="nodeText">api, db, redis</text>
  <text x="1088" y="384" class="nodeText">만 기동</text>

  <rect x="1048" y="470" width="128" height="126" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="1070" y="516" class="nodeTitle">debug 실행</text>
  <text x="1066" y="544" class="nodeText">mailhog, adminer</text>
  <text x="1086" y="568" class="nodeText">추가</text>

  <path d="M318 350 L352 350 L352 250 L660 250 L660 392 L744 392" stroke="#5E7895" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <line x1="318" y1="530" x2="744" y2="446" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="626" y1="350" x2="744" y2="410" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="626" y1="530" x2="744" y2="474" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="974" y1="408" x2="1048" y2="350" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="974" y1="474" x2="1048" y2="530" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="626" width="1090" height="42" rx="21" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="128" y="653" class="chip">원칙: 공통 토폴로지는 기본 파일에, 개발 편의성은 override에, 옵션성 도구는 profiles에 둔다</text>

  <text x="84" y="720" class="note">핵심: 설정을 한 군데에 모아두기보다, 공통 구조와 선택적 차이를 다른 레이어로 분리해야 Compose가 커져도 유지보수 가능하다.</text>
</svg>
