<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .note { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">READINESS FLOW</text>
  <text x="72" y="112" class="title">`depends_on`은 순서만, healthcheck는 준비 완료를 보장한다</text>
  <text x="72" y="142" class="subtitle">Compose에서 앱이 너무 빨리 뜨는 문제는 대부분 started와 healthy를 구분하지 않아서 생긴다.</text>

  <rect x="56" y="188" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="228" class="section">STARTUP SEQUENCE</text>

  <rect x="98" y="300" width="180" height="116" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="132" y="346" class="nodeTitle">docker compose</text>
  <text x="152" y="374" class="nodeTitle">up</text>
  <text x="126" y="398" class="nodeText">서비스 생성 시작</text>

  <rect x="350" y="270" width="186" height="176" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="400" y="316" class="nodeTitle">postgres</text>
  <text x="388" y="344" class="nodeText">컨테이너 프로세스 시작</text>
  <text x="400" y="368" class="nodeText">초기화는 아직 진행 중</text>
  <rect x="404" y="392" width="78" height="30" rx="15" fill="#FFF9EE" stroke="#E9D29D"/>
  <text x="424" y="412" class="chip">starting</text>

  <rect x="614" y="270" width="186" height="176" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="674" y="316" class="nodeTitle">healthcheck</text>
  <text x="654" y="344" class="nodeText">`pg_isready`, `redis-cli ping`,</text>
  <text x="668" y="368" class="nodeText">`curl /health` 반복 검사</text>
  <rect x="664" y="392" width="86" height="30" rx="15" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="684" y="412" class="chip">loop</text>

  <rect x="878" y="270" width="186" height="176" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="944" y="316" class="nodeTitle">healthy?</text>
  <text x="918" y="344" class="nodeText">`condition: service_healthy`</text>
  <text x="932" y="368" class="nodeText">조건 충족 여부 확인</text>

  <rect x="582" y="522" width="278" height="100" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="636" y="564" class="nodeTitle">아직 준비 안 됨</text>
  <text x="622" y="590" class="nodeText">앱은 기다리고 healthcheck를 다시 돈다</text>

  <rect x="1072" y="286" width="108" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="1104" y="338" class="nodeTitle">api</text>
  <text x="1092" y="366" class="nodeText">이제 안전하게</text>
  <text x="1098" y="390" class="nodeText">시작 가능</text>

  <line x1="278" y1="358" x2="350" y2="358" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="536" y1="358" x2="614" y2="358" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="358" x2="878" y2="358" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="972" y1="446" x2="972" y2="472" stroke="#5E7895" stroke-width="4"/>
  <line x1="972" y1="472" x2="860" y2="472" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="472" x2="860" y2="572" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1064" y1="358" x2="1072" y2="358" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="956" y="498" class="chip">No</text>
  <text x="1030" y="344" class="chip">Yes</text>

  <rect x="92" y="566" width="412" height="70" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="124" y="596" class="chip">잘못된 기대: `depends_on`만 있으면 앱이 연결 성공할 것이라고 생각함</text>
  <text x="124" y="620" class="nodeText">실제로는 DB가 포트를 열었어도 준비가 끝나지 않았을 수 있다</text>

  <text x="84" y="720" class="note">핵심: Compose는 시작 순서와 준비 완료를 분리해서 다뤄야 한다. 순서는 `depends_on`, 준비 완료는 healthcheck가 담당한다.</text>
</svg>
