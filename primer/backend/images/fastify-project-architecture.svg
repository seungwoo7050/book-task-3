  <text x="72" y="148" class="subtitle">Fastifyм—җм„ңлҠ” нҸҙлҚ”ліҙлӢӨ plugin кІҪкі„мҷҖ schema л°°м№ҳк°Җ кө¬мЎ°лҘј кІ°м •н•ңлӢӨ.</text>

