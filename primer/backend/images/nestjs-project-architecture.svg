<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #43627D; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #536980; }
    .miniTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .miniText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #61788F; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #42607A; }
  </style>

  <rect width="1280" height="900" rx="36" fill="#F7FBFF"/>
  <circle cx="1138" cy="106" r="116" fill="#DDF4EA" fill-opacity="0.72"/>
  <circle cx="126" cy="786" r="150" fill="#DAEDFF" fill-opacity="0.64"/>

  <text x="72" y="70" class="eyebrow">NESTJS ARCHITECTURE</text>
  <text x="72" y="116" class="title">프로젝트 구조를 module 경계로 읽기</text>
  <text x="72" y="148" class="subtitle">NestJS는 디렉터리만 나누는 것이 아니라, module 단위로 controller, provider, 공통 관심사를 정리하는 구조를 가진다.</text>

  <rect x="166" y="184" width="248" height="112" rx="26" fill="#EAF4FF" stroke="#B8D7F1" filter="url(#shadow)"/>
  <text x="204" y="230" class="miniTitle">main.ts</text>
  <text x="204" y="258" class="miniText">NestFactory, global pipe/filter/interceptor 설정</text>

  <rect x="466" y="184" width="348" height="112" rx="26" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="506" y="230" class="miniTitle">app.module.ts</text>
  <text x="506" y="258" class="miniText">루트 모듈, ConfigModule, TypeOrmModule, feature module 연결</text>

  <rect x="866" y="184" width="226" height="112" rx="26" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="904" y="230" class="miniTitle">common/</text>
  <text x="904" y="258" class="miniText">guards, pipes, filters, decorators 공유</text>

  <rect x="180" y="420" width="280" height="180" rx="30" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="220" y="478" class="miniTitle">modules/auth</text>
  <text x="220" y="508" class="miniText">AuthModule, guard, strategy, dto</text>
  <text x="220" y="532" class="miniText">인증과 인가 관련 provider를 묶는다</text>
  <rect x="220" y="554" width="118" height="32" rx="16" fill="#FFF7E7" stroke="#EAC97E"/>
  <text x="254" y="575" class="badge">feature module</text>

  <rect x="500" y="420" width="280" height="180" rx="30" fill="#EAF4FF" stroke="#B8D7F1" filter="url(#shadow)"/>
  <text x="540" y="478" class="miniTitle">modules/book</text>
  <text x="540" y="508" class="miniText">BookModule, BookController, BookService</text>
  <text x="540" y="532" class="miniText">dto, entity, repository를 함께 관리</text>
  <rect x="540" y="554" width="118" height="32" rx="16" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="574" y="575" class="badge">feature module</text>

  <rect x="820" y="420" width="280" height="180" rx="30" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="860" y="478" class="miniTitle">config/</text>
  <text x="860" y="508" class="miniText">ConfigModule, 환경 설정 provider</text>
  <text x="860" y="532" class="miniText">여러 module에서 주입해 재사용</text>
  <rect x="860" y="554" width="124" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="892" y="575" class="badge">shared config</text>

  <rect x="430" y="704" width="420" height="114" rx="28" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="470" y="752" class="miniTitle">핵심 구조 규칙</text>
  <text x="470" y="780" class="miniText">DTO와 Entity를 분리하고, 공통 관심사는 common/으로 빼며, feature별로 module 경계를 유지한다.</text>

  <line x1="414" y1="240" x2="466" y2="240" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="296" x2="320" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="296" x2="640" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="734" y1="296" x2="960" y2="420" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
