<svg width="1280" height="880" viewBox="0 0 1280 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #43627D; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #536980; }
    .miniTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .miniText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #61788F; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #42607A; }
  </style>

  <rect width="1280" height="880" rx="36" fill="#F7FBFF"/>
  <circle cx="1138" cy="106" r="116" fill="#DDF4EA" fill-opacity="0.72"/>
  <circle cx="126" cy="786" r="150" fill="#DAEDFF" fill-opacity="0.64"/>

  <text x="72" y="70" class="eyebrow">CALL PIPELINE</text>
  <text x="72" y="116" class="title">metadata와 interceptor는 호출 주변을 감싼다</text>
  <text x="72" y="148" class="subtitle">gRPC에서 인증, 로깅, trace id, deadline은 HTTP 헤더와 미들웨어 대신 metadata와 interceptor에서 처리한다.</text>

  <line x1="166" y1="542" x2="1110" y2="542" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="470" width="160" height="144" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="132" y="522" class="miniTitle">client</text>
  <text x="132" y="550" class="miniText">auth token, request id,</text>
  <text x="132" y="574" class="miniText">deadline 추가</text>

  <rect x="302" y="430" width="206" height="224" rx="30" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="338" y="486" class="miniTitle">client interceptor</text>
  <text x="338" y="516" class="miniText">로깅, retry, timeout, trace</text>
  <text x="338" y="540" class="miniText">호출 전후를 감싼다</text>
  <rect x="338" y="558" width="126" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="370" y="579" class="badge">outgoing</text>

  <rect x="558" y="470" width="160" height="144" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="598" y="522" class="miniTitle">HTTP/2</text>
  <text x="586" y="550" class="miniText">protobuf payload + metadata</text>

  <rect x="768" y="430" width="206" height="224" rx="30" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="804" y="486" class="miniTitle">server interceptor</text>
  <text x="804" y="516" class="miniText">인증, 로깅, metrics, panic recovery</text>
  <text x="804" y="540" class="miniText">handler 전후 공통 처리</text>
  <rect x="804" y="558" width="126" height="32" rx="16" fill="#F5F0FF" stroke="#D8CBF6"/>
  <text x="842" y="579" class="badge">incoming</text>

  <rect x="1024" y="470" width="154" height="144" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="1062" y="522" class="miniTitle">handler</text>
  <text x="1056" y="550" class="miniText">status code와</text>
  <text x="1046" y="574" class="miniText">message를 반환</text>

  <rect x="356" y="710" width="566" height="98" rx="26" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="394" y="756" class="miniTitle">핵심 구분</text>
  <text x="394" y="784" class="miniText">metadata는 데이터이고, interceptor는 호출을 감싸는 코드다. 인증 토큰은 metadata에 넣고, 검증과 로깅은 interceptor에서 처리한다.</text>
</svg>
