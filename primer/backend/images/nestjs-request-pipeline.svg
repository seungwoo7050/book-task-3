<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #43627D; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #536980; }
    .miniTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .miniText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #61788F; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #42607A; }
  </style>

  <rect width="1280" height="900" rx="36" fill="#F7FBFF"/>
  <circle cx="1138" cy="106" r="116" fill="#DDF4EA" fill-opacity="0.72"/>
  <circle cx="126" cy="786" r="150" fill="#DAEDFF" fill-opacity="0.64"/>

  <text x="72" y="70" class="eyebrow">REQUEST PIPELINE</text>
  <text x="72" y="116" class="title">Guard, Pipe, Interceptor, Filter는 목적이 다르다</text>
  <text x="72" y="148" class="subtitle">NestJS는 요청 파이프라인이 명확해서, 각 관심사를 어디에 넣을지 구분하는 것이 중요하다.</text>

  <line x1="160" y1="540" x2="1110" y2="540" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="466" width="128" height="148" rx="28" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="124" y="516" class="miniTitle">요청</text>
  <text x="120" y="544" class="miniText">client</text>

  <rect x="260" y="426" width="172" height="228" rx="30" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="296" y="480" class="miniTitle">Guard</text>
  <text x="296" y="510" class="miniText">접근 가능한가?</text>
  <text x="296" y="534" class="miniText">JWT, role, 정책 검사</text>
  <rect x="296" y="554" width="120" height="32" rx="16" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="334" y="575" class="badge">allow / deny</text>

  <rect x="472" y="426" width="172" height="228" rx="30" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="508" y="480" class="miniTitle">Pipe</text>
  <text x="508" y="510" class="miniText">입력 검증과 변환</text>
  <text x="508" y="534" class="miniText">ValidationPipe, ParseIntPipe</text>
  <rect x="508" y="554" width="134" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="536" y="575" class="badge">validate / transform</text>

  <rect x="684" y="426" width="172" height="228" rx="30" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="712" y="480" class="miniTitle">Interceptor</text>
  <text x="712" y="510" class="miniText">전후 처리</text>
  <text x="712" y="534" class="miniText">logging, response wrapping</text>
  <rect x="712" y="554" width="124" height="32" rx="16" fill="#F5F0FF" stroke="#D8CBF6"/>
  <text x="746" y="575" class="badge">before / after</text>

  <rect x="896" y="426" width="172" height="228" rx="30" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="926" y="480" class="miniTitle">Controller</text>
  <text x="926" y="510" class="miniText">DTO를 받고 Service 호출</text>
  <text x="926" y="534" class="miniText">예외 발생 시 Filter로 전달</text>

  <rect x="364" y="724" width="556" height="100" rx="26" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="404" y="768" class="miniTitle">Exception Filter</text>
  <text x="404" y="796" class="miniText">예외가 발생했을 때 최종 HTTP 응답 형식을 정리한다. Guard나 Pipe와 달리 정상 흐름 제어가 아니라 실패 흐름 처리다.</text>
</svg>
