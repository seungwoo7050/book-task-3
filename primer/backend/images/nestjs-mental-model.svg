<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">NESTJS MENTAL MODEL</text>
  <text x="72" y="112" class="title">NestJS를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">NestJS는 자유롭게 조립하는 프레임워크가 아니라 Module, DI, pipeline을 전제로 구조를 강제하는 프레임워크다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. MODULE</text>
  <text x="102" y="252" class="cardTitle">기능 경계는 module이 만든다</text>
  <text x="102" y="280" class="cardText">Controller, Service, Provider를</text>
  <text x="102" y="302" class="cardText">module 단위로 묶어 DI 그래프를 만든다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. CONTROLLER / PROVIDER</text>
  <text x="490" y="252" class="cardTitle">HTTP와 비즈니스 로직을 분리한다</text>
  <text x="490" y="280" class="cardText">Controller는 HTTP 경계이고,</text>
  <text x="490" y="302" class="cardText">Service는 provider로서 비즈니스 로직을 담당한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. PIPELINE</text>
  <text x="878" y="252" class="cardTitle">요청은 정해진 파이프라인을 지난다</text>
  <text x="878" y="280" class="cardText">Guard, Interceptor, Pipe, Filter를</text>
  <text x="878" y="302" class="cardText">목적별로 나눠 배치한다.</text>

  <rect x="56" y="352" width="1168" height="432" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">REQUEST PIPELINE</text>

  <line x1="150" y1="562" x2="1112" y2="562" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="486" width="126" height="152" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="120" y="534" class="nodeTitle">요청</text>
  <text x="116" y="560" class="nodeText">client</text>

  <rect x="254" y="466" width="144" height="192" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="286" y="512" class="nodeTitle">Guard</text>
  <text x="282" y="538" class="nodeText">접근 가능한가?</text>
  <text x="276" y="560" class="nodeText">JwtAuthGuard, RolesGuard</text>

  <rect x="438" y="466" width="152" height="192" rx="22" fill="#F1ECFF" stroke="#D8CEF8"/>
  <text x="462" y="512" class="nodeTitle">Interceptor</text>
  <text x="462" y="538" class="nodeText">전후 처리</text>
  <text x="462" y="560" class="nodeText">logging, transform</text>

  <rect x="630" y="466" width="138" height="192" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="666" y="512" class="nodeTitle">Pipe</text>
  <text x="656" y="538" class="nodeText">검증과 변환</text>
  <text x="646" y="560" class="nodeText">ValidationPipe, ParseIntPipe</text>

  <rect x="808" y="466" width="144" height="192" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="828" y="512" class="nodeTitle">Controller</text>
  <text x="828" y="538" class="nodeText">DTO를 받고</text>
  <text x="828" y="560" class="nodeText">Service를 호출</text>

  <rect x="992" y="466" width="144" height="192" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1026" y="512" class="nodeTitle">Service</text>
  <text x="1014" y="538" class="nodeText">provider, repository,</text>
  <text x="1028" y="560" class="nodeText">domain logic</text>

  <text x="84" y="724" class="footnote">읽는 법: module이 경계를 만들고, controller/service가 역할을 나누며, 요청은 guard -> interceptor -> pipe -> handler 순서로 정리된다.</text>
</svg>
