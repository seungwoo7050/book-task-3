services:
  db:
    image: cockroachdb/cockroach:v25.3.3
    command:
      - start-single-node
      - --insecure
      - --listen-addr=localhost:26257
      - --sql-addr=0.0.0.0:26258
      - --http-addr=0.0.0.0:8080
    ports:
      - "26258:26258"
      - "8082:8080"
    volumes:
      - ./:/workspace
      - event-pipeline-db-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=localhost:26258 -e 'select 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://kafka:29092,external://localhost:9093
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://kafka:8082,external://localhost:18082
    ports:
      - "9093:9092"
      - "18082:18082"
      - "9645:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  event-pipeline-db-data:
