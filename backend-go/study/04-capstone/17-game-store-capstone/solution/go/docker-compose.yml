services:
  db:
    image: postgres:16-alpine
    container_name: game-store-capstone-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_store
    ports:
      - "54329:5432"
    volumes:
      - ./:/workspace
      - game-store-capstone-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_store"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  game-store-capstone-db-data:
