<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">JAVASCRIPT MODULES</text>
  <text x="72" y="112" class="title">ESM과 CommonJS는 분석 시점이 다르다</text>
  <text x="72" y="144" class="subtitle">둘 다 모듈을 나누는 방법이지만, 의존성을 언제 읽는지와 tooling 친화성이 다르다.</text>

  <text x="84" y="214" class="section">LOADING MODEL</text>

  <rect x="82" y="248" width="500" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="118" y="304" class="nodeTitle">ESM</text>
  <text x="118" y="332" class="nodeText">import graph를 실행 전 정적으로 분석</text>
  <rect x="118" y="398" width="124" height="86" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="154" y="438" class="nodeTitle">entry</text>
  <rect x="284" y="398" width="124" height="86" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="320" y="438" class="nodeTitle">util</text>
  <rect x="450" y="398" width="96" height="86" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="470" y="438" class="nodeTitle">ui</text>
  <line x1="242" y1="440" x2="284" y2="440" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="408" y1="440" x2="450" y2="440" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="118" y="560" class="nodeText">트리 쉐이킹, 순환 의존 추적, top-level await 지원</text>

  <rect x="698" y="248" width="500" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="734" y="304" class="nodeTitle">CommonJS</text>
  <text x="734" y="332" class="nodeText">require 호출 시점에 런타임에서 로딩</text>
  <rect x="734" y="398" width="124" height="86" rx="20" fill="#F3EEFF" stroke="#D8CCF6"/>
  <text x="762" y="438" class="nodeTitle">entry</text>
  <rect x="900" y="398" width="124" height="86" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="930" y="438" class="nodeTitle">require</text>
  <rect x="1066" y="398" width="96" height="86" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="1088" y="438" class="nodeTitle">module</text>
  <line x1="858" y1="440" x2="900" y2="440" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1024" y1="440" x2="1066" y2="440" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="734" y="560" class="nodeText">조건부 require는 자유롭지만 정적 최적화와 분석은 어렵다</text>
</svg>
