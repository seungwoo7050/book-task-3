<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1114" cy="108" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="144" cy="694" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">KOTLIN NULL SAFETY</text>
  <text x="72" y="112" class="title">nullable 값을 다루는 기본 흐름</text>
  <text x="72" y="144" class="subtitle">Kotlin은 null을 타입으로 드러낸다. 그래서 연산자 선택만 잘해도 많은 런타임 예외를 컴파일 타임으로 끌어올릴 수 있다.</text>

  <text x="84" y="214" class="section">DECISION FLOW</text>

  <rect x="482" y="228" width="316" height="98" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="520" y="274" class="nodeTitle">값이 nullable 인가?</text>
  <text x="520" y="302" class="nodeText">String? 처럼 물음표가 붙은 타입이면 null 분기를 처리해야 한다</text>

  <rect x="84" y="430" width="236" height="126" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="120" y="480" class="nodeTitle">safe call</text>
  <text x="120" y="508" class="nodeText">value?.length</text>

  <rect x="374" y="430" width="236" height="126" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="410" y="480" class="nodeTitle">elvis</text>
  <text x="410" y="508" class="nodeText">value?.length ?: 0</text>

  <rect x="664" y="430" width="236" height="126" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="700" y="480" class="nodeTitle">let</text>
  <text x="700" y="508" class="nodeText">value?.let { use(it) }</text>

  <rect x="954" y="430" width="236" height="126" rx="24" fill="#FFF3ED" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="990" y="480" class="nodeTitle">double bang</text>
  <text x="990" y="508" class="nodeText">value!! 는 마지막 수단</text>

  <line x1="640" y1="326" x2="202" y2="430" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="326" x2="492" y2="430" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="326" x2="782" y2="430" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="326" x2="1072" y2="430" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
