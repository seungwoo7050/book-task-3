<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">JAVA MENTAL MODEL</text>
  <text x="72" y="112" class="title">소스 문법 뒤에는 JVM, 타입 시스템, GC가 있다</text>
  <text x="72" y="142" class="subtitle">Java 코드는 `.java` 파일에만 존재하지 않는다. 컴파일과 런타임 모델까지 함께 읽어야 동작을 제대로 예측할 수 있다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. TYPE SYSTEM</text>
  <text x="102" y="252" class="cardTitle">무엇이 컴파일 시점에 막히는가?</text>
  <text x="102" y="280" class="cardText">제네릭, 인터페이스, checked exception이</text>
  <text x="102" y="302" class="cardText">실수를 미리 드러낸다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. OBJECT LIFETIME</text>
  <text x="490" y="252" class="cardTitle">객체는 어디에 생기고 사라지는가?</text>
  <text x="490" y="280" class="cardText">지역 변수는 stack frame, 객체는 heap,</text>
  <text x="490" y="302" class="cardText">회수는 GC가 담당한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. RUNTIME MODEL</text>
  <text x="878" y="252" class="cardTitle">실행은 무엇이 해석하는가?</text>
  <text x="878" y="280" class="cardText">`javac`가 bytecode를 만들고</text>
  <text x="878" y="302" class="cardText">JVM이 각 플랫폼에서 실행한다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">EXECUTION VIEW</text>

  <rect x="88" y="506" width="172" height="120" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="128" y="550" class="nodeTitle">Source</text>
  <text x="114" y="578" class="nodeText">`.java` files</text>

  <rect x="314" y="486" width="168" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="368" y="530" class="nodeTitle">javac</text>
  <text x="348" y="558" class="nodeText">컴파일러</text>
  <text x="334" y="582" class="nodeText">type check + bytecode 생성</text>

  <rect x="540" y="486" width="196" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="592" y="530" class="nodeTitle">Bytecode</text>
  <text x="576" y="558" class="nodeText">`.class`, `.jar`</text>
  <text x="570" y="582" class="nodeText">플랫폼 독립 산출물</text>

  <rect x="796" y="468" width="170" height="180" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="852" y="512" class="nodeTitle">JVM</text>
  <text x="836" y="540" class="nodeText">JIT, GC, 스레드</text>
  <text x="832" y="564" class="nodeText">표준 라이브러리 런타임</text>

  <rect x="1020" y="468" width="146" height="82" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1060" y="514" class="nodeTitle">Heap</text>
  <rect x="1020" y="566" width="146" height="82" rx="18" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1058" y="612" class="nodeTitle">Stack</text>

  <line x1="260" y1="566" x2="314" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="482" y1="566" x2="540" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="736" y1="566" x2="796" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="966" y1="520" x2="1020" y2="520" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="966" y1="610" x2="1020" y2="610" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="84" y="704" class="footnote">읽는 법: Java를 볼 때는 문법만 보지 말고, 컴파일이 무엇을 보장하고 JVM이 어떤 메모리/스레드 모델 위에서 실행하는지 같이 읽는다.</text>
</svg>
