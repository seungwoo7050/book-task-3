<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">TYPESCRIPT TYPE TRANSFORMS</text>
  <text x="72" y="112" class="title">기존 타입을 파이프라인처럼 변환해 새 타입을 만든다</text>
  <text x="72" y="144" class="subtitle">mapped type 은 프로퍼티를 돌고, conditional type 은 패턴을 보고 분기한다. 두 도구를 조합하면 손으로 다시 적을 일이 크게 줄어든다.</text>

  <text x="84" y="214" class="section">TRANSFORM PIPELINE</text>

  <rect x="86" y="278" width="214" height="144" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="122" y="334" class="nodeTitle">Source Type</text>
  <text x="122" y="362" class="nodeText">User 같은 원본 타입</text>

  <rect x="362" y="278" width="214" height="144" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="398" y="334" class="nodeTitle">Mapped Type</text>
  <text x="398" y="362" class="nodeText">keyof 순회, optional, readonly 변환</text>

  <rect x="638" y="278" width="214" height="144" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="674" y="334" class="nodeTitle">Conditional</text>
  <text x="674" y="362" class="nodeText">배열인지 Promise인지 패턴 분기</text>

  <rect x="914" y="278" width="244" height="144" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="950" y="334" class="nodeTitle">Derived Type</text>
  <text x="950" y="362" class="nodeText">Partial User, Unwrap Promise 등</text>

  <line x1="300" y1="350" x2="362" y2="350" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="576" y1="350" x2="638" y2="350" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="852" y1="350" x2="914" y2="350" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="296" y="548" width="688" height="144" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="332" y="604" class="nodeTitle">infer 가 하는 일</text>
  <text x="332" y="632" class="nodeText">함수 반환값, Promise 내부 값처럼 구조 안쪽 타입을 패턴 매칭으로 추출한다.</text>
</svg>
