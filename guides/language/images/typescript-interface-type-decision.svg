<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">TYPESCRIPT TYPE CHOICE</text>
  <text x="72" y="112" class="title">객체 shape 중심이면 interface, 변환 중심이면 type</text>
  <text x="72" y="144" class="subtitle">둘 다 비슷해 보이지만, 선언 병합과 확장을 중심으로 읽을지, union과 타입 변환을 중심으로 읽을지에 따라 선택 기준이 갈린다.</text>

  <text x="84" y="214" class="section">CHOICE MAP</text>

  <rect x="84" y="260" width="480" height="412" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="120" y="316" class="nodeTitle">interface</text>
  <text x="120" y="344" class="nodeText">객체 shape, extends, declaration merging에 강하다</text>
  <rect x="120" y="420" width="300" height="78" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="152" y="462" class="nodeText">interface User { id: number; name: string }</text>
  <text x="120" y="562" class="nodeText">오래 유지될 도메인 모델, public API 계약에 잘 맞는다</text>

  <rect x="628" y="260" width="480" height="412" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="664" y="316" class="nodeTitle">type</text>
  <text x="664" y="344" class="nodeText">union, intersection, alias, mapped, conditional에 강하다</text>
  <rect x="664" y="420" width="300" height="78" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="696" y="462" class="nodeText">type Result = Success | Failure</text>
  <text x="664" y="562" class="nodeText">타입 조합과 변환이 중심이면 type 이 더 자연스럽다</text>
</svg>
