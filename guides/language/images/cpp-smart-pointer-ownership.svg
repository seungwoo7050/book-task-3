<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="50" x2="1190" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
  </style>

  <rect width="1280" height="780" rx="36" fill="url(#bg)"/>
  <circle cx="1120" cy="108" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="146" cy="694" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C++ SMART POINTERS</text>
  <text x="72" y="112" class="title">포인터 타입이 곧 소유권 규칙이다</text>
  <text x="72" y="144" class="subtitle">스마트 포인터는 메모리를 감춘 도구가 아니라, 누가 자원을 소유하고 언제 해제되는지를 타입으로 표현한다.</text>

  <text x="84" y="214" class="section">OWNERSHIP MODES</text>

  <rect x="72" y="248" width="340" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="108" y="304" class="nodeTitle">unique_ptr</text>
  <text x="108" y="332" class="nodeText">오직 한 소유자만 가진다</text>
  <rect x="116" y="398" width="112" height="92" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="144" y="438" class="nodeTitle">owner</text>
  <rect x="266" y="398" width="112" height="92" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="300" y="438" class="nodeTitle">object</text>
  <line x1="228" y1="444" x2="266" y2="444" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="116" y="540" width="226" height="74" rx="20" fill="#EEF7FF" stroke="#BCD5EE"/>
  <text x="146" y="582" class="nodeText">복사 금지, 이동 허용</text>

  <rect x="470" y="248" width="340" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="506" y="304" class="nodeTitle">shared_ptr</text>
  <text x="506" y="332" class="nodeText">여러 소유자가 같은 객체를 공유한다</text>
  <rect x="516" y="398" width="92" height="92" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="542" y="438" class="nodeTitle">sp1</text>
  <rect x="628" y="398" width="92" height="92" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="654" y="438" class="nodeTitle">sp2</text>
  <rect x="628" y="542" width="104" height="54" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="654" y="576" class="chip">count = 2</text>
  <rect x="738" y="398" width="112" height="92" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="772" y="438" class="nodeTitle">object</text>
  <line x1="608" y1="444" x2="738" y2="444" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="444" x2="738" y2="444" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="868" y="248" width="340" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="904" y="304" class="nodeTitle">weak_ptr</text>
  <text x="904" y="332" class="nodeText">관찰만 하고 소유하지 않는다</text>
  <rect x="914" y="398" width="102" height="92" rx="20" fill="#F3EEFF" stroke="#D8CCF6"/>
  <text x="944" y="438" class="nodeTitle">weak</text>
  <rect x="1062" y="398" width="112" height="92" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="1096" y="438" class="nodeTitle">object</text>
  <line x1="1016" y1="444" x2="1062" y2="444" stroke="#5B7592" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <rect x="914" y="540" width="234" height="74" rx="20" fill="#F6F1FF" stroke="#D8CCF6"/>
  <text x="946" y="582" class="nodeText">lock() 성공 시에만 잠시 shared 소유권 획득</text>

  <rect x="370" y="692" width="548" height="48" rx="24" fill="#FFF3ED" stroke="#F0B7AF"/>
  <text x="408" y="722" class="chip">순환 참조를 막고 싶다면 shared_ptr 연결 고리 한쪽을 weak_ptr로 바꾼다</text>
</svg>
