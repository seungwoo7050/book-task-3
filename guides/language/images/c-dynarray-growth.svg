<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415F79; }
    .slot { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
  </style>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="1122" cy="106" r="102" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="150" cy="680" r="136" fill="#DDEBFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">C DYNAMIC ARRAY</text>
  <text x="72" y="112" class="title">size와 capacity가 분리되어 있어야 성장할 수 있다</text>
  <text x="72" y="144" class="subtitle">동적 배열은 꽉 찰 때만 더 큰 버퍼로 옮기고, 평소에는 마지막 칸 뒤에 append한다.</text>

  <text x="84" y="210" class="section">BEFORE PUSH</text>
  <rect x="72" y="236" width="486" height="420" rx="30" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="112" y="292" class="nodeTitle">현재 버퍼</text>
  <text x="112" y="320" class="nodeText">size = 4, capacity = 4 -> 더 넣을 칸이 없다</text>
  <rect x="112" y="382" width="72" height="98" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="137" y="428" class="slot">10</text>
  <rect x="192" y="382" width="72" height="98" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="217" y="428" class="slot">20</text>
  <rect x="272" y="382" width="72" height="98" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="297" y="428" class="slot">30</text>
  <rect x="352" y="382" width="72" height="98" rx="18" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="377" y="428" class="slot">40</text>
  <rect x="112" y="534" width="286" height="84" rx="20" fill="#FFF3ED" stroke="#F0B7AF"/>
  <text x="142" y="572" class="nodeText">`dynarray_push()`는 먼저</text>
  <text x="142" y="600" class="nodeText">`size == capacity`인지 검사한다</text>

  <text x="640" y="210" class="section">REALLOCATE</text>
  <rect x="616" y="236" width="592" height="420" rx="30" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="656" y="292" class="nodeTitle">더 큰 버퍼 확보</text>
  <text x="656" y="320" class="nodeText">보통 2배 크기의 새 공간을 요청하고, 성공하면 포인터를 교체한다</text>
  <rect x="656" y="382" width="64" height="98" rx="18" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="677" y="428" class="slot">10</text>
  <rect x="730" y="382" width="64" height="98" rx="18" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="751" y="428" class="slot">20</text>
  <rect x="804" y="382" width="64" height="98" rx="18" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="825" y="428" class="slot">30</text>
  <rect x="878" y="382" width="64" height="98" rx="18" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="899" y="428" class="slot">40</text>
  <rect x="952" y="382" width="64" height="98" rx="18" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="977" y="428" class="slot">50</text>
  <rect x="1026" y="382" width="64" height="98" rx="18" fill="#F6FAFF" stroke="#D2E0EC"/>
  <text x="1045" y="428" class="slot">빈칸</text>
  <rect x="1100" y="382" width="64" height="98" rx="18" fill="#F6FAFF" stroke="#D2E0EC"/>
  <text x="1119" y="428" class="slot">빈칸</text>
  <rect x="656" y="534" width="320" height="84" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="686" y="572" class="nodeText">`int *new_data = realloc(...)`</text>
  <text x="686" y="600" class="nodeText">성공 시 `da->data = new_data`</text>
  <rect x="992" y="534" width="172" height="84" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="1022" y="572" class="nodeText">size = 5</text>
  <text x="1010" y="600" class="nodeText">capacity = 8</text>

  <line x1="558" y1="446" x2="616" y2="446" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
