<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">TYPESCRIPT NARROWING</text>
  <text x="72" y="112" class="title">분기 근거가 생기면 union 안의 속성이 열린다</text>
  <text x="72" y="144" class="subtitle">TypeScript는 값이 어떤 분기인지 확신할 수 있을 때만 해당 속성 접근을 허용한다. narrowing 은 그 확신을 만드는 과정이다.</text>

  <text x="84" y="214" class="section">STATE FLOW</text>

  <rect x="458" y="228" width="364" height="98" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="496" y="274" class="nodeTitle">res.status 를 검사한다</text>
  <text x="496" y="302" class="nodeText">discriminant 필드가 분기 근거가 되어 success, error, loading 중 하나로 좁혀진다</text>

  <rect x="92" y="430" width="248" height="134" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="128" y="486" class="nodeTitle">success</text>
  <text x="128" y="514" class="nodeText">data 속성이 안전하게 열림</text>

  <rect x="376" y="430" width="248" height="134" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="412" y="486" class="nodeTitle">error</text>
  <text x="412" y="514" class="nodeText">error 속성이 안전하게 열림</text>

  <rect x="660" y="430" width="248" height="134" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="696" y="486" class="nodeTitle">loading</text>
  <text x="696" y="514" class="nodeText">추가 데이터 없이 상태만 표현</text>

  <rect x="944" y="430" width="248" height="134" rx="24" fill="#FFF3ED" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="980" y="486" class="nodeTitle">default never</text>
  <text x="980" y="514" class="nodeText">새 분기 누락 시 컴파일 에러</text>

  <rect x="312" y="650" width="656" height="92" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="348" y="692" class="nodeTitle">narrowing 근거</text>
  <text x="348" y="720" class="nodeText">typeof, in, instanceof, 커스텀 타입 가드, discriminant 필드</text>
</svg>
