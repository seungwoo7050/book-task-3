<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">PYTHON DECORATORS</text>
  <text x="72" y="112" class="title">데코레이터는 함수 바깥에 래퍼 층을 쌓는다</text>
  <text x="72" y="144" class="subtitle">정의 시점에 함수 객체를 받아 감싸고, 실제 호출은 가장 바깥 래퍼부터 안쪽으로 들어간다.</text>

  <text x="84" y="214" class="section">WRAP ORDER</text>

  <rect x="178" y="262" width="300" height="360" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="214" y="318" class="nodeTitle">process</text>
  <text x="214" y="346" class="nodeText">원래 함수 본체</text>
  <rect x="226" y="412" width="206" height="78" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="260" y="456" class="nodeText">retry(process)</text>
  <rect x="210" y="510" width="238" height="78" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="236" y="554" class="nodeText">timer(retry(process))</text>

  <rect x="650" y="262" width="450" height="360" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="686" y="318" class="nodeTitle">실제 호출 순서</text>
  <text x="686" y="346" class="nodeText">1. timer wrapper 진입</text>
  <text x="686" y="374" class="nodeText">2. 그 안에서 retry wrapper 호출</text>
  <text x="686" y="402" class="nodeText">3. 마지막에 원래 process 실행</text>
  <rect x="686" y="468" width="360" height="90" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="718" y="508" class="nodeText">wraps 를 쓰면 함수 이름, docstring, signature</text>
  <text x="718" y="536" class="nodeText">메타데이터를 최대한 보존할 수 있다</text>

  <line x1="478" y1="548" x2="650" y2="430" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
