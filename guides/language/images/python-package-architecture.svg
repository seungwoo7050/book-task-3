<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">PYTHON PACKAGE SHAPE</text>
  <text x="72" y="112" class="title">패키지 구조와 import 경계를 함께 보기</text>
  <text x="72" y="144" class="subtitle">Python은 어떤 위치에서 실행했는지에 따라 import 경로 해석이 달라진다. 그래서 src 레이아웃과 package 진입점을 함께 보는 편이 안전하다.</text>

  <text x="84" y="214" class="section">PACKAGE BOUNDARIES</text>

  <rect x="82" y="252" width="170" height="126" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="118" y="302" class="nodeTitle">pyproject</text>
  <text x="118" y="330" class="nodeText">패키지 메타데이터</text>

  <rect x="314" y="236" width="680" height="458" rx="30" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="350" y="284" class="nodeTitle">src/myproject</text>
  <text x="350" y="312" class="nodeText">실제 패키지 루트</text>

  <rect x="350" y="376" width="156" height="128" rx="22" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="386" y="424" class="nodeTitle">core</text>
  <text x="386" y="452" class="nodeText">models, services</text>

  <rect x="576" y="376" width="156" height="128" rx="22" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="612" y="424" class="nodeTitle">api</text>
  <text x="612" y="452" class="nodeText">routes</text>

  <rect x="802" y="376" width="156" height="128" rx="22" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="838" y="424" class="nodeTitle">utils</text>
  <text x="838" y="452" class="nodeText">공용 helper</text>

  <rect x="484" y="552" width="304" height="100" rx="24" fill="#F3EEFF" stroke="#D8CCF6"/>
  <text x="520" y="598" class="nodeTitle">__init__.py 와 __main__.py</text>
  <text x="520" y="626" class="nodeText">공개 API 재노출, python -m 실행 진입점</text>

  <rect x="1068" y="252" width="154" height="126" rx="24" fill="#F6FAFF" stroke="#D2E0EC" filter="url(#shadow)"/>
  <text x="1104" y="302" class="nodeTitle">tests</text>
  <text x="1104" y="330" class="nodeText">패키지 외부에서 import 검증</text>

  <line x1="252" y1="315" x2="314" y2="315" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
