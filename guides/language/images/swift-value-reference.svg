<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F1F8F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7592"/>
    </marker>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">SWIFT TYPE SEMANTICS</text>
  <text x="72" y="112" class="title">struct 는 복사되고 class 는 공유된다</text>
  <text x="72" y="144" class="subtitle">두 타입의 가장 큰 차이는 문법이 아니라 소유 방식이다. 상태가 독립되어야 하는지, 여러 곳에서 같은 인스턴스를 공유해야 하는지가 선택 기준이다.</text>

  <text x="84" y="214" class="section">COPY VS SHARE</text>

  <rect x="86" y="252" width="468" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="122" y="308" class="nodeTitle">struct</text>
  <text x="122" y="336" class="nodeText">값 타입, 복사 후 각자 독립 상태</text>
  <rect x="122" y="414" width="134" height="90" rx="20" fill="#EAF4FF" stroke="#BCD5EE"/>
  <text x="160" y="456" class="nodeTitle">p</text>
  <rect x="296" y="414" width="134" height="90" rx="20" fill="#EEF8EF" stroke="#B9DEC9"/>
  <text x="330" y="456" class="nodeTitle">p2</text>
  <line x1="256" y1="459" x2="296" y2="459" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="122" y="564" class="nodeText">p2.x 를 바꿔도 p 는 그대로 남는다</text>

  <rect x="632" y="252" width="468" height="420" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="668" y="308" class="nodeTitle">class</text>
  <text x="668" y="336" class="nodeText">참조 타입, 여러 이름이 같은 인스턴스를 본다</text>
  <rect x="668" y="414" width="134" height="90" rx="20" fill="#FFF6E8" stroke="#E8CE96"/>
  <text x="706" y="456" class="nodeTitle">user</text>
  <rect x="842" y="414" width="134" height="90" rx="20" fill="#F3EEFF" stroke="#D8CCF6"/>
  <text x="886" y="456" class="nodeTitle">ref</text>
  <line x1="802" y1="459" x2="842" y2="459" stroke="#5B7592" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="668" y="564" class="nodeText">ref.name 을 바꾸면 user.name 도 함께 바뀐다</text>

  <rect x="392" y="714" width="496" height="58" rx="24" fill="#FFF3ED" stroke="#F0B7AF"/>
  <text x="430" y="750" class="nodeText">기본은 struct, 상속이나 공유 상태가 필요할 때만 class 를 선택하는 편이 Swift 스타일에 가깝다</text>
</svg>
