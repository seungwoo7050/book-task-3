<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#FFF7EF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46637D; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14263A; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566A80; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4C6881; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60778E; }
  </style>

  <rect width="1280" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1128" cy="108" r="104" fill="#DDEFE8" fill-opacity="0.68"/>
  <circle cx="136" cy="734" r="146" fill="#DDEAFF" fill-opacity="0.58"/>

  <text x="72" y="68" class="eyebrow">SWIFT CONCURRENCY</text>
  <text x="72" y="112" class="title">결과 형태와 공유 상태 기준으로 동시성 도구를 고르기</text>
  <text x="72" y="144" class="subtitle">Swift의 구조적 동시성은 병렬 작업을 어떻게 만들고, 어떤 데이터 경쟁을 막을지까지 타입 수준에서 표현하려는 모델이다.</text>

  <text x="84" y="214" class="section">TOOLBOX</text>

  <rect x="82" y="252" width="230" height="144" rx="24" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="118" y="308" class="nodeTitle">async / await</text>
  <text x="118" y="336" class="nodeText">단일 비동기 호출</text>

  <rect x="360" y="252" width="230" height="144" rx="24" fill="#EAF4FF" stroke="#BCD5EE" filter="url(#shadow)"/>
  <text x="396" y="308" class="nodeTitle">async let</text>
  <text x="396" y="336" class="nodeText">고정 개수 병렬 작업</text>

  <rect x="638" y="252" width="230" height="144" rx="24" fill="#EEF8EF" stroke="#B9DEC9" filter="url(#shadow)"/>
  <text x="674" y="308" class="nodeTitle">TaskGroup</text>
  <text x="674" y="336" class="nodeText">동적 개수 병렬 작업</text>

  <rect x="916" y="252" width="230" height="144" rx="24" fill="#FFF6E8" stroke="#E8CE96" filter="url(#shadow)"/>
  <text x="952" y="308" class="nodeTitle">AsyncSequence</text>
  <text x="952" y="336" class="nodeText">여러 값을 시간 순서로 소비</text>

  <rect x="318" y="532" width="644" height="170" rx="28" fill="#FFFFFF" stroke="#CDDCE9" filter="url(#shadow)"/>
  <text x="354" y="588" class="nodeTitle">공유 상태 보호</text>
  <text x="354" y="616" class="nodeText">actor 는 내부 상태 접근을 직렬화하고, MainActor 는 UI 갱신 코드를 메인 실행 문맥에 고정한다.</text>
  <text x="354" y="644" class="nodeText">즉, 값 가져오기보다 더 중요한 것은 어디서 mutation 이 일어나는지 명시하는 것이다.</text>
</svg>
