<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5C7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">CMAKE WORKFLOW</text>
  <text x="72" y="112" class="title">CMake는 빌드가 아니라 설정 엔진이다</text>
  <text x="72" y="142" class="subtitle">configure 단계에서 target, generator, cache를 결정하고, 그 결과물 위에서 build, test, install이 이어진다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. STAGE</text>
  <text x="102" y="252" class="cardTitle">지금 보는 설정은 언제 적용되는가?</text>
  <text x="102" y="280" class="cardText">configure에서 결정되는지,</text>
  <text x="102" y="302" class="cardText">build나 test에서 실행되는지 구분한다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. TARGET</text>
  <text x="490" y="252" class="cardTitle">이 설정은 누구의 속성인가?</text>
  <text x="490" y="280" class="cardText">전역 변수보다 target 중심으로 두면</text>
  <text x="490" y="302" class="cardText">의존성 전파와 테스트가 쉬워진다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. INPUT</text>
  <text x="878" y="252" class="cardTitle">외부 의존성은 어디서 조달할까?</text>
  <text x="878" y="280" class="cardText">시스템 패키지, 저장소 내부 소스,</text>
  <text x="878" y="302" class="cardText">원격 다운로드 중 하나를 선택한다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">CONFIGURE TO INSTALL</text>

  <line x1="178" y1="566" x2="1098" y2="566" stroke="#5C7692" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="506" width="182" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="122" y="548" class="nodeTitle">Source Tree</text>
  <text x="120" y="576" class="nodeText">CMakeLists.txt</text>
  <text x="120" y="600" class="nodeText">src/, include/, tests/</text>

  <rect x="320" y="486" width="220" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="368" y="532" class="nodeTitle">Configure</text>
  <text x="352" y="560" class="nodeText">`cmake -S . -B build`</text>
  <text x="352" y="584" class="nodeText">generator, cache, target graph 결정</text>
  <rect x="370" y="606" width="118" height="30" rx="15" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="401" y="626" class="chip">Ninja / Make</text>

  <rect x="594" y="506" width="198" height="120" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="640" y="548" class="nodeTitle">Build Tree</text>
  <text x="632" y="576" class="nodeText">build.ninja</text>
  <text x="622" y="600" class="nodeText">CMakeCache.txt</text>

  <rect x="848" y="450" width="294" height="92" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="894" y="488" class="nodeTitle">Build</text>
  <text x="894" y="514" class="nodeText">`cmake --build build`</text>

  <rect x="848" y="566" width="294" height="92" rx="22" fill="#F8F4FF" stroke="#D4C4F2"/>
  <text x="894" y="604" class="nodeTitle">Test</text>
  <text x="894" y="630" class="nodeText">`ctest --test-dir build`</text>

  <rect x="848" y="682" width="294" height="92" rx="22" fill="#FDF3ED" stroke="#F0C5AA"/>
  <text x="894" y="720" class="nodeTitle">Install</text>
  <text x="894" y="746" class="nodeText">`cmake --install build`</text>

  <line x1="994" y1="542" x2="994" y2="566" stroke="#5C7692" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="994" y1="658" x2="994" y2="682" stroke="#5C7692" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="84" y="706" class="footnote">읽는 법: configure에서 build tree를 만든 뒤, 그 결과물을 build, test, install이 차례로 소비한다. 설정과 실행을 섞어 생각하면 CMake가 급격히 어려워진다.</text>
</svg>
