<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47647F; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566C83; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .mono { font: 700 15px "SF Mono", "SFMono-Regular", "Menlo", monospace; fill: #17304A; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">INTERFACE MAP</text>
  <text x="72" y="114" class="title">Wireshark는 목록, 계층, 바이트 순서로 좁혀 읽는다</text>
  <text x="72" y="146" class="subtitle">패킷 하나를 이해할 때도 먼저 목록에서 후보를 고르고, 상세 계층을 펼친 뒤, 마지막에 원시 바이트를 확인한다.</text>

  <rect x="72" y="210" width="760" height="540" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="104" y="252" class="section">MAIN WINDOW</text>

  <rect x="104" y="286" width="696" height="140" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="134" y="330" class="nodeTitle">1. Packet List</text>
  <text x="134" y="358" class="nodeText">No. / Time / Source / Destination / Protocol / Info</text>
  <text x="134" y="392" class="mono">4251  1.204  10.0.0.5  93.184.216.34  TLS  Client Hello</text>

  <rect x="104" y="446" width="696" height="156" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="134" y="492" class="nodeTitle">2. Packet Details</text>
  <text x="134" y="522" class="mono">Ethernet II</text>
  <text x="134" y="548" class="mono">Internet Protocol Version 4</text>
  <text x="134" y="574" class="mono">Transmission Control Protocol</text>
  <text x="134" y="600" class="mono">Transport Layer Security</text>

  <rect x="104" y="622" width="696" height="96" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="134" y="662" class="nodeTitle">3. Packet Bytes</text>
  <text x="134" y="692" class="mono">0000  16 03 01 02 00 01 00 01 fc 03 03 ...</text>

  <rect x="886" y="286" width="322" height="126" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="920" y="334" class="nodeTitle">목록에서 먼저 보는 것</text>
  <text x="920" y="364" class="nodeText">시간대, 왕복 방향, 프로토콜,</text>
  <text x="920" y="388" class="nodeText">RST나 Retransmission 같은 이상 패턴</text>

  <rect x="886" y="454" width="322" height="126" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="920" y="502" class="nodeTitle">계층에서 확인할 것</text>
  <text x="920" y="532" class="nodeText">어느 계층에서 처음 이상이 보이는가?</text>
  <text x="920" y="556" class="nodeText">IP, TCP, TLS, HTTP를 순서대로 좁힌다.</text>

  <rect x="886" y="622" width="322" height="96" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="920" y="662" class="nodeTitle">바이트는 마지막 확인</text>
  <text x="920" y="690" class="nodeText">오프셋, 페이로드, 원시 값 대조가 필요할 때만 본다.</text>

  <rect x="906" y="222" width="236" height="34" rx="17" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="936" y="245" class="badge">읽는 순서: List → Details → Bytes</text>
</svg>
