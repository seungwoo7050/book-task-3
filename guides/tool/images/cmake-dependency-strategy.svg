<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#597593"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47637E; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566B82; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .small { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #45627B; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">DEPENDENCY STRATEGY</text>
  <text x="72" y="114" class="title">외부 의존성은 조달 전략부터 정한다</text>
  <text x="72" y="146" class="subtitle">같은 링크 코드라도 라이브러리를 어디서 가져오는지에 따라 유지보수성과 재현성이 달라진다.</text>

  <rect x="390" y="206" width="500" height="124" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="462" y="256" class="nodeTitle">이 라이브러리를 어디서 가져올까?</text>
  <text x="462" y="286" class="nodeText">시스템에 이미 있는가, 저장소 안에 둘 것인가, 아니면 configure 시점에 내려받을 것인가?</text>

  <line x1="640" y1="330" x2="640" y2="390" stroke="#597593" stroke-width="4"/>
  <line x1="640" y1="390" x2="210" y2="390" stroke="#597593" stroke-width="4"/>
  <line x1="640" y1="390" x2="1070" y2="390" stroke="#597593" stroke-width="4"/>
  <line x1="210" y1="390" x2="210" y2="456" stroke="#597593" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="390" x2="640" y2="456" stroke="#597593" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1070" y1="390" x2="1070" y2="456" stroke="#597593" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="456" width="244" height="220" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="142" y="516" class="nodeTitle">find_package</text>
  <text x="126" y="548" class="nodeText">시스템 패키지 관리자나</text>
  <text x="126" y="572" class="nodeText">CI 이미지가 이미 제공</text>
  <rect x="126" y="600" width="120" height="34" rx="17" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="152" y="622" class="small">설치 전제</text>
  <text x="126" y="660" class="nodeText">예: OpenSSL, Zlib, Threads</text>

  <rect x="518" y="456" width="244" height="220" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="554" y="516" class="nodeTitle">add_subdirectory</text>
  <text x="556" y="548" class="nodeText">저장소 안에서 함께 관리하는</text>
  <text x="556" y="572" class="nodeText">로컬 라이브러리나 서브모듈</text>
  <rect x="556" y="600" width="124" height="34" rx="17" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="584" y="622" class="small">같은 target graph</text>
  <text x="556" y="660" class="nodeText">예: `third_party/foo`, 사내 공통 lib</text>

  <rect x="948" y="456" width="244" height="220" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="998" y="516" class="nodeTitle">FetchContent</text>
  <text x="986" y="548" class="nodeText">configure 시점에 내려받고</text>
  <text x="986" y="572" class="nodeText">버전을 저장소에서 고정</text>
  <rect x="986" y="600" width="128" height="34" rx="17" fill="#FFF8EC" stroke="#E9D29D"/>
  <text x="1012" y="622" class="small">재현성 우선</text>
  <text x="986" y="660" class="nodeText">예: googletest, fmt, 소형 유틸 lib</text>

  <rect x="156" y="714" width="964" height="54" rx="27" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="198" y="748" class="nodeText">원칙: 이미 제공되는 시스템 라이브러리는 `find_package`, 저장소 내부 코드는 `add_subdirectory`, 설치 전제를 없애고 싶으면 `FetchContent`를 고른다.</text>
</svg>
