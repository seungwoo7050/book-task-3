<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">GRADLE MENTAL MODEL</text>
  <text x="72" y="112" class="title">스크립트를 순서대로 돌리는 대신 태스크 그래프를 만든다</text>
  <text x="72" y="142" class="subtitle">Gradle은 설정 파일을 읽어 프로젝트와 태스크를 구성하고, 요청한 목표에 필요한 작업만 실행한다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. STRUCTURE</text>
  <text x="102" y="252" class="cardTitle">어떤 프로젝트가 포함되는가?</text>
  <text x="102" y="280" class="cardText">`settings.gradle.kts`가</text>
  <text x="102" y="302" class="cardText">루트와 서브프로젝트를 선언한다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. BUILD LOGIC</text>
  <text x="490" y="252" class="cardTitle">플러그인과 의존성은 어디서 오나?</text>
  <text x="490" y="280" class="cardText">`build.gradle.kts`가 플러그인,</text>
  <text x="490" y="302" class="cardText">configuration, tasks를 정의한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. TASK GRAPH</text>
  <text x="878" y="252" class="cardTitle">무엇이 실제로 실행되는가?</text>
  <text x="878" y="280" class="cardText">요청한 태스크와 그 의존 태스크만</text>
  <text x="878" y="302" class="cardText">그래프로 풀어 실행한다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">BUILD FLOW</text>

  <rect x="94" y="506" width="208" height="120" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="114" y="550" class="nodeTitle">settings.gradle.kts</text>
  <text x="146" y="578" class="nodeText">include("api", "core")</text>

  <rect x="370" y="486" width="220" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="402" y="530" class="nodeTitle">build.gradle.kts</text>
  <text x="412" y="558" class="nodeText">plugins, dependencies, tasks</text>
  <text x="442" y="582" class="nodeText">Kotlin DSL</text>

  <rect x="658" y="486" width="214" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="702" y="530" class="nodeTitle">Task Graph</text>
  <text x="694" y="558" class="nodeText">build -> test -> classes</text>
  <text x="706" y="582" class="nodeText">dependsOn 해석</text>

  <rect x="940" y="506" width="174" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="994" y="550" class="nodeTitle">Run</text>
  <text x="980" y="578" class="nodeText">필요한 태스크만 실행</text>

  <line x1="302" y1="566" x2="370" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="590" y1="566" x2="658" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="872" y1="566" x2="940" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="704" class="footnote">읽는 법: settings가 프로젝트를 정하고, build script가 규칙을 만들고, Gradle 엔진이 그 규칙으로 태스크 그래프를 만든 뒤 필요한 작업만 실행한다.</text>
</svg>
