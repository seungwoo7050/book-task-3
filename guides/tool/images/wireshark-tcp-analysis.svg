<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5A7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47647F; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566C83; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="70" class="eyebrow">TCP ANALYSIS</text>
  <text x="72" y="114" class="title">TCP는 연결 수립과 경고 플래그를 함께 봐야 한다</text>
  <text x="72" y="146" class="subtitle">handshake가 성립했는지, 그 뒤 데이터 전송 구간에서 어떤 `tcp.analysis.*` 경고가 보이는지를 순서대로 확인한다.</text>

  <rect x="56" y="212" width="1168" height="364" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="252" class="section">CLIENT / SERVER FLOW</text>

  <text x="236" y="300" class="nodeTitle">Client</text>
  <text x="962" y="300" class="nodeTitle">Server</text>
  <line x1="270" y1="324" x2="270" y2="534" stroke="#BCD6EE" stroke-width="4"/>
  <line x1="1010" y1="324" x2="1010" y2="534" stroke="#C2E0D0" stroke-width="4"/>

  <line x1="304" y1="362" x2="976" y2="362" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="574" y="346" class="badge">SYN</text>

  <line x1="976" y1="418" x2="304" y2="418" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="548" y="402" class="badge">SYN, ACK</text>

  <line x1="304" y1="474" x2="976" y2="474" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="590" y="458" class="badge">ACK</text>

  <line x1="304" y1="530" x2="976" y2="530" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="520" y="514" class="badge">Data / ACK 반복</text>

  <rect x="112" y="616" width="1056" height="136" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="152" y="662" class="nodeTitle">진단 포인트</text>
  <rect x="152" y="686" width="184" height="34" rx="17" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="180" y="708" class="badge">retransmission</text>
  <rect x="362" y="686" width="170" height="34" rx="17" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="390" y="708" class="badge">duplicate ack</text>
  <rect x="558" y="686" width="148" height="34" rx="17" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="586" y="708" class="badge">zero window</text>
  <rect x="732" y="686" width="124" height="34" rx="17" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="772" y="708" class="badge">reset</text>
  <text x="874" y="686" class="nodeText">1. handshake 확인</text>
  <text x="874" y="712" class="nodeText">2. `tcp.stream eq N` → `tcp.analysis.*` 해석</text>
</svg>
