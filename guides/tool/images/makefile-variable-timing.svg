<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47647F; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566C83; }
    .panelTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .panelText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .code { font: 700 16px "SF Mono", "SFMono-Regular", "Menlo", monospace; fill: #17304A; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">VARIABLE EVALUATION</text>
  <text x="72" y="114" class="title">`=`는 늦게 펼쳐지고 `:=`는 즉시 고정된다</text>
  <text x="72" y="146" class="subtitle">같은 변수 참조라도 평가 시점이 다르면 최종 명령줄이 달라진다.</text>

  <rect x="72" y="214" width="536" height="506" rx="30" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="112" y="266" class="panelTitle">재귀적 확장 `=`</text>
  <text x="112" y="294" class="panelText">참조될 때 값을 다시 읽는다.</text>

  <rect x="112" y="330" width="456" height="240" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="144" y="376" class="code">A = $(B)</text>
  <text x="144" y="414" class="code">B = hello</text>
  <text x="144" y="452" class="code">B = clang</text>
  <text x="144" y="520" class="code">echo $(A)   # =&gt; clang</text>
  <text x="144" y="554" class="panelText">나중에 `$(A)`를 사용할 때 현재의 `B` 값을 본다.</text>

  <rect x="112" y="606" width="456" height="72" rx="22" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="146" y="650" class="badge">설정 파일, 환경 변수 조합처럼 나중 값 반영이 필요할 때 유용</text>

  <rect x="672" y="214" width="536" height="506" rx="30" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="712" y="266" class="panelTitle">즉시 확장 `:=`</text>
  <text x="712" y="294" class="panelText">할당하는 순간 값을 캡처한다.</text>

  <rect x="712" y="330" width="456" height="240" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="744" y="376" class="code">A := $(B)</text>
  <text x="744" y="414" class="code">B = hello</text>
  <text x="744" y="452" class="code">B = clang</text>
  <text x="744" y="520" class="code">echo $(A)   # =&gt; ""</text>
  <text x="744" y="554" class="panelText">`A`는 첫 줄 실행 시점의 `B`만 기억하고 이후 변경은 안 본다.</text>

  <rect x="712" y="606" width="456" height="72" rx="22" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="746" y="650" class="badge">대부분의 빌드 설정 변수는 예측 가능성을 위해 `:=`가 더 안전하다</text>

  <rect x="224" y="742" width="832" height="44" rx="22" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="266" y="770" class="badge">우선순위: `make CC=clang` 같은 명령줄 변수는 Makefile 기본값보다 먼저 적용된다.</text>
</svg>
