<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">GRADLE MULTI MODULE</text>
  <text x="72" y="112" class="title">루트는 공통 규칙을 주고, 모듈 그래프가 실제 빌드 순서를 만든다</text>
  <text x="72" y="142" class="subtitle">멀티 모듈에서 중요한 것은 폴더 이름보다 include 관계와 `project(\":core\")` 같은 모듈 의존 선언이다.</text>

  <rect x="56" y="192" width="1168" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">MODULE GRAPH</text>

  <rect x="112" y="292" width="250" height="132" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="158" y="338" class="nodeTitle">settings.gradle.kts</text>
  <text x="168" y="366" class="nodeText">include("api", "core", "batch")</text>

  <rect x="112" y="500" width="250" height="132" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="166" y="546" class="nodeTitle">root build.gradle.kts</text>
  <text x="174" y="574" class="nodeText">subprojects { 공통 plugin, test 설정 }</text>

  <rect x="500" y="292" width="170" height="132" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="556" y="338" class="nodeTitle">core</text>
  <text x="528" y="366" class="nodeText">도메인, 공통 로직</text>

  <rect x="756" y="292" width="170" height="132" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="820" y="338" class="nodeTitle">api</text>
  <text x="790" y="366" class="nodeText">web, boot app</text>

  <rect x="1012" y="460" width="170" height="132" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="1064" y="506" class="nodeTitle">batch</text>
  <text x="1038" y="534" class="nodeText">배치 작업 모듈</text>

  <line x1="362" y1="358" x2="500" y2="358" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="670" y1="358" x2="756" y2="358" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="362" y1="566" x2="500" y2="390" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="362" y1="566" x2="756" y2="390" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="362" y1="566" x2="1012" y2="526" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="516" y="500" width="420" height="100" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="548" y="542" class="nodeText">`implementation(project(":core"))` 같은 선언이 모듈 간 classpath와</text>
  <text x="548" y="566" class="nodeText">연관 태스크 의존성을 같이 만든다.</text>

  <text x="84" y="760" class="footnote">읽는 법: include로 프로젝트를 등록하고, 루트는 공통 규칙을, 각 모듈은 자기 의존성만 선언한다. 그 의존성이 결국 빌드 순서를 만든다.</text>
</svg>
