<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5A7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #47647F; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #566C83; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .code { font: 700 15px "SF Mono", "SFMono-Regular", "Menlo", monospace; fill: #17304A; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F8FBFF"/>

  <text x="72" y="70" class="eyebrow">AUTO DEPENDENCIES</text>
  <text x="72" y="114" class="title">`.d` 파일을 다시 include해야 헤더 변경을 놓치지 않는다</text>
  <text x="72" y="146" class="subtitle">컴파일러가 생성한 dependency 정보를 다음 make 실행에서 다시 읽어야 header 수정이 정확히 전파된다.</text>

  <rect x="56" y="206" width="1168" height="552" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="246" class="section">INCLUDE AND REBUILD</text>

  <rect x="96" y="316" width="300" height="214" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="146" y="372" class="nodeTitle">Makefile</text>
  <text x="146" y="406" class="code">include config.mk</text>
  <text x="146" y="440" class="code">-include $(DEPFILES)</text>
  <text x="146" y="486" class="nodeText">시작할 때 기존 `.d` 파일을 읽어</text>
  <text x="146" y="510" class="nodeText">header dependency를 그래프에 붙인다.</text>

  <rect x="490" y="300" width="300" height="246" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="536" y="356" class="nodeTitle">컴파일 규칙</text>
  <text x="536" y="392" class="code">$(CC) $(CFLAGS) -MMD -MP</text>
  <text x="536" y="426" class="code">-c src/utils.c -o build/utils.o</text>
  <text x="536" y="474" class="nodeText">`.o`와 함께 `build/utils.d`를 생성한다.</text>
  <rect x="536" y="502" width="114" height="34" rx="17" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="562" y="524" class="badge">utils.o + utils.d</text>

  <rect x="884" y="316" width="244" height="214" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="938" y="372" class="nodeTitle">utils.d</text>
  <text x="926" y="408" class="code">build/utils.o: src/utils.c</text>
  <text x="926" y="438" class="code">include/utils.h</text>
  <text x="926" y="486" class="nodeText">다음 실행 때 include되어</text>
  <text x="926" y="510" class="nodeText">header dependency를 복원한다.</text>

  <line x1="396" y1="430" x2="490" y2="430" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="430" x2="884" y2="430" stroke="#5A7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="884" y1="500" x2="396" y2="500" stroke="#5A7692" stroke-width="3" stroke-dasharray="12 10" marker-end="url(#arrow)"/>

  <rect x="236" y="620" width="808" height="74" rx="22" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="278" y="652" class="badge">결과: `include/utils.h`만 수정해도 다음 `make`가 `utils.d`를 읽고 `build/utils.o`와 최종 target을 다시 빌드한다.</text>
  <text x="278" y="678" class="badge">즉, `.d` 파일은 “컴파일 때 생성하고 다음 실행에서 재사용하는 dependency 캐시”다.</text>
</svg>
