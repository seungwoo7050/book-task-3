<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#597591"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476580; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #486680; letter-spacing: 0.12em; }
    .nodeTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="860" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="116" r="118" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="128" cy="790" r="152" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">CONFIG EXECUTION GRAPH</text>
  <text x="72" y="116" class="title">`playwright.config.ts`는 실행 순서를 설명한다</text>
  <text x="72" y="148" class="subtitle">setup, webServer, 브라우저별 project, 리포트가 어떻게 연결되는지 먼저 보면 설정 파일이 읽힌다.</text>

  <rect x="88" y="214" width="210" height="108" rx="24" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="134" y="260" class="nodeTitle">CLI 시작</text>
  <text x="126" y="286" class="nodeText">`npx playwright test`</text>

  <rect x="362" y="196" width="252" height="144" rx="26" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="406" y="248" class="nodeTitle">Global Config</text>
  <text x="406" y="276" class="nodeText">`testDir`, `use`, `retries`,</text>
  <text x="406" y="298" class="nodeText">`workers`, `projects`</text>

  <rect x="696" y="196" width="222" height="144" rx="26" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="740" y="248" class="nodeTitle">webServer gate</text>
  <text x="734" y="276" class="nodeText">앱이 준비되기 전에는</text>
  <text x="740" y="298" class="nodeText">프로젝트 실행 안 함</text>

  <rect x="982" y="196" width="210" height="144" rx="26" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="1024" y="248" class="nodeTitle">Artifacts</text>
  <text x="1012" y="276" class="nodeText">trace, screenshot,</text>
  <text x="1036" y="298" class="nodeText">HTML report</text>

  <text x="84" y="408" class="section">SETUP AND DEPENDENT PROJECTS</text>

  <rect x="92" y="442" width="282" height="180" rx="28" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="160" y="500" class="nodeTitle">setup project</text>
  <text x="132" y="530" class="nodeText">`auth.setup.ts`가 로그인하고</text>
  <text x="132" y="554" class="nodeText">storageState를 한 번 저장한다</text>
  <rect x="132" y="576" width="186" height="32" rx="16" fill="#EEF7FF" stroke="#BDD7EF"/>
  <text x="152" y="598" class="chip">playwright/.auth/user.json</text>

  <rect x="426" y="420" width="700" height="244" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="462" y="462" class="section">AUTHENTICATED PROJECTS</text>

  <rect x="462" y="500" width="184" height="128" rx="22" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="506" y="546" class="nodeTitle">chromium</text>
  <text x="490" y="574" class="nodeText">Desktop Chrome</text>
  <text x="488" y="596" class="nodeText">storageState 재사용</text>

  <rect x="684" y="500" width="184" height="128" rx="22" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="744" y="546" class="nodeTitle">firefox</text>
  <text x="724" y="574" class="nodeText">Desktop Firefox</text>
  <text x="718" y="596" class="nodeText">동일 setup 의존</text>

  <rect x="906" y="500" width="184" height="128" rx="22" fill="#EEF8F3" stroke="#C4E1D2"/>
  <text x="932" y="546" class="nodeTitle">mobile-chrome</text>
  <text x="956" y="574" class="nodeText">Pixel 5</text>
  <text x="942" y="596" class="nodeText">동일 auth 재사용</text>

  <rect x="460" y="706" width="622" height="86" rx="24" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="500" y="744" class="nodeTitle">읽는 기준</text>
  <text x="500" y="770" class="nodeText">공통 규칙은 `use`, 선행 준비는 setup, 브라우저별 차이는 각 project에 놓는다.</text>

  <line x1="298" y1="268" x2="362" y2="268" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="614" y1="268" x2="696" y2="268" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="488" y1="340" x2="234" y2="442" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="488" y1="340" x2="776" y2="420" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="806" y1="340" x2="806" y2="420" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="374" y1="530" x2="426" y2="530" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="776" y1="468" x2="554" y2="500" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="776" y1="468" x2="776" y2="500" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="776" y1="468" x2="998" y2="500" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1126" y1="542" x2="1088" y2="340" stroke="#597591" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
