<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18324A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .lane { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="900" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="116" r="118" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="134" cy="806" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">FIXTURE GRAPH AND SCOPE</text>
  <text x="72" y="116" class="title">fixture는 함수 목록이 아니라 의존성 그래프다</text>
  <text x="72" y="148" class="subtitle">scope가 넓을수록 오래 살아남고, fixture 인자가 많을수록 그래프가 깊어진다.</text>

  <rect x="72" y="214" width="1136" height="184" rx="28" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="104" y="252" class="lane">SESSION SCOPE</text>

  <rect x="112" y="286" width="244" height="80" rx="20" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="176" y="334" class="nodeTitle">db_engine</text>
  <text x="162" y="356" class="nodeText">세션 전체에서 한 번 생성</text>

  <rect x="402" y="286" width="244" height="80" rx="20" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="462" y="334" class="nodeTitle">app</text>
  <text x="454" y="356" class="nodeText">테스트용 애플리케이션</text>

  <rect x="692" y="286" width="244" height="80" rx="20" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="736" y="334" class="nodeTitle">tmp_path_factory</text>
  <text x="740" y="356" class="nodeText">세션 범위 임시 경로</text>

  <rect x="72" y="434" width="1136" height="184" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="104" y="472" class="lane">FUNCTION SCOPE</text>

  <rect x="112" y="508" width="220" height="82" rx="20" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="176" y="556" class="nodeTitle">session</text>
  <text x="152" y="578" class="nodeText">db_engine에 연결 후 rollback</text>

  <rect x="392" y="508" width="220" height="82" rx="20" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="444" y="556" class="nodeTitle">user_repo</text>
  <text x="446" y="578" class="nodeText">session을 의존</text>

  <rect x="672" y="508" width="220" height="82" rx="20" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="736" y="556" class="nodeTitle">api_client</text>
  <text x="712" y="578" class="nodeText">app을 감싼 테스트 클라이언트</text>

  <rect x="952" y="494" width="216" height="112" rx="20" fill="#FFF0EE" stroke="#F0B9B1" filter="url(#shadow)"/>
  <text x="1004" y="542" class="nodeTitle">autouse reset_db</text>
  <text x="992" y="570" class="nodeText">테스트 전후 자동 적용</text>
  <text x="1004" y="592" class="nodeText">흐름이 숨기 쉬운 지점</text>

  <rect x="280" y="684" width="720" height="136" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="318" y="734" class="nodeTitle">test_create_user(user_repo, api_client)</text>
  <text x="318" y="764" class="nodeText">pytest는 함수 시그니처를 보고 필요한 fixture만 역으로 계산해 준비한다.</text>
  <rect x="318" y="780" width="176" height="30" rx="15" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="350" y="800" class="chip">unused fixture는 실행 안 함</text>

  <line x1="234" y1="366" x2="222" y2="508" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="524" y1="366" x2="782" y2="508" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="222" y1="590" x2="502" y2="508" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="502" y1="590" x2="490" y2="684" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="782" y1="590" x2="716" y2="684" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1060" y1="606" x2="872" y2="684" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
