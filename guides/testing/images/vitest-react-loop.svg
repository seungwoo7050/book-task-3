<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B7692"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18324A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .nodeTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
  </style>

  <rect width="1280" height="900" rx="34" fill="#F7FBFF"/>
  <circle cx="1148" cy="114" r="118" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="132" cy="806" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">REACT COMPONENT TEST LOOP</text>
  <text x="72" y="116" class="title">컴포넌트 테스트는 사용자 행동과 화면 전환의 루프로 읽는다</text>
  <text x="72" y="148" class="subtitle">render, query, userEvent, async assertion이 한 흐름으로 이어져야 테스트가 실제 사용 경험을 따라간다.</text>

  <rect x="84" y="220" width="220" height="156" rx="24" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="152" y="274" class="nodeTitle">render</text>
  <text x="128" y="304" class="nodeText">컴포넌트와 provider를</text>
  <text x="152" y="328" class="nodeText">테스트 DOM에 올린다</text>

  <rect x="364" y="220" width="244" height="156" rx="24" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="418" y="274" class="nodeTitle">query 선택</text>
  <text x="404" y="304" class="nodeText">Role -> Label -> Text 순서로</text>
  <text x="430" y="328" class="nodeText">의미 기반 접근</text>
  <rect x="420" y="344" width="126" height="30" rx="15" fill="#F3FBF7" stroke="#C4E1D2"/>
  <text x="450" y="364" class="badge">`getByRole`</text>

  <rect x="668" y="220" width="220" height="156" rx="24" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="726" y="274" class="nodeTitle">userEvent</text>
  <text x="712" y="304" class="nodeText">click, type, tab으로</text>
  <text x="716" y="328" class="nodeText">실제 사용 흐름 재현</text>

  <rect x="948" y="220" width="236" height="156" rx="24" fill="#F6EEF9" stroke="#DCCDE9" filter="url(#shadow)"/>
  <text x="1000" y="274" class="nodeTitle">화면 전환 확인</text>
  <text x="982" y="304" class="nodeText">즉시 있으면 `getBy`,</text>
  <text x="980" y="328" class="nodeText">나중에 뜨면 `findBy` 사용</text>

  <line x1="304" y1="298" x2="364" y2="298" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="608" y1="298" x2="668" y2="298" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="888" y1="298" x2="948" y2="298" stroke="#5B7692" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="474" class="section">QUERY ROLES</text>

  <rect x="92" y="512" width="334" height="230" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="128" y="566" class="nodeTitle">`getBy*`</text>
  <text x="128" y="596" class="nodeText">지금 당장 있어야 하는 요소</text>
  <text x="128" y="620" class="nodeText">없으면 바로 실패</text>

  <rect x="472" y="512" width="334" height="230" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="510" y="566" class="nodeTitle">`findBy*`</text>
  <text x="510" y="596" class="nodeText">비동기 렌더 후 나타날 요소</text>
  <text x="510" y="620" class="nodeText">Promise + 자동 대기</text>

  <rect x="852" y="512" width="334" height="230" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="888" y="566" class="nodeTitle">`queryBy*`</text>
  <text x="888" y="596" class="nodeText">없어야 하는 요소 검사</text>
  <text x="888" y="620" class="nodeText">null 반환, absence 검증에 적합</text>

  <rect x="366" y="794" width="550" height="44" rx="18" fill="#FFF0EE" stroke="#F0B9B1"/>
  <text x="404" y="822" class="badge">핵심: 사용자 행동을 `await user.*`로 실행한 뒤, 맞는 query 계열로 결과 상태를 확인한다.</text>
</svg>
