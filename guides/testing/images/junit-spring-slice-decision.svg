<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">JUNIT SPRING SLICE DECISION</text>
  <text x="72" y="112" class="title">전체 컨텍스트를 띄우기 전에 필요한 조각부터 고른다</text>
  <text x="72" y="142" class="subtitle">Spring 테스트가 느려지는 가장 큰 이유는 필요한 범위보다 넓은 컨텍스트를 띄우는 것이다.</text>

  <rect x="56" y="192" width="1168" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">SLICE DECISION</text>

  <rect x="492" y="268" width="296" height="92" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="556" y="308" class="nodeTitle">무엇을 검증하려는가?</text>
  <text x="556" y="332" class="nodeText">HTTP 계약, JPA 쿼리, 전체 wiring 중 하나를 먼저 고른다.</text>

  <rect x="102" y="458" width="250" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="154" y="504" class="nodeTitle">@WebMvcTest</text>
  <text x="148" y="532" class="nodeText">Controller, validation, JSON,</text>
  <text x="174" y="556" class="nodeText">MockMvc 검증</text>

  <rect x="514" y="458" width="250" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="562" y="504" class="nodeTitle">@DataJpaTest</text>
  <text x="556" y="532" class="nodeText">Repository, JPQL,</text>
  <text x="566" y="556" class="nodeText">Entity 매핑 검증</text>

  <rect x="926" y="458" width="250" height="144" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="958" y="504" class="nodeTitle">@SpringBootTest</text>
  <text x="962" y="532" class="nodeText">전체 빈 wiring, security,</text>
  <text x="1002" y="556" class="nodeText">실제 통합 흐름</text>

  <line x1="560" y1="360" x2="228" y2="458" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="360" x2="640" y2="458" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="720" y1="360" x2="1052" y2="458" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="84" y="760" class="footnote">읽는 법: HTTP면 WebMvc, JPA면 DataJpa, 전체 wiring이면 SpringBootTest다. 가장 좁은 컨텍스트부터 선택하는 것이 기본 전략이다.</text>
</svg>
