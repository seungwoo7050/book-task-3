<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#597592"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#18324A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #556C83; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #15314B; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D748B; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44627A; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #476581; letter-spacing: 0.12em; }
  </style>

  <rect width="1280" height="900" rx="34" fill="#F7FBFF"/>
  <circle cx="1140" cy="118" r="118" fill="#DDF3EA" fill-opacity="0.76"/>
  <circle cx="136" cy="804" r="150" fill="#DDEEFF" fill-opacity="0.66"/>

  <text x="72" y="70" class="eyebrow">LOCATOR DECISION</text>
  <text x="72" y="116" class="title">Locator는 의미가 가장 오래 남는 순서로 고른다</text>
  <text x="72" y="148" class="subtitle">접근성 의미가 살아 있는 locator부터 내려오면 UI 구조 변경에도 테스트 의도가 유지된다.</text>

  <polygon points="640,228 856,348 640,468 424,348" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="562" y="336" class="nodeTitle">사용자 의미가</text>
  <text x="538" y="364" class="nodeTitle">노출된 요소인가?</text>

  <rect x="154" y="268" width="222" height="164" rx="28" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="200" y="324" class="nodeTitle">Role / Label</text>
  <text x="196" y="354" class="nodeText">버튼, 링크, 입력처럼</text>
  <text x="188" y="378" class="nodeText">접근성 이름이 있는 요소</text>
  <rect x="196" y="396" width="136" height="34" rx="17" fill="#EEF7FF" stroke="#BDD7EF"/>
  <text x="218" y="419" class="badge">가장 먼저 선택</text>

  <rect x="922" y="236" width="214" height="164" rx="28" fill="#EEF8F3" stroke="#C4E1D2" filter="url(#shadow)"/>
  <text x="964" y="292" class="nodeTitle">Text 계열</text>
  <text x="960" y="322" class="nodeText">text, placeholder,</text>
  <text x="972" y="346" class="nodeText">alt, title</text>
  <rect x="964" y="364" width="126" height="34" rx="17" fill="#F3FBF7" stroke="#C4E1D2"/>
  <text x="993" y="387" class="badge">보이는 의미</text>

  <polygon points="1028,470 1174,558 1028,646 882,558" fill="#EAF4FF" stroke="#BDD7EF" filter="url(#shadow)"/>
  <text x="960" y="550" class="nodeTitle">안정적인 테스트</text>
  <text x="984" y="578" class="nodeTitle">계약이 있는가?</text>

  <rect x="886" y="690" width="288" height="150" rx="28" fill="#FFF6E8" stroke="#EAD29D" filter="url(#shadow)"/>
  <text x="948" y="746" class="nodeTitle">`getByTestId`</text>
  <text x="926" y="776" class="nodeText">UI 복사 문구가 자주 바뀌지만</text>
  <text x="926" y="800" class="nodeText">개발팀이 유지하는 계약은 남는 경우</text>

  <rect x="108" y="612" width="560" height="206" rx="30" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="150" y="662" class="section">LAST RESORT</text>
  <text x="150" y="702" class="nodeTitle">CSS / XPath는 마지막에만</text>
  <text x="150" y="734" class="nodeText">레이아웃 구조, 클래스명, DOM 깊이에 직접 결합되므로 UI 리팩터링에 가장 약하다.</text>
  <text x="150" y="760" class="nodeText">정말 필요하면 `locator(...).filter(...).nth(...)`로 범위를 좁히고, 왜 필요한지 테스트에 남긴다.</text>
  <rect x="150" y="780" width="196" height="32" rx="16" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="176" y="802" class="badge">`css=` / `xpath=` / `.locator()`</text>

  <line x1="424" y1="348" x2="376" y2="348" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="856" y1="348" x2="922" y2="318" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1028" y1="400" x2="1028" y2="470" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1028" y1="646" x2="1028" y2="690" stroke="#597592" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M922 558 C804 594 742 646 668 704" stroke="#597592" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="332" y="292" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="352" y="315" class="badge">예</text>
  <rect x="872" y="292" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="892" y="315" class="badge">아니오</text>
  <rect x="1086" y="666" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="1106" y="689" class="badge">예</text>
</svg>
