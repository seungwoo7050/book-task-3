<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">JUNIT TESTING SCOPES</text>
  <text x="72" y="112" class="title">단위 → 슬라이스 → 통합으로 범위를 넓힌다</text>
  <text x="72" y="142" class="subtitle">범위가 넓을수록 더 많은 것을 검증하지만, 속도는 느려지고 실패 원인도 넓어진다.</text>

  <rect x="56" y="192" width="1168" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">TEST SCOPE</text>

  <rect x="132" y="496" width="220" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="196" y="542" class="nodeTitle">Unit Test</text>
  <text x="174" y="570" class="nodeText">Mockito + AssertJ</text>
  <text x="180" y="594" class="nodeText">가장 빠르고 원인 좁음</text>

  <rect x="414" y="396" width="220" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="456" y="442" class="nodeTitle">Slice Test</text>
  <text x="460" y="470" class="nodeText">@WebMvcTest</text>
  <text x="462" y="494" class="nodeText">@DataJpaTest</text>

  <rect x="696" y="288" width="220" height="144" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="716" y="334" class="nodeTitle">Integration Test</text>
  <text x="748" y="362" class="nodeText">@SpringBootTest</text>
  <text x="728" y="386" class="nodeText">실제 빈 wiring 확인</text>

  <rect x="978" y="220" width="180" height="92" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1014" y="260" class="nodeText">속도는 느려지지만</text>
  <text x="1010" y="284" class="nodeText">시스템 신뢰는 커짐</text>

  <text x="84" y="760" class="footnote">읽는 법: 기본은 unit, 필요한 웹 또는 JPA 조각만 slice, 전체 wiring과 외부 연동을 확인할 때만 integration으로 올라간다.</text>
</svg>
