<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">JUNIT TEST LIFECYCLE</text>
  <text x="72" y="112" class="title">fixture는 테스트 메서드 바깥에서 반복적으로 열린다</text>
  <text x="72" y="142" class="subtitle">테스트 격리는 `@BeforeEach`와 `@AfterEach`에서 시작된다. 한 번만 실행되는 훅과 매 테스트마다 반복되는 훅을 구분해야 한다.</text>

  <rect x="56" y="192" width="1168" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">LIFECYCLE</text>

  <line x1="166" y1="438" x2="1102" y2="438" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="376" width="154" height="124" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="118" y="422" class="nodeTitle">@BeforeAll</text>
  <text x="126" y="450" class="nodeText">클래스당 한 번</text>

  <rect x="302" y="356" width="176" height="164" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="334" y="402" class="nodeTitle">@BeforeEach</text>
  <text x="336" y="430" class="nodeText">fixture 초기화</text>
  <text x="328" y="454" class="nodeText">mock reset, 데이터 준비</text>

  <rect x="538" y="376" width="166" height="124" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="590" y="422" class="nodeTitle">@Test</text>
  <text x="580" y="450" class="nodeText">실행과 검증</text>

  <rect x="764" y="356" width="176" height="164" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="796" y="402" class="nodeTitle">@AfterEach</text>
  <text x="800" y="430" class="nodeText">정리와 검증</text>
  <text x="802" y="454" class="nodeText">상태 누수 방지</text>

  <rect x="1000" y="376" width="154" height="124" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1032" y="422" class="nodeTitle">@AfterAll</text>
  <text x="1040" y="450" class="nodeText">클래스당 한 번</text>

  <rect x="514" y="536" width="214" height="56" rx="18" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="550" y="570" class="chip">다음 테스트마다 @BeforeEach ~ @AfterEach 반복</text>

  <text x="84" y="640" class="footnote">읽는 법: 공용 리소스는 All 훅, 테스트 독립성은 Each 훅이 담당한다. 상태가 새면 대부분 Each 훅 경계가 잘못된 것이다.</text>
</svg>
