<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .cardTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .node { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">REDIS CACHING PATTERNS</text>
  <text x="72" y="112" class="title">읽기 패턴과 쓰기 패턴을 따로 본다</text>
  <text x="72" y="142" class="subtitle">Cache-Aside는 읽기 최적화, Write-Through는 쓰기 일관성 최적화다. 업데이트 후 무효화는 둘 사이를 메우는 기본 안전장치다.</text>

  <rect x="56" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">READ PATH</text>
  <text x="84" y="268" class="cardTitle">Cache-Aside</text>
  <text x="84" y="296" class="cardText">캐시에 없을 때만 DB를 읽고 다시 채운다.</text>
  <rect x="96" y="352" width="108" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="122" y="396" class="node">API</text>
  <rect x="252" y="352" width="108" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="272" y="396" class="node">Redis</text>
  <rect x="176" y="496" width="108" height="72" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="210" y="540" class="node">DB</text>
  <line x1="204" y1="388" x2="252" y2="388" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="306" y1="424" x2="306" y2="456" stroke="#5E7895" stroke-width="3"/>
  <line x1="306" y1="456" x2="230" y2="456" stroke="#5E7895" stroke-width="3"/>
  <line x1="230" y1="456" x2="230" y2="496" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="230" y1="496" x2="230" y2="606" stroke="#5E7895" stroke-width="3"/>
  <line x1="230" y1="606" x2="306" y2="606" stroke="#5E7895" stroke-width="3"/>
  <line x1="306" y1="606" x2="306" y2="568" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="252" y1="388" x2="204" y2="388" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)" opacity="0.001"/>
  <text x="220" y="340" class="cardText">Hit면 바로 반환</text>
  <text x="124" y="646" class="cardText">Miss면 DB 조회 후</text>
  <text x="124" y="670" class="cardText">Redis에 넣고 반환</text>

  <rect x="460" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="488" y="232" class="section">WRITE PATH</text>
  <text x="488" y="268" class="cardTitle">Write-Through</text>
  <text x="488" y="296" class="cardText">쓰는 즉시 DB와 캐시를 같이 갱신한다.</text>
  <rect x="500" y="404" width="108" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="526" y="448" class="node">API</text>
  <rect x="656" y="304" width="108" height="72" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="690" y="348" class="node">DB</text>
  <rect x="656" y="504" width="108" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="676" y="548" class="node">Redis</text>
  <line x1="608" y1="440" x2="656" y2="340" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="608" y1="440" x2="656" y2="540" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="488" y="646" class="cardText">쓰기 지연은 늘지만</text>
  <text x="488" y="670" class="cardText">캐시가 더 빨리 최신값을 따라온다.</text>

  <rect x="864" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="892" y="232" class="section">SAFE DEFAULT</text>
  <text x="892" y="268" class="cardTitle">Invalidate After Write</text>
  <text x="892" y="296" class="cardText">업데이트 직후 캐시를 지우고 다음 읽기에서 다시 채운다.</text>
  <rect x="920" y="404" width="108" height="72" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="954" y="448" class="node">DB</text>
  <rect x="1076" y="404" width="108" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="1092" y="448" class="node">DEL key</text>
  <line x1="1028" y1="440" x2="1076" y2="440" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="892" y="646" class="cardText">실수하기 가장 어려운 기본 전략.</text>
  <text x="892" y="670" class="cardText">“업데이트보다 삭제가 안전하다”를 기억한다.</text>

  <text x="72" y="824" class="footnote">읽는 법: 읽기가 많으면 Cache-Aside, 강한 쓰기 일관성이 필요하면 Write-Through, 애매하면 DB 저장 직후 invalidate부터 시작하는 편이 안전하다.</text>
</svg>
