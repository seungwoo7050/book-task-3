<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .cardTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .node { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">SPRING DATA JPA FETCH STRATEGIES</text>
  <text x="72" y="112" class="title">N+1은 쿼리 수를 기준으로 비교한다</text>
  <text x="72" y="142" class="subtitle">같은 `users -> posts` 조회라도 fetch 전략에 따라 SQL 수와 객체 그래프 로딩 방식이 달라진다.</text>

  <rect x="56" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">PROBLEM</text>
  <text x="84" y="268" class="cardTitle">LAZY + loop</text>
  <text x="84" y="296" class="cardText">사용자 목록을 가져온 뒤 각 사용자의 posts를 순회한다.</text>
  <rect x="102" y="352" width="118" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="134" y="396" class="node">Users</text>
  <rect x="102" y="472" width="118" height="72" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="126" y="516" class="node">posts #1</text>
  <rect x="244" y="472" width="118" height="72" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="268" y="516" class="node">posts #2</text>
  <line x1="160" y1="424" x2="160" y2="472" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="160" y1="424" x2="302" y2="472" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="84" y="640" class="cardText">1 + N개의 SELECT가 나가고, 루프가 길수록 더 느려진다.</text>

  <rect x="460" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="488" y="232" class="section">TARGETED FIX</text>
  <text x="488" y="268" class="cardTitle">JOIN FETCH / @EntityGraph</text>
  <text x="488" y="296" class="cardText">조회 시점에 연관을 같이 가져오겠다고 명시한다.</text>
  <rect x="518" y="404" width="244" height="92" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="562" y="442" class="node">SELECT users</text>
  <text x="560" y="466" class="node">JOIN posts</text>
  <text x="582" y="490" class="cardText">보통 1 query</text>
  <text x="488" y="640" class="cardText">항상 함께 필요한 연관이면 가장 직접적이고 의도가 선명하다.</text>

  <rect x="864" y="192" width="360" height="584" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="892" y="232" class="section">GLOBAL SAFETY NET</text>
  <text x="892" y="268" class="cardTitle">batch_fetch_size</text>
  <text x="892" y="296" class="cardText">LAZY 로딩은 유지하되, 연관 ID를 묶어서 IN query로 가져온다.</text>
  <rect x="932" y="392" width="224" height="108" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="974" y="434" class="node">SELECT users</text>
  <text x="958" y="460" class="cardText">그 뒤 posts WHERE user_id IN (...)</text>
  <text x="1008" y="486" class="cardText">보통 1 + 1</text>
  <text x="892" y="640" class="cardText">전역 완충재로 유용하지만, 조회 의도를 대체하진 못한다.</text>

  <text x="72" y="824" class="footnote">읽는 법: 기본은 N+1 여부를 SQL 로그로 확인하고, 항상 필요한 연관이면 fetch join, 메서드 수준 선언이면 EntityGraph, 전체 안전망이면 batch fetch로 정리한다.</text>
</svg>
