<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .cardTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">REFERENCES VS RELATIONS</text>
  <text x="72" y="112" class="title">references와 relations는 서로 다른 층을 담당한다</text>
  <text x="72" y="142" class="subtitle">하나는 DB 무결성을 만들고, 다른 하나는 `db.query`가 어떤 중첩 경로를 따를지 알려준다.</text>

  <rect x="56" y="184" width="552" height="556" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="224" class="section">DATABASE LAYER</text>

  <rect x="104" y="256" width="180" height="114" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="160" y="300" class="nodeTitle">users</text>
  <text x="134" y="328" class="nodeText">id, email, name</text>

  <rect x="352" y="256" width="180" height="114" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="418" y="300" class="nodeTitle">posts</text>
  <text x="388" y="328" class="nodeText">authorId references users.id</text>

  <rect x="352" y="414" width="180" height="114" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="384" y="458" class="nodeTitle">posts_tags</text>
  <text x="382" y="486" class="nodeText">postId, tagId with cascade</text>

  <rect x="104" y="414" width="180" height="114" rx="22" fill="#F4F7FB" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="170" y="458" class="nodeTitle">tags</text>
  <text x="140" y="486" class="nodeText">id, name</text>

  <line x1="284" y1="313" x2="352" y2="313" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="442" y1="370" x2="442" y2="414" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="352" y1="470" x2="284" y2="470" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="104" y="580" width="428" height="112" rx="22" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="136" y="622" class="cardTitle">references()</text>
  <text x="136" y="650" class="cardText">실제 FK 제약과 `onDelete: "cascade"` 같은 규칙은</text>
  <text x="136" y="672" class="cardText">DB 레벨에서 무결성을 강제한다.</text>

  <rect x="672" y="184" width="552" height="556" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="700" y="224" class="section">QUERY LAYER</text>

  <rect x="720" y="256" width="456" height="132" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="752" y="300" class="cardTitle">relations()</text>
  <text x="752" y="328" class="cardText">`usersRelations.posts`, `postsRelations.author`처럼</text>
  <text x="752" y="350" class="cardText">`db.query`가 따라갈 그래프를 선언한다.</text>

  <rect x="720" y="432" width="456" height="136" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="752" y="476" class="cardTitle">db.query.users.findMany()</text>
  <text x="752" y="504" class="cardText">`with: { posts: true }`처럼 relation 메타데이터를</text>
  <text x="752" y="526" class="cardText">타고 중첩 결과를 만든다.</text>

  <rect x="752" y="612" width="392" height="80" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="780" y="646" class="chip">무결성은 references(), 탐색 경로는 relations()</text>
  <text x="828" y="668" class="chip">둘을 함께 써야 구조가 완성된다</text>

  <line x1="948" y1="388" x2="948" y2="432" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
