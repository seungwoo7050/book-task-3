<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SQLALCHEMY MENTAL MODEL</text>
  <text x="72" y="112" class="title">SQLAlchemy를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">Engine, Session, loading 전략을 분리해서 보면 SQLAlchemy의 API 수가 많아도 역할은 명확해진다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. RESOURCE BOUNDARY</text>
  <text x="102" y="252" class="cardTitle">엔진과 세션은 무엇이 다른가?</text>
  <text x="102" y="280" class="cardText">Engine은 연결 풀을, Session은 요청 단위의</text>
  <text x="102" y="302" class="cardText">unit of work를 관리한다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. LOADING BOUNDARY</text>
  <text x="490" y="252" class="cardTitle">연관 데이터를 몇 번의 쿼리로 읽을까?</text>
  <text x="490" y="280" class="cardText">lazy, joinedload, selectinload 선택이</text>
  <text x="490" y="302" class="cardText">쿼리 수와 결과 행 폭발을 바꾼다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. I/O BOUNDARY</text>
  <text x="878" y="252" class="cardTitle">sync와 async 스택은 어디서 갈라지나?</text>
  <text x="878" y="280" class="cardText">engine, session, execute 호출 방식이 함께 바뀌고</text>
  <text x="878" y="302" class="cardText">한 요청 안에서 섞지 않는 편이 안전하다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">RESOURCE TO QUERY FLOW</text>

  <line x1="182" y1="562" x2="1102" y2="562" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="488" width="176" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="134" y="534" class="nodeTitle">Engine</text>
  <text x="124" y="562" class="nodeText">create_engine()</text>
  <text x="120" y="586" class="nodeText">연결 풀과 dialect</text>

  <rect x="308" y="488" width="176" height="144" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="332" y="534" class="nodeTitle">sessionmaker</text>
  <text x="338" y="562" class="nodeText">Session 팩토리</text>
  <text x="334" y="586" class="nodeText">요청마다 새 세션</text>

  <rect x="528" y="488" width="176" height="144" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="582" y="534" class="nodeTitle">Session</text>
  <text x="552" y="562" class="nodeText">select, add, flush, commit</text>
  <text x="564" y="586" class="nodeText">unit of work</text>

  <rect x="748" y="488" width="176" height="144" rx="22" fill="#F4F7FB" stroke="#D1DEEA"/>
  <text x="798" y="534" class="nodeTitle">ORM 모델</text>
  <text x="774" y="562" class="nodeText">Mapped, relationship</text>
  <text x="784" y="586" class="nodeText">loading 전략 적용</text>

  <rect x="968" y="488" width="176" height="144" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="1030" y="534" class="nodeTitle">DB</text>
  <text x="1004" y="562" class="nodeText">SQL 실행과 결과 반환</text>
  <text x="1008" y="586" class="nodeText">connection은 풀로 복귀</text>

  <text x="84" y="722" class="footnote">핵심: Engine은 오래 살고, Session은 짧게 살며, loading 전략은 Session이 DB에서 어떤 쿼리를 몇 번 보낼지 결정한다.</text>
</svg>
