<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 19px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">REDIS MENTAL MODEL</text>
  <text x="72" y="112" class="title">키-값 저장소보다, 메모리 위 자료구조 서버로 읽기</text>
  <text x="72" y="142" class="subtitle">Redis는 값 보관함이 아니라 TTL이 붙은 자료구조를 원자적으로 조작하는 런타임이다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. DATA STRUCTURE</text>
  <text x="102" y="252" class="cardTitle">무엇을 저장하는가?</text>
  <text x="102" y="280" class="cardText">문자열, 객체, 집합, 정렬된 점수를</text>
  <text x="102" y="302" class="cardText">타입별로 고른다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. TTL</text>
  <text x="490" y="252" class="cardTitle">얼마나 오래 둘 것인가?</text>
  <text x="490" y="280" class="cardText">캐시와 락은 수명을 같이 설계해야</text>
  <text x="490" y="302" class="cardText">메모리 누수와 영구 락을 막는다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. ATOMIC UPDATE</text>
  <text x="878" y="252" class="cardTitle">경쟁 상태를 어떻게 막는가?</text>
  <text x="878" y="280" class="cardText">INCR, HINCRBY, SET NX, Lua처럼</text>
  <text x="878" y="302" class="cardText">원자 명령을 우선 본다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">COMMON CHOICES</text>

  <rect x="90" y="468" width="160" height="148" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="132" y="512" class="nodeTitle">String</text>
  <text x="126" y="540" class="nodeText">단일 값, 토큰,</text>
  <text x="132" y="564" class="nodeText">카운터, 락</text>

  <rect x="276" y="468" width="160" height="148" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="328" y="512" class="nodeTitle">Hash</text>
  <text x="310" y="540" class="nodeText">사용자 세션,</text>
  <text x="324" y="564" class="nodeText">객체 필드</text>

  <rect x="462" y="468" width="160" height="148" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="514" y="512" class="nodeTitle">List</text>
  <text x="500" y="540" class="nodeText">작업 큐, 최근 목록</text>
  <text x="510" y="564" class="nodeText">FIFO / LIFO</text>

  <rect x="648" y="468" width="160" height="148" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="706" y="512" class="nodeTitle">Set</text>
  <text x="678" y="540" class="nodeText">태그, 중복 제거,</text>
  <text x="684" y="564" class="nodeText">멤버십 검사</text>

  <rect x="834" y="468" width="160" height="148" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="862" y="512" class="nodeTitle">Sorted Set</text>
  <text x="860" y="540" class="nodeText">랭킹, 우선순위,</text>
  <text x="872" y="564" class="nodeText">점수 정렬</text>

  <rect x="1020" y="468" width="156" height="148" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1058" y="512" class="nodeTitle">TTL</text>
  <text x="1046" y="540" class="nodeText">EXPIRE / EX</text>
  <text x="1040" y="564" class="nodeText">수명 관리 공통 규칙</text>

  <text x="84" y="704" class="footnote">읽는 법: Redis는 키 하나를 어디에 넣을지보다 어떤 자료구조와 TTL 정책으로 다룰지를 먼저 정하면 실무 코드가 훨씬 단순해진다.</text>
</svg>
