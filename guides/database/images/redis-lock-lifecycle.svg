<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">REDIS LOCK LIFECYCLE</text>
  <text x="72" y="112" class="title">락은 획득보다 해제가 더 중요하다</text>
  <text x="72" y="142" class="subtitle">Redis 락은 `SET NX EX`로 잡고, 같은 토큰인지 확인한 뒤 Lua로 해제해야 안전하다.</text>

  <rect x="56" y="192" width="1168" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">ACQUIRE AND RELEASE</text>

  <line x1="170" y1="438" x2="1108" y2="438" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="376" width="176" height="124" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="120" y="422" class="nodeTitle">Acquire</text>
  <text x="116" y="450" class="nodeText">`SET lock token NX EX 10`</text>
  <text x="126" y="474" class="nodeText">성공이면 진입</text>

  <rect x="320" y="356" width="214" height="164" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="370" y="402" class="nodeTitle">Critical Section</text>
  <text x="350" y="430" class="nodeText">중복 실행되면 안 되는 작업</text>
  <text x="354" y="454" class="nodeText">결제, 배치, 스케줄러</text>

  <rect x="590" y="356" width="198" height="164" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="652" y="402" class="nodeTitle">Release</text>
  <text x="620" y="430" class="nodeText">Lua로 현재 token 비교</text>
  <text x="622" y="454" class="nodeText">일치할 때만 DEL 실행</text>

  <rect x="844" y="288" width="176" height="112" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="874" y="334" class="nodeTitle">Wrong Delete</text>
  <text x="878" y="362" class="nodeText">토큰 비교 없이 DEL하면</text>
  <text x="870" y="386" class="nodeText">남이 잡은 락을 지울 수 있다</text>

  <rect x="844" y="456" width="176" height="112" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="900" y="502" class="nodeTitle">TTL</text>
  <text x="878" y="530" class="nodeText">프로세스 장애 시에도</text>
  <text x="884" y="554" class="nodeText">영구 락을 막는다</text>

  <rect x="1076" y="376" width="116" height="124" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1100" y="422" class="nodeTitle">Next</text>
  <text x="1100" y="450" class="nodeText">다른 작업이</text>
  <text x="1106" y="474" class="nodeText">락 획득</text>

  <line x1="264" y1="438" x2="320" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="534" y1="438" x2="590" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="788" y1="438" x2="1076" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="788" y1="420" x2="844" y2="356" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="788" y1="456" x2="844" y2="512" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="118" y="342" width="108" height="28" rx="14" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="142" y="361" class="chip">성공</text>

  <text x="84" y="640" class="footnote">읽는 법: 분산 락은 “잡았는가”보다 “내 락만 안전하게 푸는가”가 더 중요하다. 토큰 비교와 TTL이 빠지면 금방 깨진다.</text>
</svg>
