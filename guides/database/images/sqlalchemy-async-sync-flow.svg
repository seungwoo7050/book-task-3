<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SYNC VS ASYNC</text>
  <text x="72" y="112" class="title">sync와 async SQLAlchemy는 스택 전체가 함께 바뀐다</text>
  <text x="72" y="142" class="subtitle">engine, session, execute 호출 방식이 한 세트로 움직인다. 중간 한 부분만 바꾸는 식으로는 전환되지 않는다.</text>

  <rect x="56" y="190" width="1168" height="552" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="230" class="section">STACK SPLIT</text>

  <rect x="448" y="264" width="384" height="116" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="536" y="308" class="nodeTitle">어떤 실행 모델인가?</text>
  <text x="500" y="336" class="nodeText">동기 함수 기반인지, async endpoint와 await 체인인지 먼저 정한다.</text>

  <line x1="640" y1="380" x2="640" y2="438" stroke="#5E7895" stroke-width="4"/>
  <line x1="314" y1="438" x2="966" y2="438" stroke="#5E7895" stroke-width="4"/>
  <line x1="344" y1="438" x2="344" y2="490" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="936" y1="438" x2="936" y2="490" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="132" y="490" width="404" height="194" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="258" y="536" class="nodeTitle">Sync Stack</text>
  <text x="176" y="564" class="nodeText">`create_engine()` + `SessionLocal = sessionmaker(...)`</text>
  <text x="176" y="588" class="nodeText">FastAPI `def` 엔드포인트, 스크립트, CLI, 배치 작업에 적합</text>
  <text x="176" y="612" class="nodeText">`db.execute(stmt)`를 await 없이 호출한다.</text>
  <rect x="222" y="638" width="224" height="30" rx="15" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="264" y="658" class="chip">단순한 서버와 백그라운드 작업</text>

  <rect x="744" y="490" width="404" height="194" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="866" y="536" class="nodeTitle">Async Stack</text>
  <text x="784" y="564" class="nodeText">`create_async_engine()` + `async_sessionmaker(...)`</text>
  <text x="784" y="588" class="nodeText">FastAPI `async def` 엔드포인트와 asyncpg 조합에 적합</text>
  <text x="784" y="612" class="nodeText">`await db.execute(stmt)`와 `async with`가 기본이다.</text>
  <rect x="834" y="638" width="224" height="30" rx="15" fill="#FFF9EC" stroke="#E9D29D"/>
  <text x="876" y="658" class="chip">비동기 웹 요청과 await 체인</text>

  <rect x="316" y="702" width="648" height="24" rx="12" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="434" y="719" class="chip">한 요청 흐름 안에서 Session과 AsyncSession을 섞지 않는 편이 안전하다</text>
</svg>
