<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">DRIZZLE MENTAL MODEL</text>
  <text x="72" y="112" class="title">Drizzle를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">`schema.ts`를 중심으로 타입, 쿼리, 마이그레이션이 연결된다는 점을 먼저 잡으면 문서가 한 번에 정리된다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. SOURCE OF TRUTH</text>
  <text x="102" y="252" class="cardTitle">어떤 코드가 타입과 DB를 함께 정하는가?</text>
  <text x="102" y="280" class="cardText">`schema.ts`의 테이블 정의가 타입 추론과 FK,</text>
  <text x="102" y="302" class="cardText">인덱스, 마이그레이션 생성의 출발점이 된다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. QUERY SURFACE</text>
  <text x="490" y="252" class="cardTitle">지금 어떤 조회 API를 써야 하는가?</text>
  <text x="490" y="280" class="cardText">정교한 SQL은 `db.select()`, 중첩 결과는</text>
  <text x="490" y="302" class="cardText">`db.query`, escape hatch는 `sql``로 해결한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. DEPLOY PATH</text>
  <text x="878" y="252" class="cardTitle">빠른 반영과 배포 이력을 어떻게 나누는가?</text>
  <text x="878" y="280" class="cardText">로컬 반복은 `push`, 팀 배포는 `generate + migrate`</text>
  <text x="878" y="302" class="cardText">흐름으로 분리해야 변경 이력이 남는다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">SINGLE SOURCE FLOW</text>

  <rect x="470" y="446" width="340" height="132" rx="24" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="574" y="494" class="nodeTitle">schema.ts</text>
  <text x="536" y="522" class="nodeText">pgTable, references, index, enum</text>
  <text x="546" y="546" class="nodeText">Drizzle 프로젝트의 중심 정의</text>

  <rect x="108" y="472" width="232" height="112" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="160" y="516" class="nodeTitle">타입 추론</text>
  <text x="142" y="544" class="nodeText">$inferSelect / $inferInsert</text>

  <rect x="936" y="472" width="232" height="112" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="986" y="516" class="nodeTitle">drizzle-kit</text>
  <text x="968" y="544" class="nodeText">push / generate / migrate</text>

  <rect x="248" y="632" width="232" height="80" rx="22" fill="#F4F7FB" stroke="#D1DEEA"/>
  <text x="300" y="666" class="nodeTitle">db.select()</text>
  <text x="280" y="690" class="nodeText">SQL shape 직접 제어</text>

  <rect x="524" y="632" width="232" height="80" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="590" y="666" class="nodeTitle">db.query</text>
  <text x="566" y="690" class="nodeText">relations 기반 중첩 조회</text>

  <rect x="800" y="632" width="232" height="80" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="874" y="666" class="nodeTitle">sql``</text>
  <text x="842" y="690" class="nodeText">DB 기능 직접 호출</text>

  <line x1="470" y1="512" x2="340" y2="528" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="512" x2="936" y2="528" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="566" y1="578" x2="364" y2="632" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="578" x2="640" y2="632" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="714" y1="578" x2="916" y2="632" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="722" class="footnote">핵심: Drizzle는 스키마 정의 하나에서 타입과 SQL, 마이그레이션 흐름이 파생된다. 이 축이 잡히면 API 선택도 단순해진다.</text>
</svg>
