<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">GITHUB ACTIONS MENTAL MODEL</text>
  <text x="72" y="112" class="title">이벤트가 워크플로를 깨우고, 워크플로가 job graph를 만든다</text>
  <text x="72" y="142" class="subtitle">GitHub Actions는 단순 스크립트 실행기가 아니라, 이벤트 조건과 job dependency를 기반으로 러너 위에서 파이프라인을 조립하는 시스템이다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. EVENT</text>
  <text x="102" y="252" class="cardTitle">무엇이 실행을 시작하는가?</text>
  <text x="102" y="280" class="cardText">push, pull_request, schedule,</text>
  <text x="102" y="302" class="cardText">workflow_dispatch가 시작점이다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. JOB GRAPH</text>
  <text x="490" y="252" class="cardTitle">어떤 잡이 병렬/순차로 도는가?</text>
  <text x="490" y="280" class="cardText">`needs`가 없으면 병렬, 있으면</text>
  <text x="490" y="302" class="cardText">의존 순서가 생긴다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. RUNNER STATE</text>
  <text x="878" y="252" class="cardTitle">무엇이 공유되고 무엇이 안 되는가?</text>
  <text x="878" y="280" class="cardText">시크릿은 주입되고, 잡 파일 시스템은</text>
  <text x="878" y="302" class="cardText">분리되며, artifact로만 전달한다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">WORKFLOW VIEW</text>

  <rect x="92" y="506" width="174" height="120" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="136" y="550" class="nodeTitle">Event</text>
  <text x="118" y="578" class="nodeText">push / PR / schedule</text>

  <rect x="322" y="486" width="224" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="360" y="530" class="nodeTitle">Workflow YAML</text>
  <text x="352" y="558" class="nodeText">`.github/workflows/ci.yml`</text>
  <text x="366" y="582" class="nodeText">on, jobs, permissions</text>

  <rect x="612" y="486" width="220" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="672" y="530" class="nodeTitle">Jobs</text>
  <text x="650" y="558" class="nodeText">lint, test, deploy</text>
  <text x="648" y="582" class="nodeText">needs와 matrix로 분기</text>

  <rect x="896" y="486" width="238" height="160" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="930" y="530" class="nodeTitle">Runner + Steps</text>
  <text x="930" y="558" class="nodeText">checkout, setup, build, deploy</text>
  <text x="938" y="582" class="nodeText">action 또는 shell 실행</text>

  <line x1="266" y1="566" x2="322" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="546" y1="566" x2="612" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="832" y1="566" x2="896" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="904" y="448" width="152" height="28" rx="14" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="930" y="467" class="chip">잡 디스크는 공유되지 않음</text>

  <text x="84" y="704" class="footnote">읽는 법: 이벤트가 워크플로를 깨우고, 워크플로가 잡 그래프를 만든 뒤, 각 잡이 별도 러너에서 스텝을 순서대로 실행한다.</text>
</svg>
