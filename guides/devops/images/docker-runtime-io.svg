<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .note { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">RUNTIME BOUNDARY</text>
  <text x="72" y="112" class="title">포트, 볼륨, 환경변수는 컨테이너의 경계를 만든다</text>
  <text x="72" y="142" class="subtitle">컨테이너 내부 상태는 일시적이다. 외부 접근과 영속 데이터는 명시적으로 연결해야 한다.</text>

  <rect x="56" y="188" width="1168" height="496" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="228" class="section">HOST TO CONTAINER</text>

  <rect x="90" y="286" width="252" height="316" rx="26" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="178" y="330" class="nodeTitle">호스트</text>
  <rect x="120" y="360" width="192" height="70" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="154" y="390" class="chip">브라우저 / curl</text>
  <text x="152" y="414" class="nodeText">`localhost:8080` 호출</text>
  <rect x="120" y="456" width="192" height="70" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="154" y="486" class="chip">bind mount</text>
  <text x="144" y="510" class="nodeText">`./src`, `./config` 같은 파일</text>
  <rect x="120" y="552" width="192" height="70" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="150" y="582" class="chip">환경변수 파일</text>
  <text x="150" y="606" class="nodeText">`.env`, `--env-file`</text>

  <rect x="432" y="254" width="430" height="380" rx="28" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="568" y="298" class="nodeTitle">컨테이너</text>

  <rect x="474" y="342" width="346" height="110" rx="20" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="556" y="388" class="nodeTitle">애플리케이션</text>
  <text x="526" y="416" class="nodeText">컨테이너 내부에서 `0.0.0.0:3000`으로 리슨</text>

  <rect x="474" y="484" width="346" height="108" rx="20" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="520" y="528" class="nodeTitle">쓰기 가능한 레이어</text>
  <text x="528" y="556" class="nodeText">로그, 임시 파일, 런타임 변경사항</text>

  <rect x="940" y="286" width="246" height="136" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="992" y="332" class="nodeTitle">named volume</text>
  <text x="984" y="360" class="nodeText">DB 데이터, 업로드 파일처럼</text>
  <text x="988" y="384" class="nodeText">재시작 후에도 남겨야 하는 상태</text>

  <rect x="940" y="472" width="246" height="136" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="1010" y="518" class="nodeTitle">Docker network</text>
  <text x="986" y="546" class="nodeText">다른 컨테이너와 이름 기반으로</text>
  <text x="1002" y="570" class="nodeText">통신할 수 있는 내부 네트워크</text>

  <line x1="312" y1="394" x2="474" y2="394" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="312" y1="490" x2="474" y2="490" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="312" y1="586" x2="474" y2="586" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="820" y1="538" x2="940" y2="352" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="862" y1="394" x2="940" y2="540" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="444" y="662" width="420" height="42" rx="21" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="486" y="689" class="chip">`-p`는 외부 접근, `-v`는 데이터, `-e`는 설정을 연결한다</text>

  <text x="84" y="720" class="note">핵심: 컨테이너 자체는 일회성으로 보고, 보존할 상태는 volume에 두고, 외부에서 볼 인터페이스만 port publish로 노출한다.</text>
</svg>
