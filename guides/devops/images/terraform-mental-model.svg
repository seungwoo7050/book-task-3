<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">TERRAFORM MENTAL MODEL</text>
  <text x="72" y="112" class="title">Terraform은 원하는 상태와 현재 상태의 차이를 계산한다</text>
  <text x="72" y="142" class="subtitle">핵심은 리소스를 만드는 스크립트가 아니라, state를 기준으로 안전하게 diff를 계산하고 반영하는 루프다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. DESIRED STATE</text>
  <text x="102" y="252" class="cardTitle">무엇이 존재해야 하는가?</text>
  <text x="102" y="280" class="cardText">`.tf` 파일은 리소스, 속성, 관계를 선언한다.</text>
  <text x="102" y="302" class="cardText">순서보다 최종 상태가 중요하다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. DIFF</text>
  <text x="490" y="252" class="cardTitle">무엇이 바뀌는가?</text>
  <text x="490" y="280" class="cardText">`plan`은 코드, state, provider 응답을 합쳐</text>
  <text x="490" y="302" class="cardText">create, update, delete를 계산한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. SAFETY</text>
  <text x="878" y="252" class="cardTitle">누가 apply를 통제하는가?</text>
  <text x="878" y="280" class="cardText">원격 state, 잠금, 리뷰 절차가 있어야</text>
  <text x="878" y="302" class="cardText">팀 작업에서 충돌을 막을 수 있다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">PLAN TO APPLY</text>

  <line x1="158" y1="548" x2="1036" y2="548" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="476" width="180" height="144" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="130" y="522" class="nodeTitle">`.tf` 코드</text>
  <text x="118" y="550" class="nodeText">resource, module, variable,</text>
  <text x="126" y="574" class="nodeText">output이 원하는 상태를 선언</text>

  <rect x="326" y="456" width="188" height="184" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="390" y="502" class="nodeTitle">plan</text>
  <text x="364" y="530" class="nodeText">state와 provider 조회 결과를</text>
  <text x="364" y="554" class="nodeText">비교해 diff를 계산한다</text>
  <rect x="378" y="588" width="84" height="30" rx="15" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="400" y="608" class="chip">review</text>

  <rect x="574" y="456" width="180" height="184" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="626" y="502" class="nodeTitle">apply</text>
  <text x="604" y="530" class="nodeText">승인된 diff만 실제 API에</text>
  <text x="620" y="554" class="nodeText">반영한다</text>
  <rect x="622" y="588" width="84" height="30" rx="15" fill="#FFF9EE" stroke="#E9D29D"/>
  <text x="643" y="608" class="chip">change</text>

  <rect x="812" y="456" width="180" height="184" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="852" y="502" class="nodeTitle">클라우드 리소스</text>
  <text x="852" y="530" class="nodeText">VPC, EC2, RDS, S3 등</text>
  <text x="858" y="554" class="nodeText">실제 인프라</text>

  <rect x="1050" y="470" width="142" height="156" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="1088" y="514" class="nodeTitle">state</text>
  <text x="1078" y="542" class="nodeText">현재 관리 중인</text>
  <text x="1080" y="566" class="nodeText">리소스 스냅샷</text>

  <line x1="1122" y1="470" x2="1122" y2="420" stroke="#5E7895" stroke-width="4"/>
  <line x1="1122" y1="420" x2="420" y2="420" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="878" y="404" class="chip">다음 plan의 기준</text>

  <text x="84" y="704" class="footnote">읽는 법: 코드는 원하는 상태를 적고, plan은 차이를 계산하고, apply는 승인된 diff만 반영하며, state는 다음 diff의 기준이 된다.</text>
</svg>
