<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .cardTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .node { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">GITHUB ACTIONS CACHE AND ARTIFACT</text>
  <text x="72" y="112" class="title">캐시는 다음 실행을, 아티팩트는 현재 실행의 다음 잡을 돕는다</text>
  <text x="72" y="142" class="subtitle">두 기능 모두 파일을 저장하지만 스코프가 다르다. 이 차이를 구분하면 job 간 상태 전달 설계가 쉬워진다.</text>

  <rect x="56" y="192" width="560" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">CACHE</text>
  <text x="84" y="268" class="cardTitle">의존성 재사용</text>
  <text x="84" y="296" class="cardText">같은 저장소의 다음 실행에서 restore key로 다시 꺼내 쓴다.</text>
  <rect x="98" y="392" width="122" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="130" y="436" class="node">Run #1</text>
  <rect x="278" y="392" width="150" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="310" y="436" class="node">save cache</text>
  <rect x="456" y="392" width="122" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="488" y="436" class="node">Run #2</text>
  <line x1="220" y1="428" x2="278" y2="428" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="428" y1="428" x2="456" y2="428" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="84" y="596" class="cardText">예: Gradle cache, npm cache, uv cache</text>
  <text x="84" y="620" class="cardText">목적: 설치 시간 절감</text>

  <rect x="664" y="192" width="560" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="692" y="232" class="section">ARTIFACT</text>
  <text x="692" y="268" class="cardTitle">잡 간 결과물 전달</text>
  <text x="692" y="296" class="cardText">이번 실행에서 만든 파일을 upload/download로 넘긴다.</text>
  <rect x="706" y="392" width="122" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="736" y="436" class="node">build job</text>
  <rect x="886" y="392" width="150" height="72" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="918" y="436" class="node">upload JAR</text>
  <rect x="1064" y="392" width="122" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="1094" y="436" class="node">deploy job</text>
  <line x1="828" y1="428" x2="886" y2="428" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1036" y1="428" x2="1064" y2="428" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="692" y="596" class="cardText">예: test report, coverage, JAR, binary</text>
  <text x="692" y="620" class="cardText">목적: 디버깅과 배포 인수인계</text>

  <text x="72" y="776" class="footnote">읽는 법: 캐시는 미래 실행 속도 최적화, 아티팩트는 현재 워크플로 안의 결과물 전달이다. 잡 디스크가 공유되지 않는다는 점 때문에 둘의 역할이 갈린다.</text>
</svg>
