<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">CSS MENTAL MODEL</text>
  <text x="72" y="112" class="title">CSS를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">어떤 규칙이 이기고, 그 값이 어떤 박스를 만들며, 어떤 조건에서 다시 계산되는지 먼저 보면 CSS가 훨씬 단순해진다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. CASCADE</text>
  <text x="102" y="252" class="cardTitle">어떤 선언이 최종 승자인가?</text>
  <text x="102" y="280" class="cardText">selector, specificity, source order, inheritance를</text>
  <text x="102" y="302" class="cardText">보고 먼저 winning rule을 찾는다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. BOX</text>
  <text x="490" y="252" class="cardTitle">이 값은 박스 어디를 바꾸는가?</text>
  <text x="490" y="280" class="cardText">content, padding, border, margin, gap 중</text>
  <text x="490" y="302" class="cardText">어느 층에 적용되는지 구분한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. CONTEXT</text>
  <text x="878" y="252" class="cardTitle">언제 값이 다시 계산되는가?</text>
  <text x="878" y="280" class="cardText">hover, media query, container query, user preference가</text>
  <text x="878" y="302" class="cardText">같은 요소를 다른 상태로 만든다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">BROWSER PIPELINE</text>

  <line x1="150" y1="560" x2="1088" y2="560" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="486" width="170" height="140" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="120" y="532" class="nodeTitle">선택자 매칭</text>
  <text x="120" y="560" class="nodeText">어떤 rule 후보가</text>
  <text x="120" y="582" class="nodeText">이 요소에 걸리는지 수집</text>

  <rect x="304" y="486" width="170" height="140" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="338" y="532" class="nodeTitle">cascade</text>
  <text x="338" y="560" class="nodeText">특이도, 순서, 상속으로</text>
  <text x="344" y="582" class="nodeText">최종 선언 결정</text>

  <rect x="520" y="486" width="170" height="140" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="548" y="532" class="nodeTitle">computed value</text>
  <text x="548" y="560" class="nodeText">`var()`, `rem`, `clamp()`를</text>
  <text x="558" y="582" class="nodeText">실제 값으로 해석</text>

  <rect x="736" y="486" width="170" height="140" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="776" y="532" class="nodeTitle">layout box</text>
  <text x="758" y="560" class="nodeText">박스 크기와 Flex/Grid</text>
  <text x="766" y="582" class="nodeText">배치 계산</text>

  <rect x="952" y="486" width="170" height="140" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="988" y="532" class="nodeTitle">paint</text>
  <text x="978" y="560" class="nodeText">배경, 보더, 텍스트,</text>
  <text x="976" y="582" class="nodeText">transform과 합성</text>

  <rect x="362" y="650" width="556" height="58" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="392" y="687" class="chip">CSS 디버깅은 이 단계 중 어디서 문제가 생겼는지 먼저 분류하면 훨씬 빨라진다.</text>

  <text x="84" y="724" class="footnote">읽는 법: 승자 규칙을 찾고, 그 값이 만드는 박스와 배치를 확인한 뒤, 어떤 상태 전환이 그 값을 다시 덮어쓰는지 본다.</text>
</svg>
