<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">FORM FLOW</text>
  <text x="72" y="112" class="title">폼 한 줄이 제출되기까지의 관계</text>
  <text x="72" y="142" class="subtitle">레이블, 입력, 힌트, 검증, 버튼이 끊기면 입력은 보여도 사용할 수 없는 UI가 된다.</text>

  <rect x="56" y="206" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="246" class="section">FIELD LIFECYCLE</text>

  <rect x="92" y="314" width="212" height="150" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="128" y="358" class="nodeTitle">1. 레이블</text>
  <text x="128" y="386" class="nodeText">`label for="email"`</text>
  <text x="128" y="410" class="nodeText">`name="email"`</text>
  <text x="128" y="434" class="nodeText">필드의 의미와 제출 키를 고정</text>

  <rect x="364" y="286" width="268" height="206" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="402" y="330" class="nodeTitle">2. 입력 컨트롤</text>
  <text x="402" y="358" class="nodeText">`type="email"`</text>
  <text x="402" y="382" class="nodeText">`required`, `minlength`</text>
  <text x="402" y="406" class="nodeText">`autocomplete="email"`</text>
  <rect x="402" y="434" width="192" height="34" rx="12" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="430" y="457" class="chip">브라우저 기본 입력 경험</text>

  <rect x="692" y="286" width="248" height="206" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="726" y="330" class="nodeTitle">3. 힌트와 오류 연결</text>
  <text x="726" y="358" class="nodeText">`aria-describedby`</text>
  <text x="726" y="382" class="nodeText">`id="pw-hint"` / `email-error`</text>
  <text x="726" y="406" class="nodeText">필드 설명과 오류를 다시 묶음</text>
  <rect x="726" y="434" width="164" height="34" rx="12" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="756" y="457" class="chip">`role="alert"` 가능</text>

  <rect x="1000" y="320" width="180" height="138" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1038" y="364" class="nodeTitle">4. 검증 통과?</text>
  <text x="1032" y="392" class="nodeText">브라우저 기본 검증과</text>
  <text x="1032" y="416" class="nodeText">앱 규칙을 함께 확인</text>

  <line x1="304" y1="389" x2="364" y2="389" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="632" y1="389" x2="692" y2="389" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="940" y1="389" x2="1000" y2="389" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="760" y="548" width="232" height="116" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="808" y="592" class="nodeTitle">실패</text>
  <text x="790" y="620" class="nodeText">기본 에러 메시지를 보여 주고</text>
  <text x="800" y="644" class="nodeText">포커스를 유지한 채 수정 유도</text>

  <rect x="1032" y="548" width="160" height="116" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="1074" y="592" class="nodeTitle">제출</text>
  <text x="1056" y="620" class="nodeText">`button type="submit"`</text>
  <text x="1052" y="644" class="nodeText">`name=value` 전송</text>

  <line x1="1054" y1="458" x2="906" y2="548" stroke="#D5786F" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1118" y1="458" x2="1112" y2="548" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="548" width="568" height="116" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="126" y="592" class="nodeTitle">그룹 입력일 때</text>
  <text x="126" y="620" class="nodeText">체크박스·라디오는 `fieldset` + `legend`로 질문을 묶고,</text>
  <text x="126" y="644" class="nodeText">시각적 힌트만 두지 말고 실제 텍스트 설명을 같이 둔다.</text>

  <text x="84" y="744" class="footnote">읽는 법: label로 이름을 정하고, 입력 타입으로 기본 동작을 얻고, 힌트와 오류를 다시 연결한 뒤, 마지막에 submit으로 보낸다.</text>
</svg>
