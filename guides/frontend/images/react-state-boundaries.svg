<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">STATE BOUNDARIES</text>
  <text x="72" y="112" class="title">React 상태 소유권과 도구 선택 기준</text>
  <text x="72" y="142" class="subtitle">같은 state라도 범위와 출처가 다르면 도구가 달라진다. 먼저 누가 소유해야 하는지부터 정한다.</text>

  <rect x="56" y="208" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">OWNERSHIP SPECTRUM</text>

  <rect x="84" y="300" width="248" height="300" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="116" y="346" class="nodeTitle">로컬 UI 상태</text>
  <text x="116" y="374" class="nodeText">한 컴포넌트 안에서만 쓰이는 값</text>
  <text x="116" y="404" class="chip">예: input 값, modal open, hover</text>
  <rect x="116" y="448" width="188" height="96" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="144" y="500" class="chip">기본 도구</text>
  <text x="144" y="526" class="nodeText">`useState`, 간단하면 이것부터</text>

  <rect x="360" y="300" width="248" height="300" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="392" y="346" class="nodeTitle">공유 UI 상태</text>
  <text x="392" y="374" class="nodeText">여러 하위 컴포넌트가 같이 읽는 값</text>
  <text x="392" y="404" class="chip">예: theme, current user, tab state</text>
  <rect x="392" y="448" width="188" height="96" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="420" y="500" class="chip">기본 도구</text>
  <text x="420" y="526" class="nodeText">끌어올리기, 필요하면 Context</text>

  <rect x="636" y="300" width="248" height="300" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="668" y="346" class="nodeTitle">앱 전역 클라이언트 상태</text>
  <text x="668" y="374" class="nodeText">서버와 별개로 오래 남는 로컬 규칙</text>
  <text x="668" y="404" class="chip">예: filter 조합, draft, websocket UI</text>
  <rect x="668" y="448" width="188" height="96" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="696" y="500" class="chip">후보 도구</text>
  <text x="696" y="526" class="nodeText">Zustand, Jotai, Redux Toolkit</text>

  <rect x="912" y="300" width="248" height="300" rx="24" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="944" y="346" class="nodeTitle">서버 상태</text>
  <text x="944" y="374" class="nodeText">API에서 오고 stale/fresh 개념이 있는 값</text>
  <text x="944" y="404" class="chip">예: 목록, 상세, 페이지네이션 결과</text>
  <rect x="944" y="448" width="188" height="96" rx="18" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="972" y="500" class="chip">기본 도구</text>
  <text x="972" y="526" class="nodeText">React Query 같은 서버 캐시</text>

  <rect x="292" y="628" width="696" height="52" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="322" y="662" class="chip">서버에서 온 데이터를 Context나 store에 그대로 복제하기보다, 가능하면 서버 캐시 계층에 그대로 두는 편이 안전하다.</text>

  <text x="84" y="744" class="footnote">읽는 법: 값의 출처가 브라우저 로컬인지 서버인지, 몇 개의 컴포넌트가 공유하는지, 얼마나 자주 바뀌는지에 따라 도구를 좁혀 간다.</text>
</svg>
