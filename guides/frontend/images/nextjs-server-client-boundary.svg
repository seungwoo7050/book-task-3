<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SERVER / CLIENT BOUNDARY</text>
  <text x="72" y="112" class="title">서버 컴포넌트와 클라이언트 컴포넌트 경계</text>
  <text x="72" y="142" class="subtitle">기본은 서버 컴포넌트다. 브라우저 API와 인터랙션이 필요한 부분만 작은 클라이언트 섬으로 분리한다.</text>

  <rect x="56" y="208" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">BOUNDARY DESIGN</text>

  <rect x="92" y="304" width="458" height="296" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="126" y="350" class="nodeTitle">서버 컴포넌트 영역</text>
  <text x="126" y="378" class="nodeText">DB 접근, async fetch, secret 사용, 큰 데이터 조합</text>
  <rect x="126" y="418" width="154" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="156" y="446" class="chip">`app/page.tsx`</text>
  <rect x="126" y="476" width="184" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="152" y="504" class="chip">`DataTable` 서버 렌더</text>
  <rect x="126" y="534" width="148" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="156" y="562" class="chip">`fetch()` / DB</text>

  <rect x="590" y="366" width="116" height="176" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="618" y="430" class="nodeTitle">경계</text>
  <text x="610" y="458" class="nodeText">직렬화 가능한</text>
  <text x="620" y="482" class="nodeText">props만 통과</text>

  <rect x="746" y="304" width="386" height="296" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="780" y="350" class="nodeTitle">클라이언트 컴포넌트 섬</text>
  <text x="780" y="378" class="nodeText">state, effect, 브라우저 API, 이벤트 핸들러</text>
  <rect x="780" y="418" width="164" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="808" y="446" class="chip">`"use client"`</text>
  <rect x="780" y="476" width="178" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="806" y="504" class="chip">SearchBar / Counter</text>
  <rect x="780" y="534" width="224" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="806" y="562" class="chip">`useState`, `useEffect`, `window`</text>

  <line x1="550" y1="452" x2="590" y2="452" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="706" y1="452" x2="746" y2="452" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="326" y="628" width="628" height="52" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="356" y="662" class="chip">경계를 크게 잡을수록 번들 크기와 hydration 비용이 늘어난다. 가능한 한 인터랙션이 필요한 leaf만 클라이언트로 둔다.</text>

  <text x="84" y="744" class="footnote">읽는 법: 서버는 데이터와 비밀을 다루고, 경계를 넘어서는 것은 직렬화 가능한 props뿐이며, 브라우저 전용 로직은 오른쪽 클라이언트 섬에서만 실행된다고 생각한다.</text>
</svg>
