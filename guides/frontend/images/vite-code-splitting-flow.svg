<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">CODE SPLITTING</text>
  <text x="72" y="112" class="title">동적 import와 manualChunks가 dist를 만드는 흐름</text>
  <text x="72" y="142" class="subtitle">코드 스플리팅의 목표는 초기 경로에 필요한 것과 나중에 불러도 되는 것을 나누는 것이다.</text>

  <rect x="56" y="208" width="1168" height="500" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="248" class="section">CHUNK GRAPH</text>

  <rect x="92" y="340" width="260" height="240" rx="24" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="124" y="386" class="nodeTitle">앱 코드</text>
  <text x="124" y="414" class="chip">entry: main.tsx</text>
  <text x="124" y="444" class="chip">lazy: Dashboard, Settings</text>
  <text x="124" y="474" class="chip">heavy lib: chart, editor</text>
  <text x="124" y="504" class="chip">manualChunks: vendor, ui</text>

  <rect x="430" y="308" width="380" height="304" rx="24" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="462" y="354" class="nodeTitle">Rollup chunk graph</text>
  <rect x="462" y="394" width="132" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="494" y="422" class="chip">entry</text>
  <rect x="612" y="394" width="132" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="638" y="422" class="chip">vendor</text>
  <rect x="462" y="470" width="132" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="486" y="498" class="chip">dashboard</text>
  <rect x="612" y="470" width="132" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="644" y="498" class="chip">settings</text>
  <rect x="536" y="546" width="132" height="44" rx="14" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="578" y="574" class="chip">ui</text>

  <rect x="888" y="340" width="260" height="240" rx="24" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="920" y="386" class="nodeTitle">dist/assets</text>
  <text x="920" y="414" class="chip">entry.hash.js</text>
  <text x="920" y="444" class="chip">vendor.hash.js</text>
  <text x="920" y="474" class="chip">dashboard.hash.js</text>
  <text x="920" y="504" class="chip">settings.hash.js</text>
  <text x="920" y="534" class="chip">logo.hash.png</text>

  <line x1="352" y1="460" x2="430" y2="460" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="460" x2="888" y2="460" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="288" y="634" width="704" height="52" rx="18" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="318" y="668" class="chip">핵심은 첫 화면에 필요한 entry/vendor만 먼저 받고, 나머지 청크는 라우트 진입이나 상호작용 시점에 늦게 받도록 만드는 것이다.</text>

  <text x="84" y="744" class="footnote">읽는 법: 어떤 모듈이 entry에 남고, 어떤 의존성이 lazy chunk로 빠지는지, manualChunks가 그 구조를 어떻게 바꾸는지 순서대로 본다.</text>
</svg>
