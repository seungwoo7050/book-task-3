<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">REACT NATIVE MENTAL MODEL</text>
  <text x="72" y="112" class="title">React Native를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">JS 코드, 네이티브 플랫폼, 빌드 경로를 함께 봐야 RN 문서와 에러 메시지가 제대로 읽힌다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. RUNTIME</text>
  <text x="102" y="252" class="cardTitle">JS 코드는 어디서 실행되는가?</text>
  <text x="102" y="280" class="cardText">React 트리와 비즈니스 로직은 JS 런타임에서 돌고,</text>
  <text x="102" y="302" class="cardText">최종 화면은 네이티브 뷰로 그려진다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. PLATFORM</text>
  <text x="490" y="252" class="cardTitle">어디서 iOS/Android 차이가 나는가?</text>
  <text x="490" y="280" class="cardText">navigation, storage, permissions, animations는</text>
  <text x="490" y="302" class="cardText">웹보다 훨씬 네이티브 제약을 강하게 받는다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. DELIVERY</text>
  <text x="878" y="252" class="cardTitle">변경이 바로 OTA 가능한가?</text>
  <text x="878" y="280" class="cardText">JS만 바뀌면 업데이트로 끝날 수 있지만,</text>
  <text x="878" y="302" class="cardText">네이티브 설정 변경은 새 빌드가 필요하다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">RUNTIME WALKTHROUGH</text>

  <line x1="146" y1="560" x2="1086" y2="560" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="486" width="170" height="148" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="122" y="532" class="nodeTitle">TS / JS 소스</text>
  <text x="122" y="560" class="nodeText">React 컴포넌트, 훅, 로직</text>
  <text x="122" y="582" class="nodeText">개발자는 여기서 작업</text>

  <rect x="294" y="486" width="176" height="148" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="336" y="532" class="nodeTitle">Metro 번들</text>
  <text x="324" y="560" class="nodeText">개발 서버, HMR, JS 번들 생성</text>
  <text x="330" y="582" class="nodeText">dev 환경의 입구</text>

  <rect x="506" y="486" width="190" height="148" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="542" y="532" class="nodeTitle">JS 런타임</text>
  <text x="542" y="560" class="nodeText">React 렌더, 상태 관리,</text>
  <text x="542" y="582" class="nodeText">비즈니스 로직 실행</text>

  <rect x="732" y="486" width="178" height="148" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="764" y="532" class="nodeTitle">RN renderer</text>
  <text x="766" y="560" class="nodeText">View, Text, Image를</text>
  <text x="756" y="582" class="nodeText">네이티브 뷰로 매핑</text>

  <rect x="946" y="462" width="182" height="172" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="980" y="508" class="nodeTitle">iOS / Android</text>
  <text x="980" y="536" class="nodeText">네이티브 화면, 저장소,</text>
  <text x="980" y="560" class="nodeText">권한, 센서, 앱 생명주기</text>
  <rect x="980" y="584" width="112" height="30" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="1008" y="604" class="chip">실제 제약이 여기 있음</text>

  <text x="84" y="724" class="footnote">읽는 법: JS 코드가 Metro를 거쳐 런타임에서 실행되고, 최종 결과는 네이티브 플랫폼 제약 위에 그려진다고 생각하면 RN 특유의 문제를 빠르게 분류할 수 있다.</text>
</svg>
