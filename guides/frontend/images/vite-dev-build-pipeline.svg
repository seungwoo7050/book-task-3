<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">VITE MENTAL MODEL</text>
  <text x="72" y="112" class="title">Vite dev와 build는 다른 파이프라인이다</text>
  <text x="72" y="142" class="subtitle">개발 서버는 온디맨드 ESM 변환, 프로덕션은 Rollup 번들링으로 움직인다. 같은 설정도 적용 위치가 다를 수 있다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. DEV SERVER</text>
  <text x="102" y="252" class="cardTitle">브라우저 요청에 즉석 응답</text>
  <text x="102" y="280" class="cardText">브라우저가 import한 모듈만 변환해서 보내므로</text>
  <text x="102" y="302" class="cardText">시작과 HMR이 빠르다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. MODULE GRAPH</text>
  <text x="490" y="252" class="cardTitle">같은 소스라도 두 번 읽힌다</text>
  <text x="490" y="280" class="cardText">dev에서는 개별 모듈 그래프로,</text>
  <text x="490" y="302" class="cardText">build에서는 전체 의존성 그래프로 처리한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. BUILD OUTPUT</text>
  <text x="878" y="252" class="cardTitle">dist는 최적화 산출물</text>
  <text x="878" y="280" class="cardText">Rollup이 청크, 해시 파일명,</text>
  <text x="878" y="302" class="cardText">트리 쉐이킹 결과를 만든다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">TWO PATHS</text>

  <rect x="96" y="452" width="170" height="154" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="128" y="500" class="nodeTitle">소스 코드</text>
  <text x="128" y="528" class="nodeText">index.html, src/, assets,</text>
  <text x="128" y="550" class="nodeText">vite.config.ts</text>

  <rect x="352" y="426" width="332" height="178" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="386" y="470" class="nodeTitle">vite dev</text>
  <text x="386" y="498" class="nodeText">브라우저가 import한 모듈을 그때그때 변환</text>
  <text x="386" y="522" class="nodeText">HMR은 바뀐 모듈만 다시 전달</text>
  <rect x="386" y="548" width="190" height="30" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="414" y="568" class="chip">ESM 요청 기반</text>

  <rect x="734" y="426" width="392" height="178" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="768" y="470" class="nodeTitle">vite build</text>
  <text x="768" y="498" class="nodeText">Rollup이 전체 그래프를 읽고</text>
  <text x="768" y="522" class="nodeText">vendor / lazy chunk / asset 파일 생성</text>
  <rect x="768" y="548" width="216" height="30" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="796" y="568" class="chip">dist/ + hashed assets</text>

  <line x1="266" y1="520" x2="352" y2="500" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="266" y1="538" x2="734" y2="538" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="724" class="footnote">읽는 법: dev는 요청 기반 변환, build는 전체 그래프 번들링이라는 차이를 먼저 분리하면 환경별 오류 원인을 훨씬 빨리 좁힐 수 있다.</text>
</svg>
