<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">ROUTE SEGMENT STACK</text>
  <text x="72" y="112" class="title">한 URL이 layout과 page로 조립되는 방식</text>
  <text x="72" y="142" class="subtitle">예를 들어 `/dashboard/settings`는 매칭된 segment의 layout을 바깥에서 안쪽으로 쌓고, 마지막에 page를 렌더링한다.</text>

  <rect x="72" y="184" width="240" height="48" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="112" y="214" class="chip">예시 URL: /dashboard/settings</text>
  <rect x="332" y="184" width="254" height="48" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="360" y="214" class="chip">route group은 URL에 나타나지 않음</text>

  <rect x="56" y="272" width="700" height="470" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="312" class="section">SEGMENT COMPOSITION</text>

  <rect x="120" y="344" width="572" height="96" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="156" y="388" class="nodeTitle">app/layout.tsx</text>
  <text x="156" y="416" class="nodeText">모든 라우트의 공통 바깥 껍데기. `html`과 `body`는 여기만 둔다.</text>

  <rect x="160" y="466" width="492" height="120" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="196" y="512" class="nodeTitle">app/dashboard/layout.tsx</text>
  <text x="196" y="540" class="nodeText">dashboard 하위 라우트만 감싸는 공유 레이아웃.</text>
  <text x="196" y="564" class="nodeText">사이드바 상태와 스크롤 위치를 유지하는 위치다.</text>

  <rect x="200" y="612" width="412" height="92" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="236" y="656" class="nodeTitle">app/dashboard/settings/page.tsx</text>
  <text x="236" y="684" class="nodeText">최종 콘텐츠를 그리는 페이지 파일</text>

  <rect x="804" y="272" width="420" height="470" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="832" y="312" class="section">SPECIAL FILES</text>

  <rect x="832" y="344" width="364" height="96" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="864" y="388" class="nodeTitle">loading.tsx</text>
  <text x="864" y="416" class="nodeText">해당 segment의 Suspense 경계 로딩 UI</text>

  <rect x="832" y="468" width="364" height="96" rx="22" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="864" y="512" class="nodeTitle">error.tsx</text>
  <text x="864" y="540" class="nodeText">해당 subtree에서 난 오류를 복구 가능한 경계로 받는다</text>

  <rect x="832" y="592" width="364" height="96" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="864" y="636" class="nodeTitle">not-found.tsx</text>
  <text x="864" y="664" class="nodeText">`notFound()` 호출이나 404 상황의 fallback</text>

  <text x="84" y="774" class="footnote">읽는 법: 라우트를 찾으면 그 경로의 layout이 바깥에서 안쪽으로 쌓이고, loading/error/not-found는 각 segment 경계에 붙는다고 생각하면 된다.</text>
</svg>
