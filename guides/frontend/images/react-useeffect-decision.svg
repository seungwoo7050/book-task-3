<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">USEEFFECT DECISION</text>
  <text x="72" y="112" class="title">이 로직에 useEffect가 정말 필요한가?</text>
  <text x="72" y="142" class="subtitle">대부분의 불필요한 effect는 렌더 계산이나 이벤트 핸들러에 있어야 할 로직이 effect로 들어오면서 생긴다.</text>

  <rect x="428" y="208" width="424" height="104" rx="24" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="470" y="266" class="nodeTitle">props와 state만으로 지금 바로 계산 가능한가?</text>

  <rect x="92" y="392" width="318" height="156" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="126" y="438" class="nodeTitle">예</text>
  <text x="126" y="466" class="nodeText">렌더 중 계산하거나, 비용이 크면</text>
  <text x="126" y="490" class="nodeText">`useMemo`로 캐시한다.</text>
  <rect x="126" y="510" width="162" height="34" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="154" y="533" class="chip">파생 상태를 만들지 않기</text>

  <rect x="470" y="392" width="340" height="156" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="502" y="438" class="nodeTitle">아니오. 사용자 이벤트가 직접 시작하는가?</text>
  <text x="502" y="466" class="nodeText">submit, click, drag, input처럼</text>
  <text x="502" y="490" class="nodeText">원인이 명확한 액션인지 본다.</text>

  <rect x="868" y="392" width="320" height="156" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="900" y="438" class="nodeTitle">예</text>
  <text x="900" y="466" class="nodeText">이벤트 핸들러 안에서 실행한다.</text>
  <text x="900" y="490" class="nodeText">POST, analytics, optimistic update도</text>
  <text x="900" y="514" class="nodeText">보통 여기서 시작한다.</text>

  <rect x="426" y="610" width="428" height="144" rx="24" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="458" y="654" class="nodeTitle">외부 시스템과 동기화하는가?</text>
  <text x="458" y="682" class="nodeText">fetch, timer, subscription, imperative DOM이면</text>
  <text x="458" y="706" class="nodeText">`useEffect`와 cleanup을 둔다.</text>
  <rect x="458" y="722" width="192" height="26" rx="12" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="486" y="740" class="chip">아니라면 모델링을 다시 본다</text>

  <line x1="540" y1="312" x2="286" y2="392" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="312" x2="640" y2="392" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="470" x2="868" y2="470" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="548" x2="640" y2="610" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="84" y="778" class="footnote">읽는 법: 먼저 렌더 계산 여부를 보고, 그다음 이벤트에서 해결할 수 있는지 확인한 뒤, 끝까지 남는 외부 시스템 동기화만 effect로 보낸다.</text>
</svg>
