<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">FASTAPI MENTAL MODEL</text>
  <text x="72" y="112" class="title">한 요청을 볼 때 먼저 물어야 할 3가지</text>
  <text x="72" y="142" class="subtitle">계약, 주입, 경계를 먼저 정하면 FastAPI 코드는 자연스럽게 `schemas`, `dependencies`, `services`로 정리된다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. CONTRACT</text>
  <text x="102" y="252" class="cardTitle">입력과 출력은 어떤 모델인가?</text>
  <text x="102" y="280" class="cardText">request body, path, query, response를</text>
  <text x="102" y="302" class="cardText">Pydantic 모델로 고정한다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. INJECTION</text>
  <text x="490" y="252" class="cardTitle">라우트가 직접 만들지 않을 것은?</text>
  <text x="490" y="280" class="cardText">DB 세션, 인증 사용자, 설정, 외부 클라이언트는</text>
  <text x="490" y="302" class="cardText">`Depends()`로 주입하고 테스트에서 override한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. BOUNDARY</text>
  <text x="878" y="252" class="cardTitle">HTTP 처리 외 로직은 어디로 갈까?</text>
  <text x="878" y="280" class="cardText">라우트는 얇게 두고, 정책과 데이터 변경은</text>
  <text x="878" y="302" class="cardText">서비스와 DB 레이어로 내려보낸다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">REQUEST WALKTHROUGH</text>

  <line x1="170" y1="566" x2="1110" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="506" width="146" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="116" y="550" class="nodeTitle">클라이언트</text>
  <text x="122" y="576" class="nodeTitle">요청</text>
  <text x="112" y="602" class="nodeText">body / path / query</text>

  <rect x="274" y="486" width="182" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="308" y="532" class="nodeTitle">입력 스키마</text>
  <text x="308" y="560" class="nodeText">Pydantic이 타입과 제약을 검증</text>
  <text x="308" y="584" class="nodeText">문서와 422 응답 형식도 여기서 결정</text>
  <rect x="318" y="608" width="94" height="30" rx="15" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="338" y="628" class="chip">실패 시 422</text>

  <rect x="510" y="418" width="228" height="116" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="548" y="464" class="nodeTitle">의존성 그래프</text>
  <text x="548" y="492" class="nodeText">`get_db()`, `get_current_user()`, settings</text>
  <text x="548" y="516" class="nodeText">테스트에서는 이 노드들을 override</text>

  <rect x="510" y="566" width="228" height="108" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="566" y="610" class="nodeTitle">라우트 함수</text>
  <text x="548" y="638" class="nodeText">HTTP 입력을 받고 서비스 호출만 담당</text>

  <rect x="792" y="566" width="160" height="108" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="826" y="610" class="nodeTitle">서비스</text>
  <text x="818" y="638" class="nodeText">비즈니스 로직</text>

  <rect x="986" y="566" width="168" height="108" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1032" y="610" class="nodeTitle">DB / ORM</text>
  <text x="1024" y="638" class="nodeText">영속성 처리</text>

  <rect x="986" y="438" width="168" height="96" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1022" y="476" class="nodeTitle">응답 스키마</text>
  <text x="1014" y="502" class="nodeText">`response_model`로</text>
  <text x="1028" y="522" class="nodeText">출력을 정제</text>

  <line x1="366" y1="486" x2="366" y2="440" stroke="#5E7895" stroke-width="3"/>
  <line x1="366" y1="440" x2="624" y2="440" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="624" y1="534" x2="624" y2="566" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1070" y1="566" x2="1070" y2="534" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="84" y="704" class="footnote">읽는 법: 어떤 스키마가 계약인지, 어떤 자원이 주입되는지, 무엇을 서비스로 분리할지를 먼저 정하면 FastAPI 설계가 흔들리지 않는다.</text>
</svg>
