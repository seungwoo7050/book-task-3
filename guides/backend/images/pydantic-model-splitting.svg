<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5C7894"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #586F86; }
    .boxTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .boxText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5D738A; }
    .tag { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #45627C; }
    .noteTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #16314B; }
    .noteText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60768D; }
  </style>

  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1142" cy="106" r="116" fill="#DDF4EA" fill-opacity="0.70"/>
  <circle cx="140" cy="748" r="148" fill="#DAEDFF" fill-opacity="0.60"/>

  <text x="72" y="70" class="eyebrow">MODEL SPLITTING</text>
  <text x="72" y="116" class="title">입력 모델과 출력 모델은 분리해서 관리한다</text>
  <text x="72" y="148" class="subtitle">공통 필드는 재사용하되, 요청과 응답의 책임을 하나의 클래스에 몰아넣지 않는다.</text>

  <rect x="432" y="206" width="416" height="180" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="472" y="252" class="boxTitle">UserBase</text>
  <text x="472" y="282" class="boxText">name, email 같은 공통 비즈니스 필드</text>
  <text x="472" y="306" class="boxText">여러 모델이 공유해도 되는 값만 둔다</text>
  <rect x="472" y="328" width="110" height="32" rx="16" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="500" y="349" class="tag">shared core</text>

  <line x1="640" y1="386" x2="320" y2="506" stroke="#5C7894" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="386" x2="640" y2="506" stroke="#5C7894" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="386" x2="960" y2="506" stroke="#5C7894" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="148" y="506" width="336" height="208" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="186" y="556" class="boxTitle">UserCreate</text>
  <text x="186" y="586" class="boxText">요청 본문 전용 모델</text>
  <text x="186" y="610" class="boxText">password, signup token 같은</text>
  <text x="186" y="632" class="boxText">입력용 민감 필드를 포함할 수 있다</text>
  <rect x="186" y="656" width="110" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="224" y="677" class="tag">request</text>

  <rect x="472" y="506" width="336" height="208" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="510" y="556" class="boxTitle">UserUpdate</text>
  <text x="510" y="586" class="boxText">부분 수정 전용 모델</text>
  <text x="510" y="610" class="boxText">optional 필드 중심으로 두고</text>
  <text x="510" y="632" class="boxText">PATCH 의미를 명확하게 만든다</text>
  <rect x="510" y="656" width="110" height="32" rx="16" fill="#FFF9EF" stroke="#E9D29D"/>
  <text x="548" y="677" class="tag">partial</text>

  <rect x="796" y="506" width="336" height="208" rx="28" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="834" y="556" class="boxTitle">UserResponse</text>
  <text x="834" y="586" class="boxText">응답 전용 모델</text>
  <text x="834" y="610" class="boxText">id, created_at, from_attributes</text>
  <text x="834" y="632" class="boxText">같은 읽기용 계약에 집중한다</text>
  <rect x="834" y="656" width="110" height="32" rx="16" fill="#F5F0FF" stroke="#D8CBF6"/>
  <text x="868" y="677" class="tag">response</text>

  <rect x="310" y="754" width="660" height="74" rx="24" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="348" y="798" class="noteTitle">핵심 규칙</text>
  <text x="494" y="798" class="noteText">입력 모델과 출력 모델을 합치면 password 노출, partial update 혼동, ORM 의존 누수가 동시에 생긴다.</text>
</svg>
