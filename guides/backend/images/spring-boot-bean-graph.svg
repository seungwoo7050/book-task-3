<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="780" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">SPRING BOOT BEAN GRAPH</text>
  <text x="72" y="112" class="title">빈은 Component Scan과 Configuration에서 만들어진다</text>
  <text x="72" y="142" class="subtitle">애플리케이션 코드는 스테레오타입과 `@Bean`으로 등록되고, 자동 구성 빈은 그 기반 인프라를 제공한다.</text>

  <rect x="56" y="192" width="1168" height="520" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">CONTAINER VIEW</text>

  <rect x="92" y="292" width="240" height="130" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="134" y="338" class="nodeTitle">@SpringBootApplication</text>
  <text x="122" y="366" class="nodeText">Component scan 시작점</text>
  <text x="124" y="390" class="nodeText">auto-configuration 활성화</text>

  <rect x="406" y="250" width="232" height="112" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="468" y="296" class="nodeTitle">@Service</text>
  <text x="456" y="324" class="nodeText">UserService</text>

  <rect x="406" y="392" width="232" height="112" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="436" y="438" class="nodeTitle">@Repository</text>
  <text x="466" y="466" class="nodeText">UserRepository</text>

  <rect x="706" y="250" width="232" height="112" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="740" y="296" class="nodeTitle">@Configuration</text>
  <text x="768" y="324" class="nodeText">SecurityConfig</text>

  <rect x="706" y="392" width="232" height="112" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="776" y="438" class="nodeTitle">@Bean</text>
  <text x="730" y="466" class="nodeText">PasswordEncoder, FilterChain</text>

  <rect x="1006" y="320" width="174" height="124" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1036" y="366" class="nodeTitle">Auto-configured</text>
  <text x="1042" y="394" class="nodeText">DataSource, JPA,</text>
  <text x="1048" y="418" class="nodeText">MVC infrastructure</text>

  <line x1="332" y1="336" x2="406" y2="306" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="332" y1="372" x2="406" y2="448" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="332" y1="350" x2="706" y2="306" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="822" y1="362" x2="822" y2="392" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="938" y1="448" x2="1006" y2="382" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="638" y1="306" x2="706" y2="306" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="638" y1="448" x2="706" y2="448" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="494" y="538" width="324" height="84" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="532" y="574" class="chip">생성자 주입</text>
  <text x="532" y="602" class="nodeText">UserController -> UserService -> UserRepository처럼</text>
  <text x="532" y="624" class="nodeText">필드가 아니라 생성자 시그니처로 의존성이 드러난다.</text>

  <text x="84" y="668" class="footnote">읽는 법: 빈 등록 방식이 다를 뿐, 결국 컨테이너가 모두 한 그래프로 묶는다. `new`를 직접 쓰지 않는 이유가 여기 있다.</text>
</svg>
