<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5D7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #586F86; }
    .boxTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .boxText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5E748B; }
    .miniLabel { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #48657F; letter-spacing: 0.10em; }
    .noteTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #16314B; }
    .noteText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60768D; }
  </style>

  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1122" cy="110" r="116" fill="#DDF4EA" fill-opacity="0.70"/>
  <circle cx="146" cy="760" r="150" fill="#DAEDFF" fill-opacity="0.60"/>

  <text x="72" y="70" class="eyebrow">VALIDATION PIPELINE</text>
  <text x="72" y="116" class="title">검증은 before, field, model 순서로 끊어 본다</text>
  <text x="72" y="148" class="subtitle">어느 단계에서 데이터를 만질지 구분하면 validator를 과하게 쓰지 않게 된다.</text>

  <rect x="88" y="260" width="162" height="178" rx="24" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="126" y="308" class="miniLabel">INPUT</text>
  <text x="126" y="344" class="boxTitle">원시 입력</text>
  <text x="126" y="372" class="boxText">문자열, dict,</text>
  <text x="126" y="394" class="boxText">외부 JSON</text>

  <rect x="306" y="236" width="190" height="226" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="344" y="284" class="miniLabel">BEFORE</text>
  <text x="344" y="320" class="boxTitle">전처리</text>
  <text x="344" y="348" class="boxText">`mode="before"`</text>
  <text x="344" y="370" class="boxText">쉼표 문자열 -> 리스트</text>
  <text x="344" y="392" class="boxText">포맷 정리, trim</text>

  <rect x="552" y="214" width="208" height="270" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="592" y="262" class="miniLabel">CORE</text>
  <text x="592" y="298" class="boxTitle">타입과 Field 검증</text>
  <text x="592" y="326" class="boxText">coercion, 범위, 길이,</text>
  <text x="592" y="348" class="boxText">pattern, alias 적용</text>
  <text x="592" y="370" class="boxText">실패하면 에러 누적</text>

  <rect x="816" y="236" width="190" height="226" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="854" y="284" class="miniLabel">AFTER</text>
  <text x="854" y="320" class="boxTitle">field / model validator</text>
  <text x="854" y="348" class="boxText">단일 필드 정규화</text>
  <text x="854" y="370" class="boxText">필드 간 관계 검증</text>
  <text x="854" y="392" class="boxText">비즈니스 규칙 확인</text>

  <rect x="1062" y="260" width="146" height="178" rx="24" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="1096" y="308" class="miniLabel">SUCCESS</text>
  <text x="1096" y="344" class="boxTitle">모델 생성</text>
  <text x="1096" y="372" class="boxText">정상 인스턴스</text>

  <line x1="250" y1="350" x2="306" y2="350" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="496" y1="350" x2="552" y2="350" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="760" y1="350" x2="816" y2="350" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1006" y1="350" x2="1062" y2="350" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="474" y="574" width="332" height="162" rx="26" fill="#FFF0F0" stroke="#F0C6C6" filter="url(#shadow)"/>
  <text x="514" y="622" class="miniLabel">FAILURE</text>
  <text x="514" y="658" class="noteTitle">ValidationError</text>
  <text x="514" y="686" class="noteText">어느 필드에서 실패했는지 loc, msg, type으로 모인다.</text>
  <text x="514" y="710" class="noteText">API에서는 `errors()` 결과를 그대로 활용하기 쉽다.</text>

  <line x1="656" y1="484" x2="656" y2="574" stroke="#D17F7F" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="910" y1="462" x2="746" y2="574" stroke="#D17F7F" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="168" y="574" width="234" height="162" rx="26" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="206" y="624" class="noteTitle">선택 기준</text>
  <text x="206" y="652" class="noteText">입력 모양을 먼저 바꿔야 하면</text>
  <text x="206" y="674" class="noteText">`before`.</text>
  <text x="206" y="704" class="noteText">여러 필드 관계면 `model_validator`.</text>
</svg>
