<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17324B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #43627D; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #536980; }
    .miniTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .miniText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #61788F; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #42607A; }
  </style>

  <rect width="1280" height="900" rx="36" fill="#F7FBFF"/>
  <circle cx="1138" cy="106" r="116" fill="#DDF4EA" fill-opacity="0.72"/>
  <circle cx="126" cy="786" r="150" fill="#DAEDFF" fill-opacity="0.64"/>

  <text x="72" y="70" class="eyebrow">PROTO CONTRACT</text>
  <text x="72" y="116" class="title">`.proto` 설계에서 실제로 신경 써야 할 것</text>
  <text x="72" y="148" class="subtitle">gRPC 계약은 message shape만 적는 파일이 아니다. 필드 번호, 서비스 시그니처, 호환성 규칙까지 같이 설계해야 한다.</text>

  <rect x="92" y="236" width="326" height="228" rx="30" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="132" y="290" class="miniTitle">message</text>
  <text x="132" y="320" class="miniText">필드 이름보다 번호가 더 중요하다</text>
  <text x="132" y="344" class="miniText">1-15는 자주 쓰는 필드에 배치</text>
  <text x="132" y="368" class="miniText">repeated, optional, enum, map 지원</text>
  <rect x="132" y="390" width="150" height="32" rx="16" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="172" y="411" class="badge">wire contract</text>

  <rect x="476" y="236" width="326" height="228" rx="30" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="516" y="290" class="miniTitle">service</text>
  <text x="516" y="320" class="miniText">Unary, server stream, client stream,</text>
  <text x="516" y="344" class="miniText">bidirectional stream을 시그니처로 고정</text>
  <text x="516" y="368" class="miniText">요청/응답 메시지도 명시적으로 정의</text>
  <rect x="516" y="390" width="156" height="32" rx="16" fill="#FFF7E7" stroke="#EAC97E"/>
  <text x="554" y="411" class="badge">RPC surface</text>

  <rect x="860" y="236" width="326" height="228" rx="30" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="900" y="290" class="miniTitle">compatibility</text>
  <text x="900" y="320" class="miniText">필드 번호는 바꾸지 않는다</text>
  <text x="900" y="344" class="miniText">삭제한 번호와 이름은 reserved 처리</text>
  <text x="900" y="368" class="miniText">breaking change는 buf로 감지</text>
  <rect x="900" y="390" width="162" height="32" rx="16" fill="#F5F0FF" stroke="#D8CBF6"/>
  <text x="938" y="411" class="badge">never reuse ids</text>

  <rect x="244" y="566" width="792" height="152" rx="30" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="284" y="622" class="miniTitle">실무 규칙</text>
  <text x="284" y="652" class="miniText">필드 번호는 wire format의 키다. 이름보다 번호가 더 중요하고, 한번 쓴 번호는 삭제 후에도 재사용하면 안 된다.</text>
  <text x="284" y="676" class="miniText">request/response 메시지는 현재 구현보다 미래 호환성을 기준으로 설계하고, 부분 업데이트는 FieldMask 같은 명시적 패턴을 사용한다.</text>
</svg>
