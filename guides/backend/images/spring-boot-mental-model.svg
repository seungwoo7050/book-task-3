<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">SPRING BOOT MENTAL MODEL</text>
  <text x="72" y="112" class="title">요청 계층, 빈 컨테이너, 자동 구성을 함께 읽기</text>
  <text x="72" y="142" class="subtitle">Spring Boot는 단순한 웹 프레임워크가 아니라, HTTP 흐름과 빈 그래프, 설정 기반 인프라 구성이 한 번에 묶인 런타임이다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. REQUEST LAYERS</text>
  <text x="102" y="252" class="cardTitle">요청은 어떤 계층을 통과하는가?</text>
  <text x="102" y="280" class="cardText">Controller는 입구, Service는 정책과</text>
  <text x="102" y="302" class="cardText">트랜잭션, Repository는 영속성 담당.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. BEAN GRAPH</text>
  <text x="490" y="252" class="cardTitle">객체는 누가 만들고 연결하는가?</text>
  <text x="490" y="280" class="cardText">컨테이너가 빈을 생성하고</text>
  <text x="490" y="302" class="cardText">생성자 주입으로 의존성을 연결한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. AUTO-CONFIG</text>
  <text x="878" y="252" class="cardTitle">설정은 무엇을 바꾸는가?</text>
  <text x="878" y="280" class="cardText">classpath와 `application.yml`이</text>
  <text x="878" y="302" class="cardText">DataSource, JPA, Security를 조정한다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">REQUEST TO DATABASE</text>

  <line x1="166" y1="566" x2="1098" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="506" width="150" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="128" y="550" class="nodeTitle">Client</text>
  <text x="122" y="578" class="nodeText">HTTP 요청</text>

  <rect x="278" y="486" width="176" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="314" y="530" class="nodeTitle">Controller</text>
  <text x="300" y="558" class="nodeText">DTO 바인딩과 Validation</text>
  <text x="318" y="582" class="nodeText">응답 코드 결정</text>

  <rect x="500" y="486" width="186" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="548" y="530" class="nodeTitle">Service</text>
  <text x="526" y="558" class="nodeText">도메인 정책과 분기</text>
  <text x="524" y="582" class="nodeText">`@Transactional` 경계</text>

  <rect x="736" y="486" width="186" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="758" y="530" class="nodeTitle">Repository</text>
  <text x="764" y="558" class="nodeText">JPA / JDBC / Querydsl</text>
  <text x="788" y="582" class="nodeText">영속성 처리</text>

  <rect x="972" y="486" width="172" height="160" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="1032" y="530" class="nodeTitle">DB</text>
  <text x="1010" y="558" class="nodeText">PostgreSQL 등</text>
  <text x="998" y="582" class="nodeText">실제 데이터 저장소</text>

  <line x1="366" y1="486" x2="366" y2="438" stroke="#5E7895" stroke-width="3"/>
  <line x1="366" y1="438" x2="592" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="396" y="404" width="146" height="28" rx="14" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="420" y="423" class="chip">@Valid + DTO 변환</text>

  <text x="84" y="704" class="footnote">읽는 법: 요청이 어느 계층에서 멈추고, 어떤 빈이 그 계층을 구성하며, 설정이 그 빈 동작을 어떻게 바꾸는지를 함께 보면 Spring Boot 구조가 잡힌다.</text>
</svg>
