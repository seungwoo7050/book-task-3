<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5D7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#173149" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #586F86; }
    .boxTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .boxText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5E748B; }
    .miniLabel { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #48657F; letter-spacing: 0.10em; }
    .noteTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #16314B; }
    .noteText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #60768D; }
  </style>

  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1122" cy="110" r="116" fill="#DDF4EA" fill-opacity="0.70"/>
  <circle cx="146" cy="760" r="150" fill="#DAEDFF" fill-opacity="0.60"/>

  <text x="72" y="70" class="eyebrow">SETTINGS FLOW</text>
  <text x="72" y="116" class="title">BaseSettings는 외부 입력을 타입 안전한 설정으로 모은다</text>
  <text x="72" y="148" class="subtitle">환경변수를 여기저기서 직접 읽지 말고, 한 번 검증된 Settings 인스턴스를 앱 전체에서 공유한다.</text>

  <rect x="98" y="238" width="212" height="110" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="136" y="282" class="miniLabel">SOURCE 1</text>
  <text x="136" y="316" class="boxTitle">기본값</text>
  <text x="136" y="340" class="boxText">코드에 선언한 fallback</text>

  <rect x="98" y="378" width="212" height="110" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="136" y="422" class="miniLabel">SOURCE 2</text>
  <text x="136" y="456" class="boxTitle">.env 파일</text>
  <text x="136" y="480" class="boxText">로컬 개발값, 샘플 구성</text>

  <rect x="98" y="518" width="212" height="110" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="136" y="562" class="miniLabel">SOURCE 3</text>
  <text x="136" y="596" class="boxTitle">실제 환경변수</text>
  <text x="136" y="620" class="boxText">배포 환경에서 override</text>

  <rect x="98" y="658" width="212" height="110" rx="24" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="136" y="702" class="miniLabel">SOURCE 4</text>
  <text x="136" y="736" class="boxTitle">중첩 키</text>
  <text x="136" y="760" class="boxText">`DB__HOST`, `DB__PORT`</text>

  <rect x="412" y="304" width="340" height="396" rx="30" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="452" y="356" class="boxTitle">Settings(BaseSettings)</text>
  <text x="452" y="386" class="boxText">`database_url: str`</text>
  <text x="452" y="410" class="boxText">`port: int = Field(8000, ge=1)`</text>
  <text x="452" y="434" class="boxText">`debug: bool = False`</text>
  <text x="452" y="458" class="boxText">`allowed_origins: list[str]`</text>
  <text x="452" y="498" class="boxText">env_file, case_sensitive,</text>
  <text x="452" y="522" class="boxText">env_nested_delimiter 같은 규칙을</text>
  <text x="452" y="546" class="boxText">model_config에 모아 둔다.</text>
  <rect x="452" y="588" width="180" height="36" rx="18" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="488" y="612" class="miniLabel">VALIDATE ONCE</text>

  <rect x="852" y="320" width="314" height="170" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="890" y="372" class="boxTitle">typed settings 인스턴스</text>
  <text x="890" y="402" class="boxText">`settings = Settings()`</text>
  <text x="890" y="426" class="boxText">문자열을 bool, int, list로 파싱</text>
  <text x="890" y="450" class="boxText">실패 시 앱 시작 단계에서 중단</text>

  <rect x="852" y="544" width="314" height="170" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="890" y="596" class="boxTitle">앱 코드</text>
  <text x="890" y="626" class="boxText">FastAPI dependency, DB 연결,</text>
  <text x="890" y="650" class="boxText">외부 클라이언트 초기화에서</text>
  <text x="890" y="674" class="boxText">검증된 값만 사용한다</text>

  <line x1="310" y1="293" x2="412" y2="404" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="433" x2="412" y2="456" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="573" x2="412" y2="508" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="713" x2="412" y2="560" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="752" y1="502" x2="852" y2="405" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1008" y1="490" x2="1008" y2="544" stroke="#5D7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="396" y="742" width="522" height="72" rx="24" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="432" y="786" class="noteTitle">우선순위</text>
  <text x="524" y="786" class="noteText">실제 환경변수 -> .env -> 코드 기본값 순서로 생각하면 대부분의 동작을 설명할 수 있다.</text>
</svg>
