<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">SPRING BOOT REQUEST PIPELINE</text>
  <text x="72" y="112" class="title">서블릿 필터와 MVC 훅은 서로 다른 층에서 동작한다</text>
  <text x="72" y="142" class="subtitle">Filter와 Spring Security는 요청 앞단을 다루고, DispatcherServlet 이후에는 Interceptor와 Controller가 Spring MVC 규칙 안에서 동작한다.</text>

  <rect x="56" y="192" width="1168" height="580" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">REQUEST HOOKS</text>

  <line x1="160" y1="476" x2="1108" y2="476" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="416" width="138" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="124" y="460" class="nodeTitle">Client</text>
  <text x="114" y="488" class="nodeText">HTTP 요청</text>

  <rect x="266" y="396" width="154" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="312" y="440" class="nodeTitle">Filter</text>
  <text x="294" y="468" class="nodeText">로깅, CORS,</text>
  <text x="290" y="492" class="nodeText">인코딩, 공통 헤더</text>

  <rect x="462" y="376" width="182" height="200" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="484" y="420" class="nodeTitle">Security FilterChain</text>
  <text x="512" y="448" class="nodeText">JWT, 세션,</text>
  <text x="500" y="472" class="nodeText">인가 규칙 검사</text>
  <text x="506" y="496" class="nodeText">실패 시 여기서 종료</text>

  <rect x="690" y="396" width="178" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="712" y="440" class="nodeTitle">DispatcherServlet</text>
  <text x="724" y="468" class="nodeText">핸들러 매핑</text>
  <text x="722" y="492" class="nodeText">예외 해석 시작점</text>

  <rect x="912" y="396" width="146" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="930" y="440" class="nodeTitle">Interceptor</text>
  <text x="942" y="468" class="nodeText">preHandle</text>
  <text x="936" y="492" class="nodeText">postHandle</text>

  <rect x="1098" y="396" width="90" height="160" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="1114" y="440" class="nodeTitle">Controller</text>
  <text x="1110" y="468" class="nodeText">@Valid</text>
  <text x="1110" y="492" class="nodeText">DTO 변환</text>

  <rect x="856" y="612" width="296" height="96" rx="20" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="888" y="648" class="chip">예외 처리</text>
  <text x="888" y="676" class="nodeText">@RestControllerAdvice가 예외를</text>
  <text x="888" y="700" class="nodeText">ErrorResponse로 변환</text>

  <line x1="984" y1="556" x2="984" y2="612" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="338" y="364" width="132" height="28" rx="14" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="358" y="383" class="chip">Servlet layer</text>
  <rect x="860" y="364" width="154" height="28" rx="14" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="884" y="383" class="chip">Spring MVC layer</text>

  <text x="84" y="728" class="footnote">읽는 법: Filter는 MVC 밖, Interceptor는 MVC 안, Security는 보통 필터 체인 안에 있다. 어느 층에서 끊을지에 따라 구현 지점이 달라진다.</text>
</svg>
