<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#587491"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46647E; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #546A81; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #436079; }
  </style>

  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1120" cy="100" r="116" fill="#DBF3E8" fill-opacity="0.7"/>
  <circle cx="138" cy="760" r="148" fill="#D8ECFF" fill-opacity="0.6"/>

  <text x="72" y="70" class="eyebrow">SCHEMA FLOW</text>
  <text x="72" y="116" class="title">schema 하나가 입력 검증과 출력 직렬화를 같이 결정한다</text>
  <text x="72" y="148" class="subtitle">Fastify에서는 body schema만 생각하면 반만 본 것이다. response schema까지 선언해야 성능과 보안 이점을 같이 얻는다.</text>

  <rect x="92" y="316" width="170" height="130" rx="28" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="130" y="370" class="nodeTitle">클라이언트 요청</text>
  <text x="130" y="398" class="nodeText">body, params, query</text>

  <rect x="332" y="284" width="270" height="196" rx="30" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="372" y="338" class="nodeTitle">route schema</text>
  <text x="372" y="368" class="nodeText">body</text>
  <text x="372" y="392" class="nodeText">params</text>
  <text x="372" y="416" class="nodeText">querystring</text>
  <text x="372" y="440" class="nodeText">response</text>
  <rect x="372" y="454" width="138" height="34" rx="17" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="406" y="477" class="badge">AJV + serializer</text>

  <rect x="672" y="254" width="236" height="134" rx="28" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="710" y="306" class="nodeTitle">입력 검증 실패</text>
  <text x="710" y="336" class="nodeText">필수 필드 누락, 타입 불일치,</text>
  <text x="710" y="360" class="nodeText">additionalProperties 위반 -> 400</text>

  <rect x="672" y="458" width="236" height="134" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="710" y="510" class="nodeTitle">handler 실행</text>
  <text x="710" y="540" class="nodeText">검증된 입력만 받고</text>
  <text x="710" y="564" class="nodeText">비즈니스 로직을 수행</text>

  <rect x="978" y="458" width="210" height="150" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="1014" y="510" class="nodeTitle">response schema</text>
  <text x="1014" y="540" class="nodeText">불필요한 필드는 제거되고</text>
  <text x="1014" y="564" class="nodeText">직렬화 경로가 최적화된다</text>
  <rect x="1014" y="580" width="120" height="34" rx="17" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="1046" y="603" class="badge">보안 + 성능</text>

  <line x1="262" y1="381" x2="332" y2="381" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="602" y1="344" x2="672" y2="344" stroke="#D5786F" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="602" y1="458" x2="672" y2="522" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="908" y1="525" x2="978" y2="525" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
