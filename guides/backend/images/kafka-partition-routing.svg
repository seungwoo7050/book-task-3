<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 21px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">KAFKA PARTITION ROUTING</text>
  <text x="72" y="112" class="title">같은 key를 주면 같은 파티션으로 모인다</text>
  <text x="72" y="142" class="subtitle">Kafka에서 “같은 사용자 이벤트 순서가 보장되는가?”는 결국 key를 어떻게 주는가의 문제다.</text>

  <rect x="56" y="192" width="1168" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">KEY TO PARTITION</text>

  <rect x="88" y="286" width="198" height="104" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="142" y="330" class="nodeTitle">Record 1</text>
  <text x="132" y="358" class="nodeText">key = user-42</text>
  <rect x="88" y="434" width="198" height="104" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="142" y="478" class="nodeTitle">Record 2</text>
  <text x="132" y="506" class="nodeText">key = user-42</text>

  <rect x="340" y="356" width="164" height="112" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="392" y="400" class="nodeTitle">Hash</text>
  <text x="366" y="428" class="nodeText">같은 key면 같은 결과</text>

  <rect x="568" y="276" width="124" height="120" rx="20" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="608" y="320" class="nodeTitle">P0</text>
  <text x="592" y="348" class="nodeText">다른 key</text>
  <rect x="568" y="436" width="124" height="120" rx="20" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="608" y="480" class="nodeTitle">P1</text>
  <text x="588" y="508" class="nodeText">user-42</text>

  <rect x="760" y="356" width="170" height="112" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="788" y="400" class="nodeTitle">Consumer A</text>
  <text x="800" y="428" class="nodeText">P1 담당</text>

  <rect x="980" y="276" width="190" height="128" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1024" y="320" class="nodeTitle">순서 보장</text>
  <text x="1012" y="348" class="nodeText">user-42 이벤트는</text>
  <text x="1010" y="372" class="nodeText">같은 소비자에서 순서 처리</text>

  <rect x="980" y="444" width="190" height="128" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1020" y="488" class="nodeTitle">병렬성 한계</text>
  <text x="1002" y="516" class="nodeText">파티션 수보다 많은</text>
  <text x="1012" y="540" class="nodeText">컨슈머는 놀게 된다</text>

  <line x1="286" y1="338" x2="340" y2="394" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="286" y1="486" x2="340" y2="430" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="504" y1="412" x2="568" y2="496" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="514" y="388" width="80" height="28" rx="14" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="532" y="407" class="chip">hash % N</text>
  <line x1="692" y1="496" x2="760" y2="412" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="930" y1="404" x2="980" y2="340" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="930" y1="420" x2="980" y2="492" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="84" y="640" class="footnote">읽는 법: 엔터티 단위 순서를 원하면 key를 반드시 준다. key를 주는 순간 파티션과 소비자 배치 방식이 같이 결정된다.</text>
</svg>
