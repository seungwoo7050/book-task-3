<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">NODEJS MENTAL MODEL</text>
  <text x="72" y="112" class="title">Node.js를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">Node.js는 "자바스크립트 실행기"가 아니라, 이벤트 루프와 비동기 I/O를 중심으로 설계된 런타임이다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. EVENT LOOP</text>
  <text x="102" y="252" class="cardTitle">메인 스레드는 짧게 유지한다</text>
  <text x="102" y="280" class="cardText">I/O는 런타임이 비동기로 처리하고,</text>
  <text x="102" y="302" class="cardText">JS 코드는 가능한 한 빨리 반환해야 한다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. MODULES</text>
  <text x="490" y="252" class="cardTitle">프로젝트 전체에서 모듈 방식을 통일한다</text>
  <text x="490" y="280" class="cardText">ESM/CJS 혼용은 import 경로, 실행, 빌드에서</text>
  <text x="490" y="302" class="cardText">계속 마찰을 만든다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. EXECUTION</text>
  <text x="878" y="252" class="cardTitle">개발 실행과 프로덕션 실행을 분리한다</text>
  <text x="878" y="280" class="cardText">tsx로 개발하고, tsc로 빌드한 뒤</text>
  <text x="878" y="302" class="cardText">node dist/*로 배포한다.</text>

  <rect x="56" y="352" width="1168" height="432" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">RUNTIME FLOW</text>

  <line x1="168" y1="556" x2="1110" y2="556" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="478" width="132" height="156" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="122" y="528" class="nodeTitle">JS 코드</text>
  <text x="118" y="554" class="nodeText">async 함수,</text>
  <text x="120" y="576" class="nodeText">이벤트 핸들러</text>

  <rect x="260" y="458" width="166" height="196" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="296" y="504" class="nodeTitle">이벤트 루프</text>
  <text x="296" y="530" class="nodeText">timer, poll, check를 돌며</text>
  <text x="296" y="552" class="nodeText">콜백을 꺼내 실행</text>

  <rect x="466" y="458" width="178" height="196" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="500" y="504" class="nodeTitle">비동기 I/O</text>
  <text x="500" y="530" class="nodeText">fs, net, stream, DNS</text>
  <text x="500" y="552" class="nodeText">libuv와 OS가 처리</text>

  <rect x="684" y="458" width="174" height="196" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="720" y="504" class="nodeTitle">Promise / callback</text>
  <text x="720" y="530" class="nodeText">작업 완료 후</text>
  <text x="720" y="552" class="nodeText">다시 JS 실행으로 복귀</text>

  <rect x="898" y="458" width="174" height="196" rx="22" fill="#F1ECFF" stroke="#D8CEF8"/>
  <text x="934" y="504" class="nodeTitle">응답</text>
  <text x="924" y="530" class="nodeText">API 응답, 파일 출력,</text>
  <text x="932" y="552" class="nodeText">이벤트 emit</text>

  <text x="84" y="724" class="footnote">읽는 법: JS가 직접 모든 I/O를 처리하는 것이 아니라, 이벤트 루프가 비동기 완료 신호를 다시 JS 실행으로 돌려준다.</text>
</svg>
