<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .cardTitle { font: 700 24px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .node { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="860" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">CELERY WORKFLOW PRIMITIVES</text>
  <text x="72" y="112" class="title">순차, 병렬, 집계를 데이터 흐름으로 구분하기</text>
  <text x="72" y="142" class="subtitle">Celery 합성 API는 많아 보여도 결국 세 가지다. 결과를 다음으로 넘길지, 여러 개를 동시에 돌릴지, 모아서 마무리할지만 보면 된다.</text>

  <rect x="56" y="192" width="360" height="580" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="84" y="232" class="section">SEQUENTIAL</text>
  <text x="84" y="268" class="cardTitle">chain</text>
  <text x="84" y="296" class="cardText">앞 태스크 결과가 다음 태스크 첫 인자로 전달된다.</text>
  <rect x="96" y="340" width="118" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="124" y="384" class="node">fetch</text>
  <rect x="250" y="340" width="118" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="266" y="384" class="node">process</text>
  <rect x="172" y="470" width="118" height="72" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="206" y="514" class="node">save</text>
  <line x1="214" y1="376" x2="250" y2="376" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="309" y1="412" x2="309" y2="446" stroke="#5E7895" stroke-width="3"/>
  <line x1="309" y1="446" x2="231" y2="446" stroke="#5E7895" stroke-width="3"/>
  <line x1="231" y1="446" x2="231" y2="470" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="84" y="612" class="cardText">예: 원본 수집 → 정제 → 저장</text>
  <text x="84" y="636" class="cardText">앞 단계 결과가 뒤 단계 입력이 될 때 쓴다.</text>

  <rect x="460" y="192" width="360" height="580" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="488" y="232" class="section">PARALLEL FAN-OUT</text>
  <text x="488" y="268" class="cardTitle">group</text>
  <text x="488" y="296" class="cardText">서로 독립적인 태스크를 동시에 여러 개 실행한다.</text>
  <rect x="574" y="330" width="128" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="612" y="374" class="node">emails</text>
  <rect x="488" y="470" width="128" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="530" y="514" class="node">job A</text>
  <rect x="576" y="470" width="128" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="618" y="514" class="node">job B</text>
  <rect x="664" y="470" width="128" height="72" rx="18" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="706" y="514" class="node">job C</text>
  <line x1="638" y1="402" x2="552" y2="470" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="638" y1="402" x2="640" y2="470" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="638" y1="402" x2="728" y2="470" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="488" y="612" class="cardText">예: 여러 수신자에게 이메일 발송</text>
  <text x="488" y="636" class="cardText">개별 작업이 서로 기다릴 필요가 없을 때 쓴다.</text>

  <rect x="864" y="192" width="360" height="580" rx="28" fill="#FFFFFF" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="892" y="232" class="section">FAN-IN</text>
  <text x="892" y="268" class="cardTitle">chord</text>
  <text x="892" y="296" class="cardText">병렬 작업이 모두 끝난 뒤 집계 콜백을 한 번 실행한다.</text>
  <rect x="906" y="330" width="92" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="934" y="374" class="node">chunk1</text>
  <rect x="998" y="330" width="92" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1024" y="374" class="node">chunk2</text>
  <rect x="1090" y="330" width="92" height="72" rx="18" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1116" y="374" class="node">chunk3</text>
  <rect x="996" y="480" width="100" height="78" rx="18" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="1014" y="526" class="node">merge</text>
  <line x1="952" y1="402" x2="1046" y2="480" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1044" y1="402" x2="1046" y2="480" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1136" y1="402" x2="1046" y2="480" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="892" y="612" class="cardText">예: 청크별 계산 → 최종 리포트 합치기</text>
  <text x="892" y="636" class="cardText">병렬 결과를 모두 모아야 다음 단계가 가능할 때 쓴다.</text>

  <text x="72" y="824" class="footnote">읽는 법: 결과가 다음 단계 입력이면 chain, 서로 독립이면 group, 병렬 결과를 한 번에 합쳐야 하면 chord다.</text>
</svg>
