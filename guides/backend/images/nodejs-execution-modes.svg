<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#587491"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46647E; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #546A81; }
    .miniTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .miniText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #436079; }
  </style>
  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1120" cy="100" r="116" fill="#DBF3E8" fill-opacity="0.7"/>
  <circle cx="138" cy="760" r="148" fill="#D8ECFF" fill-opacity="0.6"/>

  <text x="72" y="70" class="eyebrow">EXECUTION MODES</text>
  <text x="72" y="116" class="title">개발 실행과 프로덕션 실행은 같은 것이 아니다</text>
  <text x="72" y="148" class="subtitle">`tsx src/server.ts`는 개발 편의용이고, 운영은 빌드 산출물을 `node dist/server.js`로 실행하는 흐름이 안정적이다.</text>

  <line x1="188" y1="544" x2="1094" y2="544" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="120" y="456" width="170" height="176" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="158" y="512" class="miniTitle">src/*.ts</text>
  <text x="158" y="542" class="miniText">TypeScript 소스</text>
  <text x="158" y="566" class="miniText">watch 중 빠르게 수정</text>

  <rect x="338" y="420" width="218" height="248" rx="30" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="374" y="476" class="miniTitle">개발 모드</text>
  <text x="374" y="506" class="miniText">`tsx watch src/server.ts`</text>
  <text x="374" y="530" class="miniText">빌드 없이 소스를 직접 실행</text>
  <text x="374" y="554" class="miniText">빠른 피드백과 디버깅에 적합</text>
  <rect x="374" y="584" width="116" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="410" y="605" class="badge">dev</text>

  <rect x="604" y="456" width="172" height="176" rx="28" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="644" y="512" class="miniTitle">`tsc` 빌드</text>
  <text x="628" y="542" class="miniText">src -> dist JS 산출물</text>

  <rect x="824" y="420" width="218" height="248" rx="30" fill="#F1ECFF" stroke="#D8CEF8" filter="url(#shadow)"/>
  <text x="860" y="476" class="miniTitle">프로덕션 모드</text>
  <text x="860" y="506" class="miniText">`node dist/server.js`</text>
  <text x="860" y="530" class="miniText">예측 가능한 실행 환경</text>
  <text x="860" y="554" class="miniText">PM2, Docker, systemd와 잘 맞는다</text>
  <rect x="860" y="584" width="116" height="32" rx="16" fill="#F5F0FF" stroke="#D8CBF6"/>
  <text x="882" y="605" class="badge">prod</text>

  <rect x="328" y="714" width="654" height="94" rx="26" fill="#FFFFFF" stroke="#C8D9E8" filter="url(#shadow)"/>
  <text x="366" y="758" class="miniTitle">핵심 규칙</text>
  <text x="366" y="786" class="miniText">`dev`, `build`, `start` 스크립트를 분리하고, 운영 환경에서는 빌드 산출물만 실행한다. 개발 편의 실행과 배포 실행을 섞지 않는다.</text>
</svg>
