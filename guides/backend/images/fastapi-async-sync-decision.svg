<svg width="1280" height="920" viewBox="0 0 1280 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1200" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF7F2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DFF0FF"/>
      <stop offset="1" stop-color="#FAFDFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E4F8F0"/>
      <stop offset="1" stop-color="#FCFFFD"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF2D9"/>
      <stop offset="1" stop-color="#FFFDF7"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE7E5"/>
      <stop offset="1" stop-color="#FFF8F8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5A7592"/>
    </marker>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #45647E; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102238; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #546B82; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #44617A; }
  </style>

  <rect width="1280" height="920" rx="36" fill="url(#bg)"/>
  <circle cx="1140" cy="112" r="120" fill="#DEF4EA" fill-opacity="0.72"/>
  <circle cx="132" cy="816" r="152" fill="#DAECFF" fill-opacity="0.64"/>

  <text x="72" y="70" class="eyebrow">ASYNC OR SYNC</text>
  <text x="72" y="116" class="title">핸들러 선언은 라이브러리와 IO 특성으로 결정한다</text>
  <text x="72" y="148" class="subtitle">성능을 위해 무조건 `async def`를 쓰는 것이 아니라, 호출하는 코드가 truly async인지부터 확인해야 한다.</text>

  <rect x="496" y="204" width="288" height="108" rx="28" fill="url(#blue)" stroke="#B8D7F1" filter="url(#shadow)"/>
  <text x="542" y="252" class="nodeTitle">핸들러 안에</text>
  <text x="532" y="280" class="nodeTitle">IO 작업이 있는가?</text>

  <polygon points="640,378 824,492 640,606 456,492" fill="url(#sand)" stroke="#EACB93" filter="url(#shadow)"/>
  <text x="555" y="480" class="nodeTitle">사용 라이브러리가</text>
  <text x="543" y="508" class="nodeTitle">async API를 제공하는가?</text>

  <rect x="138" y="434" width="226" height="120" rx="28" fill="#FFFFFF" stroke="#C9DAE8" filter="url(#shadow)"/>
  <text x="182" y="486" class="nodeTitle">`def` 사용</text>
  <text x="182" y="514" class="nodeText">순수 계산, 아주 얇은</text>
  <text x="182" y="536" class="nodeText">동기 처리라면 충분</text>

  <rect x="858" y="392" width="258" height="156" rx="30" fill="url(#green)" stroke="#BFE1CF" filter="url(#shadow)"/>
  <text x="898" y="446" class="nodeTitle">`async def` + `await`</text>
  <text x="898" y="476" class="nodeText">`httpx.AsyncClient`, `asyncpg`,</text>
  <text x="898" y="500" class="nodeText">비동기 드라이버를 쓰는 경우</text>
  <rect x="898" y="516" width="132" height="34" rx="17" fill="#EAF8F0" stroke="#B7DEC6"/>
  <text x="929" y="539" class="badge">이벤트 루프 활용</text>

  <rect x="858" y="622" width="258" height="164" rx="30" fill="url(#blue)" stroke="#B8D7F1" filter="url(#shadow)"/>
  <text x="912" y="676" class="nodeTitle">`def` 사용</text>
  <text x="898" y="706" class="nodeText">sync SQLAlchemy, 동기 SDK,</text>
  <text x="898" y="730" class="nodeText">blocking DB/파일/네트워크 호출</text>
  <rect x="898" y="746" width="146" height="34" rx="17" fill="#EAF4FF" stroke="#BDD5EE"/>
  <text x="929" y="769" class="badge">스레드풀에서 실행</text>

  <rect x="138" y="660" width="282" height="126" rx="30" fill="url(#rose)" stroke="#F0B8B0" filter="url(#shadow)"/>
  <text x="184" y="712" class="nodeTitle">피해야 할 경우</text>
  <text x="184" y="742" class="nodeText">`async def` 안에서 sync DB 호출</text>
  <text x="184" y="766" class="nodeText">이벤트 루프가 막혀 전체가 느려짐</text>

  <line x1="640" y1="312" x2="640" y2="378" stroke="#5A7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="496" y1="492" x2="364" y2="492" stroke="#5A7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="824" y1="492" x2="858" y2="470" stroke="#5A7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="732" y1="572" x2="858" y2="684" stroke="#5A7592" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="528" y1="572" x2="420" y2="690" stroke="#5A7592" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="388" y="344" width="70" height="34" rx="17" fill="#FFFFFF" stroke="#C8D9E8"/>
  <text x="411" y="367" class="badge">아니오</text>
  <rect x="846" y="344" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#C8D9E8"/>
  <text x="866" y="367" class="badge">예</text>
  <rect x="760" y="594" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#C8D9E8"/>
  <text x="780" y="617" class="badge">아니오</text>
  <rect x="472" y="594" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#C8D9E8"/>
  <text x="492" y="617" class="badge">예</text>
</svg>
