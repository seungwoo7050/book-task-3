<svg width="1280" height="840" viewBox="0 0 1280 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 18px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="840" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">FASTIFY MENTAL MODEL</text>
  <text x="72" y="112" class="title">Fastify를 볼 때 먼저 잡을 3가지</text>
  <text x="72" y="142" class="subtitle">Fastify는 middleware보다 plugin, schema, lifecycle 단계로 읽는 편이 훨씬 정확하다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. PLUGIN</text>
  <text x="102" y="252" class="cardTitle">기능은 어디 스코프에 등록되는가?</text>
  <text x="102" y="280" class="cardText">`register()`는 캡슐화된 하위 스코프를 만든다.</text>
  <text x="102" y="302" class="cardText">전역 전파가 필요하면 `fastify-plugin`을 쓴다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. SCHEMA</text>
  <text x="490" y="252" class="cardTitle">입력과 출력은 어떤 schema인가?</text>
  <text x="490" y="280" class="cardText">body, params, query, response를 schema로 선언하면</text>
  <text x="490" y="302" class="cardText">검증과 직렬화가 자동 최적화된다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. LIFECYCLE</text>
  <text x="878" y="252" class="cardTitle">어느 hook 단계에서 개입할 것인가?</text>
  <text x="878" y="280" class="cardText">onRequest, preValidation, preHandler, onSend처럼</text>
  <text x="878" y="302" class="cardText">미들웨어보다 더 세밀한 지점을 선택한다.</text>

  <rect x="56" y="352" width="1168" height="420" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">REQUEST LIFECYCLE</text>

  <line x1="130" y1="542" x2="1130" y2="542" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="482" width="104" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="112" y="528" class="nodeTitle">요청</text>
  <text x="110" y="556" class="nodeText">client</text>

  <rect x="232" y="462" width="138" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="256" y="506" class="nodeTitle">onRequest</text>
  <text x="256" y="532" class="nodeText">로깅, 초기 인증</text>
  <text x="256" y="554" class="nodeText">가장 앞 단계</text>

  <rect x="410" y="462" width="152" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="438" y="506" class="nodeTitle">preValidation</text>
  <text x="438" y="532" class="nodeText">schema 검증 전</text>
  <text x="438" y="554" class="nodeText">입력 보정 가능</text>

  <rect x="602" y="446" width="164" height="192" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="640" y="490" class="nodeTitle">Schema</text>
  <text x="634" y="516" class="nodeText">body / params / query</text>
  <text x="622" y="538" class="nodeText">검증 후 handler 이전에 실패 가능</text>
  <text x="628" y="572" class="nodeText">response schema로 출력도 제한</text>

  <rect x="806" y="462" width="144" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="834" y="506" class="nodeTitle">preHandler</text>
  <text x="834" y="532" class="nodeText">권한 검사,</text>
  <text x="834" y="554" class="nodeText">request.user 주입</text>

  <rect x="990" y="462" width="150" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="1030" y="506" class="nodeTitle">handler</text>
  <text x="1022" y="532" class="nodeText">비즈니스 호출 후</text>
  <text x="1026" y="554" class="nodeText">return / reply.send</text>

  <text x="84" y="714" class="footnote">읽는 법: 어떤 plugin scope에 등록할지, 어떤 schema가 계약인지, 어느 lifecycle 단계에서 개입할지를 먼저 본다.</text>
</svg>
