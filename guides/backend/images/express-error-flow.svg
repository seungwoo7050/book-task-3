<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#587491"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#183149" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #46647E; letter-spacing: 0.14em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102237; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #546A81; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17304A; }
    .nodeText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #596F86; }
    .badge { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #436079; }
  </style>

  <rect width="1280" height="860" rx="36" fill="#F8FBFF"/>
  <circle cx="1120" cy="100" r="116" fill="#DBF3E8" fill-opacity="0.7"/>
  <circle cx="138" cy="760" r="148" fill="#D8ECFF" fill-opacity="0.6"/>

  <text x="72" y="70" class="eyebrow">ERROR FLOW</text>
  <text x="72" y="116" class="title">Express 4에서 async 에러는 자동이 아니다</text>
  <text x="72" y="148" class="subtitle">sync throw는 에러 미들웨어로 연결되지만, async 함수의 reject는 직접 `next(err)`로 넘기지 않으면 빠질 수 있다.</text>

  <rect x="88" y="244" width="326" height="150" rx="28" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="126" y="298" class="nodeTitle">동기 핸들러에서 throw</text>
  <text x="126" y="328" class="nodeText">Express가 에러를 잡고</text>
  <text x="126" y="352" class="nodeText">errorHandler로 넘긴다</text>
  <rect x="126" y="366" width="122" height="32" rx="16" fill="#EEF7FF" stroke="#BCD6EE"/>
  <text x="162" y="387" class="badge">자동 전파</text>

  <rect x="478" y="244" width="326" height="150" rx="28" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="516" y="298" class="nodeTitle">async 핸들러에서 reject</text>
  <text x="516" y="328" class="nodeText">try/catch 없이 throw되면</text>
  <text x="516" y="352" class="nodeText">timeout, unhandled rejection 위험</text>
  <rect x="516" y="366" width="132" height="32" rx="16" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="548" y="387" class="badge">자동 아님</text>

  <rect x="868" y="244" width="326" height="150" rx="28" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="906" y="298" class="nodeTitle">try/catch 또는 asyncHandler</text>
  <text x="906" y="328" class="nodeText">catch에서 `next(err)`를 호출해</text>
  <text x="906" y="352" class="nodeText">전역 에러 핸들러로 보낸다</text>
  <rect x="906" y="366" width="122" height="32" rx="16" fill="#F3FBF7" stroke="#C2E0D0"/>
  <text x="936" y="387" class="badge">권장 패턴</text>

  <rect x="438" y="552" width="404" height="134" rx="30" fill="#FFFFFF" stroke="#C7D8E7" filter="url(#shadow)"/>
  <text x="474" y="604" class="nodeTitle">errorHandler(err, req, res, next)</text>
  <text x="474" y="634" class="nodeText">의도된 에러는 statusCode로 응답하고, 예상치 못한 에러는 로그를 남긴 뒤 500으로 응답한다.</text>

  <line x1="252" y1="394" x2="566" y2="552" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M640 394 C640 450 640 476 640 552" stroke="#D5786F" stroke-width="4" stroke-dasharray="12 10" fill="none" marker-end="url(#arrow)"/>
  <line x1="1020" y1="394" x2="716" y2="552" stroke="#587491" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="560" y="470" width="160" height="34" rx="17" fill="#FFF7F6" stroke="#F0B7AF"/>
  <text x="582" y="493" class="badge">`next(err)`가 없으면 빠질 수 있음</text>
</svg>
