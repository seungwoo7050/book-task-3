<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="760" rx="32" fill="#F7FAFD"/>
  <text x="72" y="68" class="eyebrow">KAFKA ERROR FLOW</text>
  <text x="72" y="112" class="title">재시도 한도를 넘긴 레코드는 DLT로 보낸다</text>
  <text x="72" y="142" class="subtitle">Kafka 소비자는 실패를 무시하지 않는다. commit을 미루고 backoff를 적용한 뒤, 끝까지 실패하면 DLT로 분리해 후속 처리를 명확히 한다.</text>

  <rect x="56" y="192" width="1168" height="492" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="232" class="section">RETRY AND DLT</text>

  <line x1="170" y1="438" x2="1112" y2="438" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="376" width="168" height="124" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="122" y="422" class="nodeTitle">Poll</text>
  <text x="118" y="450" class="nodeText">레코드를 가져오고</text>
  <text x="118" y="474" class="nodeText">commit 전 상태로 둔다</text>

  <rect x="310" y="356" width="192" height="164" rx="22" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="356" y="402" class="nodeTitle">Listener</text>
  <text x="338" y="430" class="nodeText">비즈니스 로직 실행</text>
  <text x="342" y="454" class="nodeText">예외가 나면 ErrorHandler로</text>

  <rect x="562" y="252" width="206" height="128" rx="22" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="626" y="298" class="nodeTitle">Commit</text>
  <text x="598" y="326" class="nodeText">성공 시 offset commit</text>
  <text x="594" y="350" class="nodeText">다음 레코드로 진행</text>

  <rect x="562" y="430" width="206" height="136" rx="22" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="614" y="476" class="nodeTitle">Retry</text>
  <text x="588" y="504" class="nodeText">FixedBackOff / ExponentialBackOff</text>
  <text x="600" y="528" class="nodeText">재시도 횟수 추적</text>

  <rect x="828" y="430" width="196" height="136" rx="22" fill="#FFF0EE" stroke="#F0B7AF" filter="url(#shadow)"/>
  <text x="892" y="476" class="nodeTitle">DLT</text>
  <text x="864" y="504" class="nodeText">`topic.DLT`로 재발행</text>
  <text x="862" y="528" class="nodeText">원본 레코드는 남는다</text>

  <rect x="1074" y="430" width="118" height="136" rx="22" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="1096" y="476" class="nodeTitle">Handle</text>
  <text x="1092" y="504" class="nodeText">알림, 저장,</text>
  <text x="1096" y="528" class="nodeText">수동 재처리</text>

  <rect x="560" y="596" width="210" height="56" rx="18" fill="#F7FAFD" stroke="#D1DEEA" filter="url(#shadow)"/>
  <text x="620" y="630" class="nodeTitle">Redeliver</text>

  <line x1="406" y1="356" x2="406" y2="286" stroke="#5E7895" stroke-width="3"/>
  <line x1="406" y1="286" x2="562" y2="286" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="432" y="252" width="92" height="28" rx="14" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="456" y="271" class="chip">성공</text>

  <line x1="502" y1="438" x2="562" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="446" y="404" width="96" height="28" rx="14" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="468" y="423" class="chip">예외 발생</text>

  <line x1="768" y1="498" x2="828" y2="498" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="780" y="464" width="120" height="28" rx="14" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="798" y="483" class="chip">재시도 초과</text>

  <line x1="1024" y1="498" x2="1074" y2="498" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="665" y1="566" x2="665" y2="596" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="560" y1="624" x2="256" y2="624" stroke="#5E7895" stroke-width="3"/>
  <line x1="256" y1="624" x2="256" y2="438" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="436" y="594" width="98" height="28" rx="14" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="454" y="613" class="chip">재전달</text>

  <text x="84" y="668" class="footnote">읽는 법: commit은 성공의 표시이고, DLT는 실패를 숨기는 곳이 아니라 별도 운영 루프로 빼내는 지점이다.</text>
</svg>
