<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5E7895"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18324A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .eyebrow { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #496784; letter-spacing: 0.16em; }
    .title { font: 700 34px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #112338; }
    .subtitle { font: 500 18px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5A6F85; }
    .cardNum { font: 700 16px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4B6781; }
    .cardTitle { font: 700 22px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .cardText { font: 500 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5C7289; }
    .section { font: 700 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4A6782; letter-spacing: 0.14em; }
    .nodeTitle { font: 700 20px "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #14304A; }
    .nodeText { font: 500 14px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #5F768E; }
    .chip { font: 700 13px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #425E79; }
    .footnote { font: 600 15px "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #35526D; }
  </style>

  <rect width="1280" height="820" rx="32" fill="#F7FAFD"/>

  <text x="72" y="68" class="eyebrow">CELERY MENTAL MODEL</text>
  <text x="72" y="112" class="title">HTTP 밖으로 밀어낸 작업이 어떻게 실행되는가</text>
  <text x="72" y="142" class="subtitle">Celery는 요청 스레드가 일을 끝내는 시스템이 아니라, 태스크를 큐에 맡기고 워커가 나중에 처리하는 시스템이다.</text>

  <rect x="72" y="184" width="360" height="124" rx="24" fill="#EAF4FF" stroke="#BCD6EE" filter="url(#shadow)"/>
  <text x="102" y="218" class="cardNum">1. BOUNDARY</text>
  <text x="102" y="252" class="cardTitle">응답 전에 끝낼 일인가?</text>
  <text x="102" y="280" class="cardText">사용자 응답과 분리 가능한 일은</text>
  <text x="102" y="302" class="cardText">HTTP 밖으로 밀어낸다.</text>

  <rect x="460" y="184" width="360" height="124" rx="24" fill="#EEF8F3" stroke="#C2E0D0" filter="url(#shadow)"/>
  <text x="490" y="218" class="cardNum">2. BROKER FLOW</text>
  <text x="490" y="252" class="cardTitle">메시지는 어디를 통과하는가?</text>
  <text x="490" y="280" class="cardText">Producer가 큐에 넣고, Broker가 전달하고,</text>
  <text x="490" y="302" class="cardText">Worker가 소비한다.</text>

  <rect x="848" y="184" width="360" height="124" rx="24" fill="#FFF6E8" stroke="#E9D29D" filter="url(#shadow)"/>
  <text x="878" y="218" class="cardNum">3. FAILURE POLICY</text>
  <text x="878" y="252" class="cardTitle">실패하면 어떻게 복구할까?</text>
  <text x="878" y="280" class="cardText">재시도, 폐기, 보상 작업 정책이</text>
  <text x="878" y="302" class="cardText">태스크 정의에 들어간다.</text>

  <rect x="56" y="352" width="1168" height="396" rx="28" fill="#FFFFFF" stroke="#D1DEEA"/>
  <text x="84" y="392" class="section">TASK FLOW</text>

  <line x1="160" y1="566" x2="1090" y2="566" stroke="#5E7895" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="88" y="506" width="142" height="120" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="134" y="548" class="nodeTitle">Client</text>
  <text x="118" y="576" class="nodeText">POST /users</text>
  <text x="112" y="600" class="nodeText">작업 요청 발생</text>

  <rect x="270" y="486" width="188" height="160" rx="22" fill="#EAF4FF" stroke="#BCD6EE"/>
  <text x="314" y="530" class="nodeTitle">FastAPI</text>
  <text x="304" y="558" class="nodeText">유저 저장 후</text>
  <text x="302" y="582" class="nodeText">`send_email.delay()`</text>
  <rect x="314" y="608" width="100" height="30" rx="15" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="332" y="628" class="chip">즉시 응답</text>

  <rect x="502" y="486" width="180" height="160" rx="22" fill="#EEF8F3" stroke="#C2E0D0"/>
  <text x="548" y="530" class="nodeTitle">Broker</text>
  <text x="534" y="558" class="nodeText">Redis / RabbitMQ</text>
  <text x="528" y="582" class="nodeText">큐에 메시지 보관</text>
  <text x="542" y="606" class="nodeText">워커에 전달</text>

  <rect x="726" y="486" width="190" height="160" rx="22" fill="#FFF6E8" stroke="#E9D29D"/>
  <text x="774" y="530" class="nodeTitle">Worker</text>
  <text x="758" y="558" class="nodeText">태스크 실행</text>
  <text x="754" y="582" class="nodeText">재시도와 ack 처리</text>
  <text x="760" y="606" class="nodeText">동시성은 여기서 결정</text>

  <rect x="960" y="486" width="214" height="160" rx="22" fill="#F7FAFD" stroke="#D1DEEA"/>
  <text x="992" y="530" class="nodeTitle">Result Backend</text>
  <text x="1006" y="558" class="nodeText">필요한 경우만 저장</text>
  <text x="988" y="582" class="nodeText">SUCCESS / FAILURE 상태</text>
  <text x="1014" y="606" class="nodeText">추적과 폴링에 사용</text>

  <line x1="364" y1="486" x2="364" y2="438" stroke="#5E7895" stroke-width="3"/>
  <line x1="364" y1="438" x2="160" y2="438" stroke="#5E7895" stroke-width="3"/>
  <line x1="160" y1="438" x2="160" y2="482" stroke="#5E7895" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="92" y="398" width="194" height="28" rx="14" fill="#FFF0EE" stroke="#F0B7AF"/>
  <text x="118" y="417" class="chip">HTTP 응답은 큐 적재 후 반환</text>

  <text x="84" y="704" class="footnote">읽는 법: Celery는 “나중에 할 일”을 큐로 분리하는 순간부터 설계가 시작된다. 태스크 경계, 브로커 흐름, 실패 정책을 먼저 정하면 된다.</text>
</svg>
