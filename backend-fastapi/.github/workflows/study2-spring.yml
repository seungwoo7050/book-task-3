name: study2-spring

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: study2/labs/A-auth-lab/spring
            port: "8100"
          - workspace: study2/labs/B-federation-security-lab/spring
            port: "8101"
          - workspace: study2/labs/C-authorization-lab/spring
            port: "8102"
          - workspace: study2/labs/D-data-jpa-lab/spring
            port: "8103"
          - workspace: study2/labs/E-event-messaging-lab/spring
            port: "8104"
          - workspace: study2/labs/F-cache-concurrency-lab/spring
            port: "8105"
          - workspace: study2/labs/G-ops-observability-lab/spring
            port: "8106"
          - workspace: study2/capstone/commerce-backend/spring
            port: "8110"
          - workspace: study2/capstone/commerce-backend-v2/spring
            port: "8111"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Lint
        working-directory: ${{ matrix.workspace }}
        run: make lint

      - name: Test
        working-directory: ${{ matrix.workspace }}
        run: make test

      - name: Smoke
        working-directory: ${{ matrix.workspace }}
        run: make smoke

      - name: Compose health probe
        run: ./tools/compose_probe.sh "${{ matrix.workspace }}" "${{ matrix.port }}"
