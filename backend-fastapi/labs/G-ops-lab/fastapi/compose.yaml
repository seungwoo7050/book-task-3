services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8005:8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
