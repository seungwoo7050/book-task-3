apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-api
spec:
  replicas: 1
  template:
    spec:
      volumes:
        - name: host
          hostPath:
            path: /var/run/docker.sock
      containers:
        - name: api
          image: nginx:latest
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - ALL

