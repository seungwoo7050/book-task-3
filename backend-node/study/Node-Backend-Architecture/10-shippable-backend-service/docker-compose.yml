services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shippable_backend
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d shippable_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./nestjs
    environment:
      APP_NAME: shippable-backend-service
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      JWT_SECRET: compose-secret
      DATABASE_URL: postgres://backend:backend@postgres:5432/shippable_backend
      REDIS_URL: redis://redis:6379
      LOGIN_THROTTLE_MAX_ATTEMPTS: 5
      LOGIN_THROTTLE_WINDOW_SECONDS: 60
      BOOKS_CACHE_TTL_SECONDS: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
