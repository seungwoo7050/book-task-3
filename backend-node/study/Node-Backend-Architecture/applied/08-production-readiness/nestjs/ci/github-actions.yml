name: verify-08-production-readiness

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
        working-directory: study/Node-Backend-Architecture/applied/08-production-readiness/nestjs
      - run: pnpm run build
        working-directory: study/Node-Backend-Architecture/applied/08-production-readiness/nestjs
      - run: pnpm run test
        working-directory: study/Node-Backend-Architecture/applied/08-production-readiness/nestjs
      - run: pnpm run test:e2e
        working-directory: study/Node-Backend-Architecture/applied/08-production-readiness/nestjs
