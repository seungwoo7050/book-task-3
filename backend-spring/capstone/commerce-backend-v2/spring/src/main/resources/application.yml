server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:commerce-backend-v2}
  datasource:
    url: jdbc:h2:mem:${APP_NAME:study2-lab};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      missing-topics-fatal: false
    consumer:
      auto-offset-reset: earliest
      group-id: ${APP_NAME:commerce-backend-v2}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${APP_NAME:study2-lab}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  name: ${APP_NAME:commerce-backend-v2}
  track: study2
  summary: Portfolio-grade Spring commerce backend with persisted auth, Redis cart, and async order-paid events
  auth:
    jwt-secret: this-is-a-study2-commerce-backend-v2-jwt-secret-key-123456789
    access-token-seconds: 900
    refresh-token-seconds: 1209600
    oauth-state-ttl-seconds: 600
    google-client-id: local-study2-client
    google-redirect-uri: http://localhost:${SERVER_PORT:8111}/api/v1/auth/google/callback
  bootstrap-admin:
    email: admin@study2.local
    password: Admin1234!
    display-name: Bootstrap Admin
  features:
    redis-cart-enabled: false
    redis-rate-limit-enabled: false
    messaging-enabled: false
  messaging:
    order-paid-topic: commerce.order-paid
    publish-delay-ms: 500
  rate-limit:
    login-max-attempts: 10
    login-window-seconds: 60
    refresh-max-attempts: 20
    refresh-window-seconds: 60

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:study2}
    username: ${POSTGRES_USER:study2}
    password: ${POSTGRES_PASSWORD:study2}
    driver-class-name: org.postgresql.Driver
app:
  features:
    redis-cart-enabled: true
    redis-rate-limit-enabled: true
    messaging-enabled: true
