server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:study2-lab}
  datasource:
    url: jdbc:h2:mem:${APP_NAME:study2-lab};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${APP_NAME:study2-lab}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  name: ${APP_NAME:study2-lab}
  track: study2
  summary: JPA-first data API lab with pagination and optimistic locking

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:study2}
    username: ${POSTGRES_USER:study2}
    password: ${POSTGRES_PASSWORD:study2}
    driver-class-name: org.postgresql.Driver
