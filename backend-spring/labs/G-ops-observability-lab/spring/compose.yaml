services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "${SERVER_PORT:-8100}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
      prometheus:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-a_auth_lab}
      POSTGRES_USER: ${POSTGRES_USER:-study2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study2}
    ports:
      - "${POSTGRES_PORT:-5540}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study2} -d ${POSTGRES_DB:-a_auth_lab}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6380}:6379"

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8125}:8025"

  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9096}:9090"
