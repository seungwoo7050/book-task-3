services:
  postgres:
    image: postgres:17-alpine
    container_name: study1-v3-postgres
    environment:
      POSTGRES_DB: study1_v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5543:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d study1_v3"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - study1_v3_postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/study1_v3
      PORT: 3103
      APP_BASE_URL: http://127.0.0.1:3003
      SESSION_SECRET: compose-session-secret
      BOOTSTRAP_OWNER_EMAIL: owner@study1.local
      BOOTSTRAP_OWNER_PASSWORD: ChangeMe123!
    ports:
      - "3103:3103"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/study1_v3
      APP_BASE_URL: http://127.0.0.1:3003
      SESSION_SECRET: compose-session-secret

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3103
    depends_on:
      api:
        condition: service_started
    ports:
      - "3003:3003"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3103

volumes:
  study1_v3_postgres:
