services:
  postgres:
    image: postgres:17-alpine
    container_name: study1-v2-postgres
    environment:
      POSTGRES_DB: study1_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5542:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d study1_v2"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - study1_v2_postgres:/var/lib/postgresql/data

volumes:
  study1_v2_postgres:
