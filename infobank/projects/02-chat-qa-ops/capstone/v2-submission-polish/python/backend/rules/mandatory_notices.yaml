rules:
  - id: require-penalty-notice
    type: mandatory_inclusion
    trigger: "해지|번호이동|약정 종료"
    required: "위약금|잔여 할부|약정"
    severity: warning
    failure_type: MISSING_MANDATORY_STEP

  - id: require-identity-step
    type: mandatory_inclusion
    trigger: "명의 변경|해지 신청|요금 환불"
    required: "본인확인|인증"
    severity: warning
    failure_type: MISSING_MANDATORY_STEP

  - id: require-escalation-step
    type: mandatory_inclusion
    trigger: "민원|분쟁|환불 거절|피해|이의제기"
    required: "상담원|이관|전문 부서|전담 부서"
    severity: warning
    failure_type: ESCALATION_MISS
