rules:
  - id: forbid-discount-promise
    type: forbidden_pattern
    pattern: "(할인|감면|면제|무료).{0,10}(해드리|해 드리|적용해|제공)"
    severity: critical
    failure_type: FORBIDDEN_PROMISE

  - id: forbid-absolute-guarantee
    type: forbidden_pattern
    pattern: "(반드시|무조건|100%).{0,10}(가능|처리|보장)"
    severity: warning
    failure_type: UNSUPPORTED_CLAIM
