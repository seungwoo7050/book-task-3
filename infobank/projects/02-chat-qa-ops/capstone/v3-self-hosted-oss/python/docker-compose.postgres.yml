services:
  postgres:
    image: postgres:16-alpine
    container_name: qualbot-v1-postgres
    environment:
      POSTGRES_DB: qualbot
      POSTGRES_USER: qualbot
      POSTGRES_PASSWORD: qualbot
    ports:
      - "${QUALBOT_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualbot -d qualbot"]
      interval: 2s
      timeout: 2s
      retries: 20
